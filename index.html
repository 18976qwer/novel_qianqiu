。</p>\n<p>这一次，我是一个人来的。小石头已经成家立业，有了自己的生活，不再跟着我到处跑了。</p>\n<p>城隍庙还在，但戏台已经塌了一半，不能用了。</p>\n<p>戏班还在，但已经不成规模，只剩下几个人，在茶馆里唱唱小曲。</p>\n<p>阿秀已经三十多岁了，还在唱，但不再唱主角，而是教一些年轻的孩子。</p>\n<p>我去茶馆看她。</p>\n<p>\"您又来了，\"她认出了我，\"十年不见，您还是老样子。\"</p>\n<p>\"你也老了，\"我说。</p>\n<p>\"是啊，\"她笑了笑，\"唱不动了。现在的年轻人，不喜欢听戏了，喜欢听说书，听说唱，听那些新鲜的东西。\"</p>\n<p>\"戏要失传了？\"我问。</p>\n<p>\"差不多吧，\"她说，\"我这个班，怕是传不下去了。徒弟们一个个都走了，去干别的营生。戏班养不活人。\"</p>\n<p>我沉默了一会儿，然后问：\"你后悔吗？\"</p>\n<p>\"后悔什么？\"</p>\n<p>\"唱了一辈子戏，最后落得这样。\"</p>\n<p>她想了想，说：\"不后悔。\"</p>\n<p>\"为什么？\"</p>\n<p>\"因为我喜欢，\"她说，\"喜欢站在台上的感觉，喜欢把一个人物演活的感觉，喜欢台下有人为我叫好的感觉。这些东西，钱买不来，别的营生也给不了。\"</p>\n<p>她看着我，笑了，\"而且，我不是还在教吗？哪怕只有一个学生，戏就不会断。总有一天，会有人重新喜欢上戏的。\"</p>\n<p>我看着她，心中有些感慨。</p>\n<p>四十年了。如烟死了，小梅老了，阿秀也老了。戏班从辉煌到衰落，角儿换了一茬又一茬。但有些东西没变——对戏的热爱，对舞台的执着，那种\"戏里的人生更真\"的劲儿。</p>\n<p>\"阿秀姑娘，\"我说，\"我请你唱一出戏吧。\"</p>\n<p>\"什么戏？\"</p>\n<p>\"《霸王别姬》，\"我说，\"你师祖当年最拿手的戏。\"</p>\n<p>她出神了一瞬，然后点点头。</p>\n<p>\"好。\"</p>\n<p>---</p>\n<p>那天下午，阿秀在茶馆的小台上，唱了一出《霸王别姬》。</p>\n<p>没有华丽的戏服，没有精致的妆容，只有一把简单的胡琴伴奏。</p>\n<p>但她唱得很好。</p>\n<p>虞姬自刎的那一刻，我仿佛看见了四十年前的如烟。同样的身段，同样的眼神，同样的凄婉。</p>\n<p>戏散了，我站起来，鼓了鼓掌。</p>\n<p>\"唱得好，\"我说，\"跟你师祖一样好。\"</p>\n<p>她笑了笑，眼眶有些红。</p>\n<p>\"谢谢您，\"她说，\"四十年了，还有人记得她。\"</p>\n<p>\"我记得，\"我说，\"我会一直记得。\"</p>\n<p>我放下一块银子，转身走了。</p>\n<p>身后，传来阿秀的声音：\"先生，还会再来吗？\"</p>\n<p>我没有回头，只是摆了摆手。</p>\n<p>会不会再来，我也不知道。</p>\n<p>也许再过十年，二十年，这个戏班就不存在了。也许再过几十年，就没人记得柳如烟是谁了。</p>\n<p>但那又有什么关系呢？</p>\n<p>她曾经活过，曾经唱过，曾经在台上光芒万丈。</p>\n<p>那就够了。</p>\n<p>就像她自己说的，戏里的人生，更真。</p>\n<p>她把自己的一生，都活成了一场好戏。</p>\n<p>这就够了。</p>\n<p>---</p>\n<p>我走出茶馆，走在县城的街上。</p>\n<p>四十年，这条街变了很多。原来的铺子大多不在了，换成了新的店铺，新的招牌。</p>\n<p>但城隍庙还在，那棵老槐树还在，那个塌了一半的戏台还在。</p>\n<p>它们在告诉我，有些东西，不会变。</p>\n<p>比如记忆，比如情感，比如那些曾经触动过我们的瞬间。</p>\n<p>我抬头看看天，天很蓝，云很白。</p>\n<p>如烟，你在天上看着吗？</p>\n<p>你的戏，还有人记得。</p>\n<p>你的徒弟，你的徒孙，还在唱。</p>\n<p>你没有白活。</p>\n<p>我替你，继续看着这世界。</p>\n<p>看着戏台上的人来人往，看着戏里戏外的悲欢离合。</p>\n<p>直到有一天，我也能成为一出好戏。</p>\n<p>像你这样，无愧于心，无悔于行。</p>\n<p>那就够了。</p>"}},{"type":"chapter","title":"第十四章 初见长风","data":{"id":14,"title":"第十四章 初见长风","html":"<p>我第一次见到李长风，是在一家赌坊里。</p>\n<p>那时候小石头还没出生，我一个人四处漂泊，走到哪里算哪里。那是个边境小城，鱼龙混杂，三教九流什么人都有。</p>\n<p>我走进赌坊，是想找人。有个病人欠了我诊金，躲到这儿来了。</p>\n<p>赌坊里烟雾缭绕，人声嘈杂。几张桌子围满了人，都在吆五喝六地押注。我扫了一圈，没看见我要找的人。</p>\n<p>正准备走，旁边突然传来一声巨响。</p>\n<p>一张桌子翻了，骰子、银钱撒了一地。两个人扭打在一起，从桌子这边滚到那边。</p>\n<p>\"李长风！你他妈出老千！\"</p>\n<p>\"放屁！老子用得着出老千？\"</p>\n<p>\"那你连赢十把，不是出老千是什么？\"</p>\n<p>\"那是老子运气好！\"</p>\n<p>两个人打得不可开交。周围的赌客都退到一边，有好事的还在起哄。</p>\n<p>我站在人群外面，看着那个叫李长风的人。</p>\n<p>他很年轻，大概二十出头，身材魁梧，浓眉大眼。虽然被两个人按在地上打，但一点也不示弱，左一拳右一脚，打得有来有回。</p>\n<p>最后，赌坊的护院出来，把三个人都扔了出去。</p>\n<p>我跟着走出去，想看看热闹。</p>\n<p>那两个人被打得鼻青脸肿，撂下几句狠话就走了。李长风坐在地上，擦了擦嘴角的血，突然笑了。</p>\n<p>\"他妈的，\"他骂了一句，\"今天运气真好。\"</p>\n<p>我走过去，递给他一块手帕。</p>\n<p>\"擦擦吧，\"我说。</p>\n<p>他抬起头，看了我一眼，接过手帕。</p>\n<p>\"谢谢啊，\"他说，\"你是大夫？\"</p>\n<p>\"怎么看出来的？\"</p>\n<p>\"你身上有药味，\"他说，\"而且你这种斯斯文文的样子，不是读书人就是大夫。\"</p>\n<p>我笑了笑，\"算你猜对了。\"</p>\n<p>他站起来，拍了拍身上的土，\"我叫李长风，你呢？\"</p>\n<p>\"顾沉舟。\"</p>\n<p>\"顾沉舟，\"他念了一遍，\"好名字。\"</p>\n<p>\"你刚才真的出老千了？\"</p>\n<p>\"没有，\"他说，\"我真的是运气好。\"</p>\n<p>\"连赢十把？\"</p>\n<p>\"十把算什么，\"他笑了，\"我最高记录连赢二十把。\"</p>\n<p>我看着他，心中一紧好奇。</p>\n<p>这个人，看起来粗豪爽朗，但眼睛里有一种……怎么说呢，一种不怕死的劲儿。</p>\n<p>\"你不怕他们报复？\"我问。</p>\n<p>\"怕什么？\"他说，\"大不了再打一架。\"</p>\n<p>\"你打得过他们？\"</p>\n<p>\"打不过也要打，\"他说，\"人活着，不能怂。\"</p>\n<p>我笑了，\"你这人挺有意思。\"</p>\n<p>\"你也挺有意思，\"他说，\"别的大夫看见打架都躲得远远的，你还凑上来看热闹。\"</p>\n<p>\"我是来找人的，\"我说，\"顺便看看热闹。\"</p>\n<p>\"找谁？\"</p>\n<p>\"一个欠我诊金的人。\"</p>\n<p>\"欠你多少钱？\"</p>\n<p>\"不多，二两银子。\"</p>\n<p>李长风想了想，从怀里掏出一块碎银子，递给我。</p>\n<p>\"给，\"他说，\"算我替他还了。\"</p>\n<p>我有些发怔，\"你替他给？\"</p>\n<p>\"嗯，\"他说，\"你既然是救人，就不该欠账。这世道，好人不该被欺负。\"</p>\n<p>我看着手里的银子，心中一紧。</p>\n<p>二两银子，对他来说可能不算少。他就这么随手给了我，只因为他觉得\"好人不该被欺负\"。</p>\n<p>\"李兄，\"我说，\"这钱我不能收。\"</p>\n<p>\"为什么？\"</p>\n<p>\"因为我还没找到他，\"我说，\"找到了，让他自己还。\"</p>\n<p>他愣了一下，然后哈哈大笑。</p>\n<p>\"有意思，真有意思，\"他说，\"你这人，跟别的大夫不一样。\"</p>\n<p>\"哪里不一样？\"</p>\n<p>\"别的大夫都是见钱眼开，你倒好，有钱不要。\"</p>\n<p>\"我不是不要，\"我说，\"是要该给的人给。\"</p>\n<p>他看着我，眼神有些复杂。</p>\n<p>\"顾兄，\"他说，\"我觉得咱们能成朋友。\"</p>\n<p>\"为什么？\"</p>\n<p>\"因为你不虚伪，\"他说，\"有什么说什么，不藏着掖着。我喜欢跟这样的人交朋友。\"</p>\n<p>我笑了笑，\"那就交个朋友吧。\"</p>\n<p>他伸出手，我握了握。</p>\n<p>他的手很大，很粗糙，但很有力。</p>\n<p>\"走，\"他说，\"我请你喝酒。\"</p>\n<p>---</p>\n<p>我们去了附近的一家酒馆。</p>\n<p>李长风要了一壶酒，几个小菜。他给我倒了一杯，又给自己倒了一杯。</p>\n<p>\"来，\"他举起酒杯，\"敬新朋友。\"</p>\n<p>\"敬新朋友。\"</p>\n<p>我们碰了一下杯，一饮而尽。</p>\n<p>酒是劣酒，很烈，喝下去像火一样烧。</p>\n<p>\"李兄，\"我问，\"你是做什么的？\"</p>\n<p>\"我？\"他笑了笑，\"我是个闲人，四处晃荡，偶尔赌两把，偶尔打打架。\"</p>\n<p>\"没有正经营生？\"</p>\n<p>\"没有，\"他说，\"我不想被束缚，想干什么就干什么，多自在。\"</p>\n<p>我看着他，心里有些羡慕。</p>\n<p>这种活法，我曾经也有过。刚穿越过来的时候，我也是这样，四处漂泊，想干什么就干什么。</p>\n<p>但后来，我见识了太多东西，知道了太多事情，就再也回不到那种简单的快乐了。</p>\n<p>\"顾兄，\"他问，\"你呢？你是哪里人？\"</p>\n<p>\"我……\"我想了想，\"我没有家，到处走。\"</p>\n<p>\"跟我一样啊，\"他笑了，\"咱们都是浪子。\"</p>\n<p>\"算是吧。\"</p>\n<p>\"那正好，\"他说，\"以后咱们搭个伴，一起浪迹天涯，怎么样？\"</p>\n<p>我出神了一瞬。</p>\n<p>搭个伴？我已经很久没有人同行了。</p>\n<p>三百年，我基本都是一个人。偶尔和人结伴走一段，但很快就会分开。因为我不能和任何人走得太近，不能让他们发现我的秘密。</p>\n<p>但看着李长风那双真诚的眼睛，我突然有些犹豫。</p>\n<p>\"李兄，\"我说，\"我是个很麻烦的人。跟着我，你会惹上很多麻烦。\"</p>\n<p>\"麻烦？\"他笑了，\"我最喜欢的就是麻烦。没麻烦，人生多没意思。\"</p>\n<p>\"我是说真的，\"我说，\"我的麻烦，不是一般的麻烦。\"</p>\n<p>\"多不一般？\"</p>\n<p>\"可能会要命的麻烦。\"</p>\n<p>他看着我，眼神里没有恐惧，只有好奇。</p>\n<p>\"顾兄，\"他说，\"你是不是惹上了什么仇家？\"</p>\n<p>\"算是吧。\"</p>\n<p>\"厉害吗？\"</p>\n<p>\"很厉害。\"</p>\n<p>\"比今天赌坊那两个人还厉害？\"</p>\n<p>\"厉害多了。\"</p>\n<p>他想了想，说：\"那更得搭个伴了。两个人，总比一个人强。\"</p>\n<p>我看着他，心中五味杂陈。</p>\n<p>他不知道，我说的\"麻烦\"是什么。他不知道，我会活得比他久很久，久到看着他死去。</p>\n<p>但看着他那双眼睛，我说不出拒绝的话。</p>\n<p>\"好吧，\"我说，\"那就搭个伴。\"</p>\n<p>他笑了，举起酒杯，\"来，敬咱们的友谊！\"</p>\n<p>\"敬友谊。\"</p>\n<p>---</p>\n<p>那天晚上，我们喝了很多酒。</p>\n<p>李长风讲了很多他的事情。他说他是个孤儿，从小在街头长大，学会了一身打架的本事。他说他曾经想过当兵，但受不了军中的约束，就跑了出来。</p>\n<p>\"我想做个侠客，\"他说，\"仗剑走天涯，路见不平拔刀相助。\"</p>\n<p>\"侠客？\"我笑了笑，\"现在这世道，还有侠客吗？\"</p>\n<p>\"有，\"他说，\"我就是。\"</p>\n<p>我看着他，心中有些感慨。</p>\n<p>二十出头的年轻人，满怀理想，想要改变世界。他不知道，世界不是那么好改变的。他不知道，理想很多时候都会被现实打得粉碎。</p>\n<p>但我不想打击他。</p>\n<p>让他保留这份热血吧。让他去追他的侠客梦。哪怕最后梦碎了，至少他曾经追过。</p>\n<p>\"李兄，\"我说，\"你会成为一个了不起的人。\"</p>\n<p>\"真的？\"他眼睛一亮。</p>\n<p>\"真的，\"我说，\"你有一种……让人信服的力量。\"</p>\n<p>他哈哈大笑，\"顾兄，你说话真好听。来，再干一杯！\"</p>\n<p>我们又干了一杯。</p>\n<p>酒过三巡，他有些醉了，开始胡言乱语。</p>\n<p>\"顾兄，你知道吗，我其实有个秘密。\"</p>\n<p>\"什么秘密？\"</p>\n<p>\"我……我怕死。\"</p>\n<p>我有些发怔。</p>\n<p>\"你是不是觉得我很怂？\"他问，\"明明整天打架，还说怕死。\"</p>\n<p>\"不，\"我说，\"怕死很正常。\"</p>\n<p>\"但是，\"他说，\"我更怕白活。\"</p>\n<p>\"白活？\"</p>\n<p>\"就是……什么都没做，就这么平平淡淡的死了。\"</p>\n<p>他看着我，眼神有些迷离，但又很认真。</p>\n<p>\"我想做点事情，\"他说，\"哪怕是很小的事情，哪怕最后失败了，至少我试过。\"</p>\n<p>我看着他的眼睛，那双眼睛里有一种光，一种我三百年很少见到的光。</p>\n<p>\"李兄，\"我说，\"你不会白活的。\"</p>\n<p>\"真的？\"</p>\n<p>\"真的，\"我说，\"我保证。\"</p>\n<p>他笑了，\"顾兄，谢谢你。\"</p>\n<p>然后他趴在桌子上，睡着了。</p>\n<p>我坐在那里，看着他的睡脸，心里默默地说：李长风，你不会白活的。历史会记住你，我会记住你。</p>\n<p>你会成为一个英雄，一个传奇。</p>\n<p>哪怕你的传奇很短暂。</p>\n<p>---</p>\n<p>我们在那座小城待了三天。</p>\n<p>三天里，李长风带我去了很多地方。去了城外的山，去了河边的码头，去了城中的集市。</p>\n<p>他像个孩子一样，对什么都感兴趣。看见新奇的东西就要凑上去看，看见好吃的就要买，看见不平的事就要管。</p>\n<p>有一次，我们在街上看见一个地痞欺负一个卖菜的老太太。李长风二话不说，冲上去就是一顿揍。</p>\n<p>地痞被打跑了，老太太千恩万谢。</p>\n<p>\"李兄，\"我说，\"你这样很容易惹麻烦的。\"</p>\n<p>\"麻烦？\"他笑了，\"我就是麻烦。\"</p>\n<p>我也笑了。</p>\n<p>这个人，真的很有趣。他不计后果，不怕麻烦，只做自己认为对的事情。</p>\n<p>这种活法，是我三百年都没有过的。</p>\n<p>\"顾兄，\"他问我，\"你有没有想过，以后要做什么？\"</p>\n<p>我想了想，说：\"没想过。\"</p>\n<p>\"怎么可能没想过？\"他说，\"人总得有个目标吧？\"</p>\n<p>\"我的目标……\"我顿了顿，\"就是活下去。\"</p>\n<p>\"活下去？\"他皱起眉头，\"这也算目标？\"</p>\n<p>\"算啊，\"我说，\"对有些人来说，活着就是最难的事情。\"</p>\n<p>他看着我，眼神有些复杂。</p>\n<p>\"顾兄，\"他说，\"你是不是经历过什么？\"</p>\n<p>\"经历过什么？\"</p>\n<p>\"感觉你……好像看透了世事一样。明明看着这么年轻，说话却像个老头子。\"</p>\n<p>我笑了笑，\"可能是因为我经历得多吧。\"</p>\n<p>\"经历得多？\"他看着我，\"你多大年纪？\"</p>\n<p>\"我……\"我想了想，\"比你大很多。\"</p>\n<p>\"大多少？\"</p>\n<p>\"大……三百岁吧。\"</p>\n<p>他出神了一瞬，然后哈哈大笑。</p>\n<p>\"顾兄，你真会开玩笑！\"</p>\n<p>我也笑了，\"是啊，开玩笑的。\"</p>\n<p>但我说的是真的。</p>\n<p>我真的比他大三百岁。</p>\n<p>只是他永远不会知道。</p>\n<p>---</p>\n<p>第四天早上，李长风说他要走了。</p>\n<p>\"去哪？\"我问。</p>\n<p>\"北边，\"他说，\"听说北边在打仗，我想去看看。\"</p>\n<p>\"打仗有什么好看的？\"</p>\n<p>\"我想参军，\"他说，\"做个真正的军人，保家卫国。\"</p>\n<p>我看着他，心里有些复杂。</p>\n<p>历史正在按照它的轨迹前进。李长风要去北边，要去参军，要成为一名将军，然后战死在沙场上。</p>\n<p>这一切，我都无法阻止。</p>\n<p>\"李兄，\"我说，\"能不去吗？\"</p>\n<p>\"为什么？\"</p>\n<p>\"因为……\"我想说因为你会死，但话到嘴边又咽了回去，\"因为战场很危险。\"</p>\n<p>\"我知道危险，\"他说，\"但危险才刺激啊。\"</p>\n<p>\"你可能会死。\"</p>\n<p>\"人都会死，\"他说，\"关键是看怎么死。我宁愿死在战场上，也不愿意老死在床上。\"</p>\n<p>我看着他的眼睛，那双眼睛里没有恐惧，只有期待。</p>\n<p>\"顾兄，\"他说，\"咱们有缘再会。\"</p>\n<p>\"有缘再会。\"</p>\n<p>他转身走了。</p>\n<p>走了几步，又回过头，\"对了，顾兄，那个欠你诊金的人，我打听到了，他在城东的破庙里躲着。\"</p>\n<p>我愣了一下，\"你帮我找他了？\"</p>\n<p>\"嗯，\"他笑了，\"朋友的事，就是我的事。\"</p>\n<p>说完，他挥了挥手，走了。</p>\n<p>我站在那里，看着他的背影消失在街道尽头。</p>\n<p>心里有一种说不出的感觉。</p>\n<p>这是我们第一次分别。以后，还会有第二次，第三次……直到最后一次，他死在沙场上。</p>\n<p>但无论如何，我会记得这次相遇。</p>\n<p>记得这个在赌坊里打架的年轻人，记得这个说要\"做个侠客\"的理想主义者，记得这个连赢十把就说自己运气好的狂妄小子。</p>\n<p>李长风，有缘再会。</p>\n<p>在那之前，我会替你，继续看着这世界。</p>"}},{"type":"chapter","title":"第十五章 晚晴初遇","data":{"id":15,"title":"第十五章 晚晴初遇","html":"<p>我第一次见到苏晚晴，是因为一场病。</p>\n<p>那时候我还没有收养小石头，一个人到处漂泊。那是个冬天，特别冷，我在江南的一个小镇上染了风寒，高烧不退。</p>\n<p>我躺在客栈的床上，浑身发冷，头疼欲裂。我知道这病不严重，养几天就好，但那时候我实在起不来床，连喝水的力气都没有。</p>\n<p>客栈的老板娘是个好心人，看我病成这样，就帮我打听镇上哪家医馆好。</p>\n<p>\"镇东头有家苏氏医馆，\"她说，\"苏大夫医术不错，就是年纪大了，现在 mostly 是他女儿坐诊。\"</p>\n<p>\"他女儿？\"我有气无力地问。</p>\n<p>\"嗯，叫晚晴，二十出头，医术不比她爹差。\"</p>\n<p>我点点头，谢过她，又躺下了。</p>\n<p>我本来不想去看大夫。我自己懂医术，知道这病没什么大不了，扛一扛就过去了。但老板娘坚持要帮我去请，我也不好拒绝。</p>\n<p>---</p>\n<p>第二天下午，医馆的人来了。</p>\n<p>我躺在床上，听见有人推门进来，然后是一个女子的声音：\"病人在哪？\"</p>\n<p>\"在里面，\"老板娘说，\"烧得厉害，人都糊涂了。\"</p>\n<p>\"我看看。\"</p>\n<p>脚步声走近，然后一只手搭上了我的手腕。</p>\n<p>那只手很凉，很软，但很有力。</p>\n<p>\"脉象浮紧，\"她说，\"是风寒。烧多久了？\"</p>\n<p>\"三……三天了。\"我说。</p>\n<p>她没说话，继续诊脉。过了一会儿，她说：\"病情不重，但拖得久了，需要好好调养。\"</p>\n<p>我睁开眼睛，想看看她长什么样。</p>\n<p>她坐在床边，穿着一身素色的衣裙，头发简单地挽着，插着一根木簪。眉眼很清淡，没什么表情，但眼神很专注。</p>\n<p>\"你是苏大夫的女儿？\"我问。</p>\n<p>\"是，\"她说，\"我叫苏晚晴。\"</p>\n<p>\"苏姑娘，\"我说，\"这病我自己知道，风寒而已，吃两副药就好。\"</p>\n<p>她看了我一眼，有些意外，\"你懂医术？\"</p>\n<p>\"懂一点。\"</p>\n<p>\"既然懂，为什么不早治？\"她的语气很平淡，但带着一丝责备，\"拖了三天，病都入里了，再拖下去，怕是要转成肺炎。\"</p>\n<p>我苦笑了一下，\"没力气。\"</p>\n<p>她看了我一会儿，然后说：\"我去给你煎药，你好好休息。\"</p>\n<p>她站起身，转身出去了。</p>\n<p>我看着她的背影，心底涌起好奇。</p>\n<p>这个女子，说话做事都很淡，没什么情绪波动，但让人感觉很可靠。</p>\n<p>---</p>\n<p>那天下午，她给我煎了药，看着我喝下。</p>\n<p>药很苦，但喝下去之后，身上渐渐暖和起来。</p>\n<p>\"谢谢，\"我说。</p>\n<p>\"不客气，\"她说，\"你既然懂医术，应该也知道，这药要连吃三天。\"</p>\n<p>\"我知道。\"</p>\n<p>\"那你好好休息，我明天再来。\"</p>\n<p>她收拾好东西，准备走。</p>\n<p>\"苏姑娘，\"我叫住她。</p>\n<p>她回过头，\"还有事？\"</p>\n<p>\"诊金多少？\"</p>\n<p>\"等你好了再说，\"她说，\"现在不急。\"</p>\n<p>说完，她转身走了。</p>\n<p>我躺在床上，看着天花板，心头泛起暖意。</p>\n<p>这个女子，虽然话不多，但让人感觉很舒服。不势利，不急躁，就只是淡淡地做着该做的事。</p>\n<p>---</p>\n<p>第二天，她果然来了。</p>\n<p>带来了新煎的药，还有一些粥。</p>\n<p>\"你几天没吃东西了吧？\"她把粥放在床头，\"先喝点粥，再吃药。\"</p>\n<p>\"谢谢。\"</p>\n<p>我坐起来，喝了一口粥。粥熬得很烂，里面加了些姜丝，喝下去胃里很舒服。</p>\n<p>\"这粥是你熬的？\"我问。</p>\n<p>\"是，\"她说，\"病人要吃得清淡些。\"</p>\n<p>我点点头，继续喝。</p>\n<p>她坐在旁边，看着我喝粥，没说话。</p>\n<p>\"苏姑娘，\"我说，\"你每天都这么忙吗？\"</p>\n<p>\"还好，\"她说，\"镇子不大，病人不多。\"</p>\n<p>\"你一个人坐诊？\"</p>\n<p>\"我爹也在，但他年纪大了， mostly 是我来。\"</p>\n<p>\"你不累吗？\"</p>\n<p>她想了想，说：\"累是累，但习惯了。\"</p>\n<p>我看着她，心里有些触动。</p>\n<p>这个女子，年纪不大，但似乎已经承担了很多。她的淡然，不是因为无忧无虑，而是因为见多了，习惯了。</p>\n<p>\"苏姑娘，\"我说，\"你为什么要学医？\"</p>\n<p>她出神了一瞬，似乎没想到我会问这个。</p>\n<p>\"因为想救人，\"她说。</p>\n<p>\"就这么简单？\"</p>\n<p>\"就这么简单。\"</p>\n<p>她看着我，眼神很平静，\"我从小看着我爹救人，看着病人从痛苦中解脱，觉得很有意义。所以我也学医，也想救人。\"</p>\n<p>\"你不觉得辛苦吗？\"我问，\"每天面对那么多病人，听他们诉苦，看他们的痛苦。\"</p>\n<p>她沉默了一会儿，说：\"辛苦是辛苦，但值得。\"</p>\n<p>\"值得？\"</p>\n<p>\"嗯，\"她说，\"每个人的生命都很珍贵。能帮他们减轻一点痛苦，我觉得很有价值。\"</p>\n<p>我看着她的眼睛，那双眼睛很清澈，没有任何杂质。</p>\n<p>三百年了，我见过很多人。有人为了钱，有人为了权，有人为了名声。但像她这样，简简单单地想要救人，还是很少见。</p>\n<p>\"苏姑娘，\"我说，\"你是个好人。\"</p>\n<p>她笑了笑，那笑容很淡，像春风拂过水面，转瞬即逝。</p>\n<p>\"你也是，\"她说，\"好好养病，别想太多。\"</p>\n<p>---</p>\n<p>第三天，我的病好了很多。</p>\n<p>烧退了，身上也有力气了。我自己起来熬了粥，吃了药，感觉整个人都活过来了。</p>\n<p>苏晚晴来的时候，看见我已经起来了，有些意外。</p>\n<p>\"你好得很快，\"她说。</p>\n<p>\"是你药好，\"我说。</p>\n<p>她给我诊了脉，点点头，\"基本好了，再吃一副药巩固一下就行。\"</p>\n<p>\"谢谢苏姑娘这几天的照顾。\"</p>\n<p>\"不客气，这是大夫该做的。\"</p>\n<p>她收拾好东西，准备走。</p>\n<p>\"苏姑娘，\"我叫住她，\"诊金多少？\"</p>\n<p>\"三两银子，\"她说，\"包括三天的药。\"</p>\n<p>我掏出银子，递给她。</p>\n<p>她接过银子，数了数，然后还了一块给我。</p>\n<p>\"多了，\"她说，\"只需要二两。\"</p>\n<p>\"剩下的是谢礼，\"我说，\"谢谢你这几天的照顾。\"</p>\n<p>她看了我一眼，\"不用谢礼，治病救人是本分。\"</p>\n<p>\"但……\"</p>\n<p>\"收着吧，\"她把银子放在床头，\"以后如果需要，可以来医馆找我。\"</p>\n<p>她转身走了。</p>\n<p>我站在那里，看着她的背影，心中有些复杂的情绪。</p>\n<p>这个女子，不贪图钱财，不势利，就只是淡淡地做着该做的事。她的淡然，让我觉得很舒服，但也让我觉得很遥远。</p>\n<p>好像无论我做什么，都无法真正接近她。</p>\n<p>---</p>\n<p>病好之后，我又在镇上待了几天。</p>\n<p>本来打算走的，但不知道为什么，总是舍不得离开。</p>\n<p>我每天都会去医馆附近走走，有时候会看见苏晚晴。她要么在诊病，要么在晒药，要么在整理医书。</p>\n<p>她很少笑，但工作时很专注，很认真。</p>\n<p>有一天，我在医馆门口站了很久，看着她在里面忙碌。</p>\n<p>她突然抬起头，看见了我。</p>\n<p>我们的目光相遇，她恍惚片刻，然后轻轻点了点头，算是打招呼。</p>\n<p>我也点了点头。</p>\n<p>她没有出来，继续忙她的。我也没有进去，转身走了。</p>\n<p>那天晚上，我喝了点酒，有点醉。</p>\n<p>我不知道自己为什么会这样。三百年了，我见过无数女人，美丽的，聪明的，热情的，温柔的。但从来没有一个人，让我这样牵肠挂肚。</p>\n<p>是因为她的淡然吗？是因为她的专注吗？还是因为她那种\"只想救人\"的纯粹？</p>\n<p>我不知道。</p>\n<p>我只知道，我想再见到她，想和她说话，想了解她。</p>\n<p>但我知道，我不能。</p>\n<p>我是一个长生者，一个历史的旁观者。我不能和任何人走得太近，不能让他们发现我的秘密。</p>\n<p>而且，她看起来那么淡然，那么自足。她不需要任何人，也不需要我。</p>\n<p>我不应该打扰她。</p>\n<p>---</p>\n<p>第五天，我决定离开。</p>\n<p>走之前，我去医馆道别。</p>\n<p>苏晚晴正在整理药材，看见我，有些意外。</p>\n<p>\"你的病好了？\"她问。</p>\n<p>\"好了，\"我说，\"我是来道别的。\"</p>\n<p>\"要走？\"</p>\n<p>\"嗯，该走了。\"</p>\n<p>她点点头，\"路上小心，天气还冷，注意保暖。\"</p>\n<p>\"谢谢。\"</p>\n<p>我转身要走，突然又回过头来。</p>\n<p>\"苏姑娘，\"我说，\"我能问你一个问题吗？\"</p>\n<p>\"问吧。\"</p>\n<p>\"你为什么一直这么……淡？\"我说，\"好像对什么都不热情，什么都不在意。\"</p>\n<p>她有些发怔，然后笑了笑。</p>\n<p>\"因为在意没有用，\"她说，\"该来的总会来，该走的总会走。与其在意，不如做好眼前的事。\"</p>\n<p>我看着她，心里有些触动。</p>\n<p>\"苏姑娘，\"我说，\"如果……我是说如果，有一天我再路过这里，还能来找你吗？\"</p>\n<p>她想了一会儿，说：\"可以。\"</p>\n<p>\"真的？\"</p>\n<p>\"真的，\"她说，\"只要你需要，随时可以来。\"</p>\n<p>我看着她的眼睛，那双眼睛很清澈，很平静，但深处似乎有一丝我看不懂的东西。</p>\n<p>\"谢谢你，\"我说，\"苏姑娘，保重。\"</p>\n<p>\"你也保重。\"</p>\n<p>我转身，走出了医馆。</p>\n<p>---</p>\n<p>那是我第一次和苏晚晴相遇。</p>\n<p>很普通，很平淡，没有什么轰轰烈烈的情节，也没有什么刻骨铭心的对话。</p>\n<p>只是一个病人，一个大夫，一场病，几天的相处。</p>\n<p>但我记住了她。</p>\n<p>记住了她的淡然，记住了她的专注，记住了她说的\"在意没有用\"。</p>\n<p>很多年后，当我再次来到这个小镇，再次走进那家医馆的时候，她已经不记得我了。</p>\n<p>但我记得她。</p>\n<p>记得这个教会我\"平淡也是幸福\"的女子。</p>\n<p>记得这个让我第一次觉得，长生也可以有意义的女子。</p>\n<p>苏晚晴，谢谢你。</p>\n<p>谢谢你让我知道，原来这个世界上，还有人这样活着。</p>\n<p>不贪图，不执着，就只是淡淡地，做好眼前的事。</p>\n<p>这就是你教我的，关于生活，关于人生，关于幸福的意义。</p>\n<p>我会一直记得。</p>\n<p>一直记得。</p>"}},{"type":"chapter","title":"第十六章 沈墨白少年","data":{"id":16,"title":"第十六章 沈墨白少年","html":"<p>我第一次预见一个人的未来，是在一个书肆里。</p>\n<p>那是个雨天。</p>\n<p>春雨连绵不绝，淅淅沥沥地下了一整天。江南的春天总是这样，雨丝细得像针，落在脸上冰凉冰凉的，渗进衣领里，黏糊糊地贴在皮肤上，让人浑身不舒服。</p>\n<p>我躲进书肆的时候，身上的青衫已经湿了一半。书肆不大，门口挂着一块褪了色的布帘，上面用毛笔写着\"万卷楼\"三个字，字迹已经有些模糊了。店里弥漫着一股陈旧的气息——陈年纸张的味道，混合着木头腐朽的霉味，还有一丝若有若无的墨香。</p>\n<p>掌柜的是个六十多岁的老头，正趴在柜台后面打盹，发出轻微的鼾声。店里没什么生意，这种天气，正经人都在家里躲雨，谁会有闲心来逛书肆。</p>\n<p>除了我，还有一个人。</p>\n<p>角落里，一个少年坐在靠窗的位置。那窗户破了一个洞，用油纸糊着，外面的雨声透过破洞传进来，沙沙作响，像是蚕在啃食桑叶。</p>\n<p>少年看起来不过十六七岁，身形清瘦，穿着一件洗得发白的蓝布衣裳，袖口已经磨出了毛边。他的头发简单地束着，插着一根普通的竹簪，没有任何装饰。眉眼很清秀，但眉心有一道浅浅的竖纹，像是常年皱着眉头留下的痕迹。</p>\n<p>我注意到他，是因为他的笔。</p>\n<p>那支笔已经磨得很秃了，笔杆上缠着一圈圈细线，显然是坏过又修补过的。但他握笔的姿势很稳，手腕悬空，每一笔落下，都有一种说不出的执拗。那不是在写字，那像是在雕刻，像是在用刻刀一笔一划地凿进木头里。</p>\n<p>我走近了一些，想看看他在写什么。</p>\n<p>他写的不是八股文，不是诗词歌赋，而是一些我看不懂的东西。有算式，有图形，还有一些奇怪的符号。那些符号排列得整整齐齐，像是一组组密码，只有他自己能读懂。</p>\n<p>\"你在写什么？\"我问。</p>\n<p>他抬起头，看了我一眼。</p>\n<p>那双眼睛很亮，亮得不像一个十六七岁的少年，更像是一个看透了很多事情的人。那里面有光，但那种光不是热情，不是希望，而是一种冷冷的、燃烧着的什么东西。</p>\n<p>\"改规矩。\"他说。</p>\n<p>声音很平静，没有任何起伏，就像是在说一件再平常不过的事情。</p>\n<p>\"什么规矩？\"</p>\n<p>\"所有的规矩。\"他低下头，继续写，笔锋在纸上游走，发出沙沙的声音，\"现在的规矩，不对。我要改。\"</p>\n<p>我恍惚片刻。</p>\n<p>一个十六七岁的少年，说现在的规矩不对，要改。这种话，不是狂妄，就是疯子。一般人听到这种话，要么会笑他年少轻狂，要么会觉得他异想天开。</p>\n<p>但他说得很平静，就像在说\"今天下雨了\"一样自然。那种平静，不是无知者的无畏，而是看透之后的笃定。</p>\n<p>我心里突然有一种很奇怪的感觉。</p>\n<p>这个人，将来会成为一个了不起的人。或者，一个可怕的人。</p>\n<p>---</p>\n<p>雨下得更大了。</p>\n<p>书肆的掌柜是个老头，坐在柜台后面打瞌睡。店里只有我和那个少年。</p>\n<p>我在他对面坐下，看着他写。</p>\n<p>\"你叫什么名字？\"我问。</p>\n<p>\"沈墨白。\"他说，头也不抬。</p>\n<p>\"墨白的墨，墨白的白？\"</p>\n<p>\"嗯。\"</p>\n<p>\"这名字......\"</p>\n<p>\"我娘取的，\"他说，\"她说我爹是个读书人，希望我也能读书做官，墨守成规。\"</p>\n<p>\"那你呢？\"</p>\n<p>他停下了笔，抬起头看着我。那双眼睛里有光，但那种光很冷，像是在看很远的地方。</p>\n<p>\"我不想墨守成规，\"他说，\"我想掀了这规矩。\"</p>\n<p>\"掀了？\"</p>\n<p>\"嗯。\"他指着面前的那些算式，\"你看，现在的赋税规矩，是按人头收的。人头多的家庭，交的就多。但有钱人可以隐瞒人口，穷人却只能硬扛。这不公平。\"</p>\n<p>我看着他。</p>\n<p>一个十六七岁的少年，在研究赋税规矩。这种话，从一个书生嘴里说出来，已经很奇怪了。更何况他还不是在抱怨，而是在想办法。</p>\n<p>\"你想怎么改？\"我问。</p>\n<p>他想了想，把面前的纸推到我这边。</p>\n<p>\"你看，\"他指着纸上的一排算式，\"现在的赋税规矩，是按人头收的。每户有多少人，就收多少税。人头多的家庭，交的就多。\"</p>\n<p>我点点头，示意他继续说。</p>\n<p>\"但这不公平，\"他的手指在纸上敲击着，发出轻微的笃笃声，\"有钱人可以隐瞒人口，把家奴说成是远房亲戚，不用交税。穷人却只能硬扛，一家五口，个个都要算人头税。最后的结果是，越穷的交得越多，越富的交得越少。\"</p>\n<p>他说得很平静，但那种平静底下，有一种压抑的愤怒。我能感觉到，这不是从书上看来的道理，这是他亲眼见过、亲身经历过的不公平。</p>\n<p>\"你想怎么改？\"我问。</p>\n<p>\"按田亩收。\"他说，\"田多的多收，田少的少收。没有田的，不收。\"</p>\n<p>\"那田怎么算？\"</p>\n<p>\"按产量算。\"他拿起笔，在纸上画了一个简单的图表，\"一亩好田，产粮十石。一亩薄田，产粮五石。好田多收，薄田少收。这样，地多的大户多交税，地少的贫户少交税，没有地的流民不用交税。\"</p>\n<p>我看着那个图。</p>\n<p>很简单，很粗糙，笔迹还有些稚嫩，但思路是对的。这是一个十六七岁的少年自己想出来的东西，没有老师教，没有书本写，全是他自己一点点琢磨出来的。</p>\n<p>\"这个想法，\"我说，\"你从哪里来的？\"</p>\n<p>\"我自己想的。\"他说，\"我爹是个账房，我从小看他算账。东家每年来收租，我爹就要算清楚每一亩田该收多少。那些规矩，我看多了，觉得不对。\"</p>\n<p>\"你跟你爹说过吗？\"</p>\n<p>\"说过。\"他的声音低了一些，眼神里闪过一丝黯淡，\"他说我疯了，让我好好读书，考功名。\"</p>\n<p>\"你考了吗？\"</p>\n<p>\"考了。\"他放下笔，看着窗外的雨。雨还在下，沙沙的声音透过破洞的油纸传进来，\"没中。\"</p>\n<p>\"几次？\"</p>\n<p>\"两次。\"他说，\"第一次，我的文章写了这个。\"他指了指面前的纸，\"考官说我不务正业，写了些奇技淫巧的东西。第二次，我写了诗词，考官说我平庸无奇，没有灵气。\"</p>\n<p>\"第三次呢？\"</p>\n<p>\"还没考。\"他转过头，看着我，眼神里有种说不出的东西，\"但我已经知道结果了。\"</p>\n<p>\"什么结果？\"</p>\n<p>\"我会一直考不中，\"他说，声音很轻，但每个字都很清楚，\"因为我的文章，他们看不懂。\"</p>\n<p>窗外的雨声突然变大了，一滴水从油纸的破洞渗进来，落在他的纸上，晕开了一小片墨迹。</p>\n<p>他看着那片墨迹，没有擦，只是静静地看着。</p>\n<p>\"他们不想看懂，\"他说，\"他们只想看他们想看的。八股文，诗词歌赋，仁义道德。他们不想看规矩有什么问题，因为规矩就是他们定的。\"</p>\n<p>我看着他。</p>\n<p>十六七岁的少年，能说出这种话，不是聪明，是太聪明了。聪明到看透了这个世界运行的规则，也看透了自己的命运。</p>\n<p>\"那你打算怎么办？\"我问。</p>\n<p>他沉默了一会儿，然后说：\"不考了。\"</p>\n<p>\"不考了？\"</p>\n<p>\"嗯。\"他点点头，\"考不上，也不想考了。考上的那些人，都是会写八股文的。我不想写八股文，我想写这个。\"</p>\n<p>他指了指面前的纸。</p>\n<p>\"我想改规矩。\"他说，\"既然考不上，那就用别的方式改。\"</p>\n<p>\"什么方式？\"</p>\n<p>他想了想，说：\"我还没想好。但我想，总会有办法的。\"</p>\n<p>窗外的雨声渐渐小了，天边的云裂开了一道缝，透出一丝灰白色的光。</p>\n<p>那个少年坐在光里，眼睛里有一种我从来没有见过的东西。</p>\n<p>不是希望，不是绝望，而是一种执拗的、燃烧着的什么东西。</p>\n<p>那一刻，我突然有一种预感。</p>\n<p>这个少年，将来会改变很多事。</p>\n<p>或者，毁掉很多事。</p>\n<p>---</p>\n<p>雨停了。</p>\n<p>天边露出一点阳光，照在书肆的木地板上，泛着淡淡的光。</p>\n<p>沈墨白收起纸笔，准备离开。</p>\n<p>\"等等，\"我叫住他，\"你这纸上的东西，能给我看看吗？\"</p>\n<p>他犹豫了一下，还是把纸递给了我。</p>\n<p>我接过来，仔细看了。</p>\n<p>那些算式，那些图形，那些符号，我看不太懂。但我能感觉到，这是一个天才在试图理解这个世界。</p>\n<p>而且，他看透了这个世界的不公平。</p>\n<p>\"你为什么想改规矩？\"我问。</p>\n<p>他站在门口，阳光照在他身上，把他的影子拉得很长。</p>\n<p>\"因为我见过不公平。\"他说，\"我爹是个好人，一辈子老老实实算账，从没出过错。结果呢？\"</p>\n<p>他停顿了一下，像是在整理思绪。</p>\n<p>\"去年，东家做生意亏了钱，亏了很大一笔。东家说是我爹算错了账，说账目有问题。我爹说没有，每一笔账他都记得清清楚楚，绝对没有算错。但东家不听，非说是他的错，扣了他三年的工钱。\"</p>\n<p>\"三年的工钱？\"我问。</p>\n<p>\"嗯。\"他点点头，\"三年的工钱，那是我爹全部的积蓄。他说要给我攒着，将来娶媳妇用，还要给我娘治病。结果一夜之间，全没了。\"</p>\n<p>他的声音很平静，但那种平静底下，有一种压抑的愤怒。那种愤怒不是突然的爆发，而是像地底的岩浆，一直在燃烧，一直在等待喷涌而出的时刻。</p>\n<p>\"我爹气不过，去找东家理论。东家说，你爱干不干，不干就滚。我爹没办法，只能忍下来。但他心里有气，吃不下饭，睡不着觉，没过两个月，就病倒了。\"</p>\n<p>\"什么病？\"</p>\n<p>\"大夫说是郁结于心，气伤了肝。\"他低下头，看着自己的手，\"但我爹知道，他不是病死的，他是被气死的。被一个不讲理的规矩，活活气死的。\"</p>\n<p>书肆里很安静，只有外面的雨声，和掌柜偶尔的鼾声。</p>\n<p>\"我娘呢？\"我说。</p>\n<p>\"也病了。\"他说，\"我爹死后，她伤心过度，一直咳嗽。请大夫来看，大夫开了最贵的药，因为知道我们家拿不出钱，想让我们欠他人情。\"</p>\n<p>\"那你怎么办？\"</p>\n<p>\"我卖了一些书，换了一点钱，先给娘抓了几副便宜的药。\"他说，\"但那些便宜的药，效果不好。娘的病，一直不见好。\"</p>\n<p>他说这些的时候，语气很平静，像是在说别人的事情。但我能感觉到，那种平静是一种伪装。在这个十六七岁的少年心里，压着太多东西。</p>\n<p>\"规矩是保护人的，\"他说，\"但现在的规矩，是保护那些制定规矩的人。东家可以随意克扣工钱，因为他有钱有势。大夫可以随意开贵药，因为他知道穷人没有选择的余地。\"</p>\n<p>他抬起头，看着我。</p>\n<p>\"这不对，\"他说，\"我想改，让规矩保护所有人。不是只保护有钱人，而是保护每一个普通人。\"</p>\n<p>我看着他的眼睛。</p>\n<p>那双眼睛里有火，一种冷冷的、燃烧着的火。那种火，我见过。在很多年后，当他成为\"墨主\"，当他掀起那场改变天下的风暴时，他眼睛里也有同样的火。</p>\n<p>但那时候，那火已经烧得太旺，连他自己都控制不住了。</p>\n<p>而现在，这火还只是一个小小的火苗，在风雨中摇曳，随时都可能熄灭。</p>\n<p>我突然有一种冲动，想要劝他放弃。告诉他，这个世界就是这样，不公平是常态，一个人的力量改变不了什么。让他好好读书，考个功名，安安稳稳地过一辈子。</p>\n<p>但我没有说。</p>\n<p>因为我知道，他不会听。</p>\n<p>而且，我说不出口。</p>\n<p>因为我见过他未来的样子。我见过那个在棋盘上说\"置之死地而后生\"的他，见过那个建立\"墨门\"、想要改天换地的他，见过那个最后把自己烧成灰烬的他。</p>\n<p>我知道，这个少年，注定要走上那条路。</p>\n<p>无论我现在说什么，都改变不了。</p>\n<p>\"你知道这有多难吗？\"我问。</p>\n<p>\"知道。\"他说，\"但我还是要做。\"</p>\n<p>\"为什么？\"</p>\n<p>他转过头，看着我。那双眼睛里的光，像是一把火，烧得很旺。</p>\n<p>\"因为如果不做，\"他说，\"我这辈子都会不甘心。\"</p>\n<p>---</p>\n<p>我看着他离开的背影，心里有一种很奇怪的感觉。</p>\n<p>我知道，这个少年，将来会成为一个了不起的人。</p>\n<p>或者，一个可怕的人。</p>\n<p>他有才华，有野心，有执念。他有改变世界的想法，也有为之付出一切的决心。</p>\n<p>但他还太年轻，太理想化。他不知道，改变规矩意味着什么。他不知道，掀了棋盘之后，会发生什么。</p>\n<p>我想起了一些历史。</p>\n<p>那些试图改变世界的理想主义者，最后都怎么样了？</p>\n<p>有的成功了，成了圣人。有的失败了，成了罪人。还有的，在成功和失败之间，把自己烧成了灰。</p>\n<p>沈墨白，会是哪一种？</p>\n<p>我不知道。</p>\n<p>但我知道，我会记住这个名字。</p>\n<p>记住这个十六七岁的少年，记住他说\"掀了这规矩\"时的眼神，记住他站在阳光下，影子被拉得很长的样子。</p>\n<p>很多年以后，当我再次见到他，他已经是天下闻名的\"墨主\"，已经有了上万追随者，已经掀起了那场改变天下的风暴。</p>\n<p>而我会想起这一天。</p>\n<p>想起这个书肆，想起这场雨，想起他说\"如果不做，我这辈子都会不甘心\"。</p>\n<p>那时我就会明白，一切都有迹可循。</p>\n<p>一切，都从这个十六七岁的少年开始。</p>\n<p>从他第一次说\"掀了这规矩\"开始。</p>\n<p>---</p>\n<p>最后一次在那个书肆见到他，是一个月后。</p>\n<p>那天他没有在写，而是坐在角落里，看着窗外发呆。</p>\n<p>\"怎么了？\"我问。</p>\n<p>\"我爹死了。\"他说。</p>\n<p>我一愣。</p>\n<p>\"东家说他贪污，把他赶出去了。我爹气不过，病倒了，没撑过去。\"他的声音很平静，像是在说一件很遥远的事。但他的手在微微发抖，握着笔的手指关节都发白了。</p>\n<p>\"你娘呢？\"</p>\n<p>\"也病了。\"他说，\"我要回家照顾她。\"</p>\n<p>\"你还回来吗？\"</p>\n<p>他想了想，说：\"会。\"</p>\n<p>\"什么时候？\"</p>\n<p>\"等我改完规矩。\"他站起身，收拾东西，动作很慢，很仔细，像是在做一件很重要的事情。他把那些写满算式的纸折好，放进怀里，贴身收着。</p>\n<p>\"等我让这天下，再也没有人像我爹那样，被冤枉，被欺负，被活活气死。\"</p>\n<p>我看着他的背影。</p>\n<p>十六七岁的少年，肩负着这样的重担。我不知道是该敬佩，还是该同情。也许两者都有。</p>\n<p>\"沈墨白，\"我叫住他，\"这个给你。\"</p>\n<p>我解下腰间的玉佩，递给他。</p>\n<p>那是一块很普通的玉佩，青白色的，雕着一朵梅花。不值什么钱，但跟了我很多年。是我刚来这个世界的时候，一个老妇人送给我的。她说，这玉佩能保平安。</p>\n<p>\"这是什么？\"他问。</p>\n<p>\"保平安的。\"我说，\"你带着，也许有用。\"</p>\n<p>他看着我，看了很久。</p>\n<p>\"为什么给我？\"他问。</p>\n<p>\"因为，\"我想了想，说，\"我觉得你会成为一个了不起的人。\"</p>\n<p>他接过玉佩，握在手里。那块玉佩在他掌心里，显得很温润。</p>\n<p>\"谢谢。\"他说，\"我会随身带着的。\"</p>\n<p>他转身，走出了书肆。</p>\n<p>阳光照在他身上，把他的影子拉得很长。那影子在地上移动，像是一个巨大的问号，又像是一个感叹号。</p>\n<p>我站在门口，看着他的背影渐渐远去，心里有一种预感。</p>\n<p>这个少年，将来会改变很多事。</p>\n<p>也会，毁掉很多事。</p>\n<p>而我，会看着这一切发生。</p>\n<p>这是长生者的命。</p>\n<p>---</p>\n<p>那天之后，我又去过那个书肆几次。</p>\n<p>有时候能见到他，有时候见不到。掌柜的说，他家里有事，来得很不规律。</p>\n<p>每次见到他，他都在写。写算式，写图形，写那些我看不懂的东西。他写得越来越多，纸上的内容也越来越复杂。</p>\n<p>我问他，这些东西有什么用。</p>\n<p>他说，有用。等他长大了，要用这些东西，改天换地。</p>\n<p>我笑了笑，没说话。</p>\n<p>一个十六七岁的少年，说要用几张纸改天换地。听起来像是疯话。</p>\n<p>但我看着他的眼睛，我知道，他不是疯子。</p>\n<p>他是认真的。</p>\n<p>而且，他真的会去做。</p>\n<p>---</p>\n<p>很多年以后，我在一场大火中，找到了那半块烧焦的玉佩。</p>\n<p>沈墨白真的随身带了它，带了很多年。</p>\n<p>直到他把自己和那座城，一起烧成灰烬。</p>\n<p>那时我才明白，那个十六七岁的少年，从书肆走出去的那一刻，就已经走上了一条不归路。</p>\n<p>一条，注定要燃烧自己的路。</p>\n<p>而我，只能在很多年后，握着那半块烧焦的玉佩，想起那个雨天，那个书肆，那个说\"掀了这规矩\"的少年。</p>\n<p>想起他说\"如果不做，我这辈子都会不甘心\"时的眼神。</p>\n<p>墨白，你这一生，到底图什么。</p>\n<p>图改规矩？规矩没改成。</p>\n<p>图公平？公平没来。</p>\n<p>图什么？</p>\n<p>我握着玉佩，在废墟里坐了一夜。</p>\n<p>天亮的时候，我想明白了。</p>\n<p>你图的，只是一口气。</p>\n<p>一口气，不甘心。</p>\n<p>不甘心这规矩，不甘心这世道，不甘心自己只能被欺负，被冤枉，被活活气死。</p>\n<p>所以你要掀了它。</p>\n<p>哪怕最后，把自己也烧进去。</p>\n<p>这是你的选择。</p>\n<p>而我，会替你记住。</p>\n<p>记住那个十六七岁的少年，记住那个雨天，记住那口气。</p>\n<p>记住，你曾经来过。</p>\n<p>曾经，想要改天换地。</p>"}},{"type":"chapter","title":"第十七章 乱世","data":{"id":17,"title":"第十七章 乱世","html":"<p>我第一次意识到，这个世界会吃人。</p>\n<p>不是比喻，是真的吃人。饥荒的时候，人吃人。战乱的时候，人杀人。瘟疫的时候，人病死，人死得像秋天的落叶，一片片往下掉，没人来得及埋。</p>\n<p>那时候我刚来这个世界不久，还不懂这些。</p>\n<p>我以为，长生是一种恩赐。以为可以慢慢看这个世界，慢慢理解它。我以为时间是朋友，会教我一切。</p>\n<p>但时间不是朋友。时间只是时间，冷漠地流逝，不管人间是太平盛世还是人间地狱。</p>\n<p>那一年，天下大乱。</p>\n<p>---</p>\n<p>我不知道那是哪一年。</p>\n<p>在这个时代，年号换来换去，皇帝死了一个又一个，谁当皇帝都无所谓，反正老百姓的日子都一样难过。没有人记得清今年是哪一年，只知道今年是灾年，明年可能更灾。</p>\n<p>我只记得，那年春天，我还在江南的一个小镇上。</p>\n<p>那个镇子叫柳溪镇，因为镇口有一条小河，河两岸种满了柳树。春天的时候，柳絮飘飞，像下雪一样，落在水面上，落在青石板路上，落在人的头发上。</p>\n<p>我喜欢那个地方。</p>\n<p>河边有一家小茶馆，老板是个六十多岁的老头，姓陈，人称陈老爹。他的茶不是什么好茶，就是普通的粗茶，但泡得很有味道。每天下午，我都会去那里坐一会儿，晒着太阳，喝着茶，看着河水流过，觉得日子还长，慢慢来。</p>\n<p>那时候，我以为这样的日子会一直持续下去。</p>\n<p>我以为，只要我活得够久，就能看尽这世间的一切美好。花开花落，春去秋来，人间烟火，岁月悠长。</p>\n<p>我太天真了。</p>\n<p>---</p>\n<p>夏天的时候，战乱来了。</p>\n<p>起先是听说北边打仗了，打得挺厉害。但江南离北边远，消息传过来的时候，已经淡得像隔夜的茶， nobody cares。</p>\n<p>镇上的老百姓该干嘛干嘛，种田的种田，做生意的做生意，好像打仗是另一个世界的事。</p>\n<p>我也一样。</p>\n<p>我继续在河边喝茶，继续在镇上闲逛，继续觉得这一切都与我无关。我是长生者，我不会死，战争再可怕，也伤不了我。</p>\n<p>但我错了。</p>\n<p>战争不会伤我，但会伤我身边的人。会伤这个镇子。会伤所有我以为是\"背景\"的那些人。</p>\n<p>而我，只能看着。</p>\n<p>---</p>\n<p>我不知道那是哪一年。在这个时代，年号换来换去，皇帝死了一个又一个，谁当皇帝都无所谓，反正老百姓的日子都一样难过。</p>\n<p>我只记得，那年春天，我还在江南的一个小镇上，晒着太阳，喝着茶，觉得日子还长，慢慢来。</p>\n<p>夏天的时候，战乱来了。</p>\n<p>起先是听说北边打仗了，打得挺厉害。但江南离北边远，消息传过来的时候，已经淡得像隔夜的茶， nobody cares。</p>\n<p>然后，流民来了。</p>\n<p>第一批流民是秋天到的。十几个人，拖家带口，衣衫褴褛，从北边一路逃过来。他们说，家乡打仗了，房子烧了，地没了，只能逃。</p>\n<p>镇上的人给了他们一些吃的，让他们在镇外的破庙里住下。</p>\n<p>那时候，我还觉得这是别人的事。战争很远，我只是个过客，看完热闹就走。</p>\n<p>但战争不会因为我觉得远就停下来。</p>\n<p>---</p>\n<p>第二批流民来的时候，已经入冬了。</p>\n<p>这次不是十几个人，是几百个人。他们像潮水一样涌进镇子，带来的是饥饿、疾病，还有恐惧。</p>\n<p>镇上开始不安了。</p>\n<p>先是粮价飞涨，一天一个价。前几天还卖三十文一斗的米，转眼就涨到了五十文，然后是八十文，然后是上百文。有钱的人开始囤积粮食，一车一车地往家里拉。没钱的人只能干看着，把口袋里的铜钱数了一遍又一遍，算着还能撑几天。</p>\n<p>陈老爹的茶馆生意也淡了。没人有心情喝茶了，大家都在为下一顿饭发愁。茶馆门口那几棵柳树，叶子开始发黄，像是感应到了什么不好的事情。</p>\n<p>街上出现了乞丐。</p>\n<p>一开始只有一个两个，坐在路边，伸出脏兮兮的手，向路人乞讨。后来变成了十个二十个，成群结队，像游魂一样在镇上游荡。他们的眼睛空洞，脸上没有表情，只剩下一种本能的渴望——饿。</p>\n<p>然后是盗贼。</p>\n<p>夜里，经常能听到打砸的声音，哭声，喊声。早上出门，能看到被撬开的门板，被砸烂的窗户。人们开始不敢出门，天一黑就锁紧房门，用木头顶住，生怕强盗进来。</p>\n<p>然后是死尸。</p>\n<p>我第一次看到人饿死。</p>\n<p>那是一个老人，躺在镇口的牌坊下面，身上盖着一张破草席。我路过的时候，以为他在睡觉。走近了才发现，他已经死了。</p>\n<p>他的身体缩成很小的一团，像是一只被抽干了气的皮囊。眼睛睁着，看着天空，眼睛里什么都没有，只有空洞。</p>\n<p>我站在那里，看了很久。</p>\n<p>这是我的同类。和我一样，会饿，会痛，会死。不同的是，我会死而复生，而他，就这样结束了。</p>\n<p>永远结束了。</p>\n<p>---</p>\n<p>镇上开始死人。</p>\n<p>先是老人，然后是小孩，然后是体弱的成年人。死因五花八门：饿死、病死、冻死、被打死。</p>\n<p>我试图帮忙。</p>\n<p>我用身上带的银子买粮食，分给那些饿肚子的人。但我的银子有限，而饥饿的人太多。我买的粮食，像是一块石头扔进大海，连水花都没溅起来。</p>\n<p>我想看病。我懂一些医术，可以给病人开方子。但药铺里的药材早就卖光了，大夫们要么跑了，要么自己也病了。我开的方子，没有药，就是一张废纸。</p>\n<p>我想安慰那些失去亲人的人。但我发现，我根本不知道该说什么。</p>\n<p>\"节哀顺变\"？他们连饭都吃不上，哪有心情节哀。</p>\n<p>\"一切都会好起来的\"？我自己都不相信。</p>\n<p>我什么都做不了。</p>\n<p>---</p>\n<p>最可怕的不是死亡，是人性的崩塌。</p>\n<p>一开始，人们还互相帮忙。这家给那家一口粥，那家帮这家抬个尸体。陈老爹把茶馆里剩下的米拿出来，熬成粥，分给那些饿肚子的人。我也在帮忙，用自己身上的银子买粮食，分给需要的人。</p>\n<p>但很快，粮食越来越少，人们开始为自己考虑。</p>\n<p>我记得有一天，我去买米。米铺门口排了很长的队，人们手里拿着铜钱、碎银，甚至是首饰，等着换一袋米。队伍里有老人，有小孩，有孕妇，有抱着婴儿的母亲。</p>\n<p>米铺的掌柜是个胖子，满脸油光，站在柜台后面，看着这些人，像是在看一群待宰的羔羊。</p>\n<p>\"米价涨了，\"他说，\"现在要两百文一斗。\"</p>\n<p>人群里发出一阵哀叹。两百文一斗，是普通人家半个月的收入。很多人拿不出这么多钱，只能转身离开。</p>\n<p>我看着那些人离开的背影，心里很难受。</p>\n<p>我想把自己的银子拿出来，帮那些人买米。但我只有那么一点银子，帮得了这个，帮不了那个。而且，就算我今天帮了他们，明天呢？后天呢？</p>\n<p>我救不了所有人。</p>\n<p>然后是争抢。</p>\n<p>粮价越来越高，人们开始争抢。为了半块馒头，打得头破血流。为了一袋米，杀人。</p>\n<p>我亲眼看见，两个男人为了争夺一袋小米，在镇外的雪地里打滚。一个是年轻力壮的汉子，一个是头发花白的老兵。老兵显然不是年轻人的对手，几下就被打倒在地，但他死死地抓着米袋不放。</p>\n<p>\"这是我用命换来的！\"老兵嘶吼着，声音嘶哑，\"我打了十年仗，就换来这一袋米！\"</p>\n<p>年轻人不说话，只是一拳一拳地打。最后，老兵松开了手，年轻人夺过米袋，转身就跑。</p>\n<p>老兵躺在雪地里，满脸是血，眼神空洞。他看着年轻人跑走的方向，嘴唇动了动，像是在说什么，但没有声音。</p>\n<p>我走过去，想扶他起来。但他推开我的手。</p>\n<p>\"不用了，\"他说，声音很平静，像是在说一件很平常的事，\"反正都要死的。\"</p>\n<p>他说得对。反正都要死的。</p>\n<p>在这个乱世里，每个人都是风中的蜡烛，随时都可能熄灭。强壮的，弱小的，善良的，邪恶的，最后都一样。</p>\n<p>都会死。</p>\n<p>区别只是，早死还是晚死，饿死还是病死，被人杀死还是自然死亡。</p>\n<p>我蹲在雪地里，看着那个老兵。他的呼吸越来越弱，最后完全停止了。他的眼睛还睁着，看着灰蒙蒙的天空，像是在质问什么。</p>\n<p>我没有答案。</p>\n<p>我只能替他合上眼睛，把他埋在雪地里。</p>\n<p>没有墓碑，只有一个小小的雪堆。过几天，雪化了，就什么都没有了。</p>\n<p>就像他从来没有存在过一样。</p>\n<p>---</p>\n<p>冬天最冷的时候，瘟疫来了。</p>\n<p>先是几个人发烧，然后是一群人，然后是整个镇子。人们开始咳嗽，咳得撕心裂肺，咳出血。然后是高烧，说胡话，然后死去。</p>\n<p>没有人敢靠近病人。健康的人把自己关在家里，用布条塞住门缝，不敢出门。病死的人就躺在街上，没人收尸，任野狗啃食。</p>\n<p>整个镇子变成了一座死城。</p>\n<p>我还活着。</p>\n<p>不是因为我的身体比别人好，而是因为我的体质特殊。我不会病死，我会死而复生。</p>\n<p>但我看着那些人死去，心里空空的，像是被人挖走了一块。</p>\n<p>我开始怀疑，长生到底有什么意义。</p>\n<p>如果我只能眼睁睁看着别人死去，如果我什么都改变不了，如果我只是在不断地目睹死亡和离别，那我还活着干什么？</p>\n<p>只是为了看更多的死亡吗？</p>\n<p>---</p>\n<p>镇子上的最后一个人死去的时候，是深冬。</p>\n<p>那天的雪下得很大，鹅毛一样，纷纷扬扬，把整个世界都染成了白色。我走在镇子的街道上，脚印深深地陷进雪里，发出咯吱咯吱的声音。</p>\n<p>街道上空无一人。</p>\n<p>所有的店铺都关着门，有的门上还贴着封条，不知道主人是死了还是跑了。风从街角吹过，卷起地上的积雪，像是一条白色的龙在游荡。</p>\n<p>我在找一个孩子。</p>\n<p>前几天，我在镇子东头的一间破屋里，发现了一个小孩。七八岁的样子，父母都死了，一个人躺在破屋里，发着高烧。我给他留下了一点水和干粮，说会再回来看他。</p>\n<p>但我被一些事情耽误了。镇子西边有人打架，我去劝架，结果被打伤了——当然，伤很快就好了，但耽误了时间。</p>\n<p>等我忙完，已经是三天后。</p>\n<p>我匆忙赶到那间破屋，推开门，一股腐臭的气味扑面而来。</p>\n<p>那个孩子还在那里，躺在一张破草席上，身上盖着一张更破的被子。他看见我，眼睛里闪过一丝光，像是很久没见过活人了。</p>\n<p>但他的眼神已经涣散了。</p>\n<p>\"叔叔......\"他伸出手，那只手瘦得像鸡爪，皮肤包着骨头，\"我饿......\"</p>\n<p>他的声音像蚊子一样轻，轻得几乎听不见。</p>\n<p>\"等着，\"我说，\"我去给你找吃的。\"</p>\n<p>我跑遍整个镇子，找不到一点吃的。米铺被抢光了，粮仓被烧光了，连树皮都被扒光了。镇子里已经没有活人了，只有尸体，和吃尸体的野狗。</p>\n<p>我回到破屋，那个孩子已经死了。</p>\n<p>他保持着伸手的姿势，眼睛还睁着，看着门口。他在等我回来，等我给他带吃的。他一定等了很久，从希望等到绝望，从清醒等到昏迷，最后死在了等待中。</p>\n<p>但我没有带回来。</p>\n<p>我坐在那里，看着他，坐了一夜。</p>\n<p>外面的雪还在下，覆盖了整个镇子，覆盖了这个孩子的身体，覆盖了所有的尸体和废墟。天地间一片洁白，像是什么都没有发生过。</p>\n<p>但我知道，发生过。</p>\n<p>那些饥饿，那些恐惧，那些死亡，那些绝望，都真实地发生过。只是现在，被雪掩盖了。</p>\n<p>天快亮的时候，我把孩子抱起来，走到镇外的山坡上。那里有一片空地，能看到整个镇子。我用双手挖了一个坑，把孩子放进去。</p>\n<p>雪很厚，挖起来很费劲。我的手冻僵了，破了皮，流了血，但我没有停。</p>\n<p>最后，我把坑填上，堆起一个小小的土堆。</p>\n<p>我站在土堆前，不知道该说什么。</p>\n<p>对不起？有用么？</p>\n<p>走好？他去哪里走？</p>\n<p>安息？这个世界，谁能安息？</p>\n<p>我站了很久，直到太阳升起来，照在那片雪地上，反射出刺眼的光。</p>\n<p>然后，我转身走了。</p>\n<p>天亮的时候，我把他的眼睛合上，把他埋在了镇外的山坡上。没有墓碑，只有一个小土堆。</p>\n<p>我站在土堆前，不知道该说什么。</p>\n<p>对不起？有用么？</p>\n<p>走好？他去哪里走？</p>\n<p>安息？这个世界，谁能安息？</p>\n<p>---</p>\n<p>春天来的时候，我离开了那个镇子。</p>\n<p>镇子已经空了。一千多人，最后只剩下我一个。我站在镇口，回头看了一眼，那些破败的房屋，那些无人的街道，那些新坟旧冢。</p>\n<p>然后，我转身走了。</p>\n<p>我没有回头。</p>\n<p>因为我知道，如果回头看，我会崩溃。</p>\n<p>那是我第一次意识到，乱世会吃人。不是吃一个两个人，是吃掉整个镇子，整个村子，整座城市。</p>\n<p>而我，只能看着。</p>\n<p>---</p>\n<p>很多年以后，我再路过那个地方。</p>\n<p>镇子已经重建了，有了新的房子，新的人，新的热闹。那些死难者被遗忘了，连那个小土堆都不见了。</p>\n<p>我站在当年的位置上，看着眼前的一切，心里有一种很奇怪的感觉。</p>\n<p>像是，那一切都只是一场梦。</p>\n<p>那个饿死的老兵，那个为米杀人的壮汉，那个等我带吃的回来却没能等到的小孩。他们都像是从未存在过，被时间抹去了，连痕迹都没留下。</p>\n<p>但我记得。</p>\n<p>我记得他们每一个人。记得他们的脸，他们的声音，他们死去时的样子。</p>\n<p>因为我是长生者。我记得所有我看过的死亡。</p>\n<p>这是我的诅咒，也是我的使命。</p>\n<p>他们先走一步，我替他们看着这世界。</p>\n<p>看着这世界变好，或者变坏。</p>\n<p>看着这乱世，会不会再来。</p>\n<p>而我，会一直在这里。</p>\n<p>看着。</p>\n<p>记住。</p>\n<p>替那些死去的人，继续活下去。</p>"}},{"type":"chapter","title":"第十八章 第一个十年","data":{"id":18,"title":"第十八章 第一个十年","html":"<p>我花了十年时间，才学会做一个旁观者。</p>\n<p>不是不想参与，是不能参与。不是不想改变，是改变不了。</p>\n<p>这是长生者的第一课，也是最痛的一课。</p>\n<p>---</p>\n<p>离开柳溪镇的时候，我心里憋着一口气。</p>\n<p>那口气是愤怒，是不甘，是\"我明明可以做些什么\"的自责。它堵在胸口，像是一块烧红的炭，烫得我睡不着觉，吃不下饭。</p>\n<p>我在雪地里走了三天三夜，没有停。寒风像刀子一样割在脸上，雪花钻进衣领，融化成水，又冻成冰。但我没有感觉，或者说，我不让自己有感觉。</p>\n<p>身体上的痛苦，可以让我暂时忘记心里的痛苦。</p>\n<p>三天后，我倒在了一个破庙里。那庙早就荒废了，屋顶塌了一半，佛像缺了胳膊，香炉里积满了雨水，结了冰。我躺在冰冷的地面上，听着外面呼啸的风声，终于哭了出来。</p>\n<p>不是为了那个死去的孩子，不是为了柳溪镇的那些人。</p>\n<p>是为了我自己。</p>\n<p>为了我的无力，为了我的软弱，为了我只能眼睁睁看着却什么都做不了的事实。</p>\n<p>我哭了很久，哭到没有力气，哭到睡着。</p>\n<p>醒来的时候，天已经亮了。阳光从破屋顶的洞里照进来，照在我脸上，暖洋洋的。</p>\n<p>我坐起来，擦干眼泪，告诉自己：下一次，我一定不会再袖手旁观。</p>\n<p>我要救人，我要改变，我要让这个世界变得更好。</p>\n<p>我太天真了。</p>\n<p>---</p>\n<p>第一个尝试，是在一个山村。</p>\n<p>那年夏天，我路过一个偏僻的山村。那个村子叫清水村，在群山环抱之中，本该是个世外桃源。但那年大旱，从春天到夏天，一滴雨都没下。</p>\n<p>我进村的时候，看到的情景让我心惊。</p>\n<p>田地龟裂，像是老人的脸，沟壑纵横。庄稼早就枯死了，玉米秆干瘪地站在那里，风一吹就断。村口的老槐树，叶子掉光了，只剩下光秃秃的枝桠，伸向天空，像是在求救。</p>\n<p>村民们一个个面黄肌瘦，眼窝深陷。他们已经没有力气劳作了，只是坐在自家门口，等着，不知道在等什么。也许是等雨，也许是等死。</p>\n<p>村长是个五十多岁的老头，姓王，满脸皱纹，像是干旱的土地。他接待了我，给我倒了一碗水——那水浑浊发黄，带着一股泥腥味，但在这时候，比金子还珍贵。</p>\n<p>\"贵客，\"他说，声音嘶哑，\"您懂得多，有没有什么办法？\"</p>\n<p>我捧着那碗水，没有喝。</p>\n<p>我想了想，说：\"可以挖渠，把山那边河里的水引过来。\"</p>\n<p>\"挖渠？\"他微微一怔，浑浊的眼睛里闪过一丝光，\"那得挖多远？\"</p>\n<p>\"大概十里地。\"我说，\"但一劳永逸，以后就不用担心旱灾了。\"</p>\n<p>村长想了想，答应了。</p>\n<p>第二天，我带着村里的青壮年，开始挖渠。</p>\n<p>那是我这一生中，最辛苦的三个月。</p>\n<p>每天天不亮就起床，扛着锄头铁锹，走到山那边。然后在烈日下，在坚硬的山石里，一锄头一锄头地开凿。太阳毒辣得像火，烤得人头晕目眩。汗水流进眼睛里，刺痛得睁不开。手上的血泡起了又破，破了又起，最后变成了厚厚的茧。</p>\n<p>但我没有停。</p>\n<p>每当我想放弃的时候，我就会想起柳溪镇的那个孩子。想起他伸出手，说\"我饿\"的样子。想起他等我回来，等到死去的样子。</p>\n<p>我不能让同样的事情再发生。</p>\n<p>三个月后，渠挖通了。</p>\n<p>那是一个清晨，当第一股河水顺着渠道流进村里的时候，所有人都哭了。村民们跪在田边，捧着那浑浊的河水，像是捧着最珍贵的宝物。</p>\n<p>村长握着我的手，老泪纵横。</p>\n<p>\"恩人，\"他说，\"你是我们全村的恩人。我们世世代代都会记住您。\"</p>\n<p>我看着流淌的河水，心里有一种前所未有的满足感。</p>\n<p>原来，我可以改变一些事情。原来，长生不是用来旁观的，是用来做这些事的。</p>\n<p>那一刻，我觉得自己找到了答案。</p>\n<p>找到了长生者的使命。</p>\n<p>我太高兴了，高兴得忘了一件事。</p>\n<p>天谴。</p>\n<p>---</p>\n<p>那天晚上，我病倒了。</p>\n<p>不是普通的病，是从骨头里渗出来的痛。像是有人用锤子一下一下地敲打着我的脊椎，又像是无数只蚂蚁在啃食我的内脏。</p>\n<p>我在床上躺了三天三夜，痛得死去活来，意识模糊。</p>\n<p>第四天，痛突然消失了。</p>\n<p>我爬起来，浑身是汗，虚弱得像刚生了一场大病。但我知道，这不是病，这是警告。</p>\n<p>天道在警告我：不要试图改变历史。</p>\n<p>我挖的那条渠，改变了这个村子的命运。原本这个村子应该因为旱灾而迁徙，原本这些人应该流离失所，成为流民。但现在，他们留下来了，他们活下来了。</p>\n<p>历史被改变了。</p>\n<p>而我，付出了代价。</p>\n<p>---</p>\n<p>我不甘心。</p>\n<p>我不相信，做好事也要受惩罚。我不相信，救人也是错的。</p>\n<p>我决定再试一次。</p>\n<p>这次，是在一个城镇。那里正在闹瘟疫，和柳溪镇一样，但规模更大，更可怕。</p>\n<p>我懂医术，我知道怎么治疗这种病。我挨家挨户地给病人看病，开方子，熬药。我不收一分钱，只是想让更多人活下来。</p>\n<p>十天里，我救了三个人。</p>\n<p>但当我救第四个人的时候，天谴来了。</p>\n<p>这次更猛烈。我当场吐血，倒在地上，痛得蜷缩成一团。周围的人吓得四散奔逃，以为我也染上了瘟疫。</p>\n<p>我在地上躺了一天一夜，才慢慢恢复过来。</p>\n<p>那个我没有救成的人，死了。</p>\n<p>我躺在地上，看着他死去，无能为力。</p>\n<p>那一刻，我明白了。</p>\n<p>我可以救一些人，但不能救所有人。我可以改变一些小事情，但不能改变大事情。</p>\n<p>天道有它的规矩，而我，必须遵守。</p>\n<p>---</p>\n<p>之后的几年，我开始学会控制。</p>\n<p>不再试图改变什么，只是看着。看着人们生，看着人们死，看着历史按照它既定的轨迹前进。</p>\n<p>我告诉自己，这是长生的代价。既然得到了不死之身，就必须接受这些限制。</p>\n<p>但我心里始终有一团火，烧得我很痛。</p>\n<p>那团火是愧疚，是自责，是\"我本可以\"的遗憾。</p>\n<p>---</p>\n<p>第四年，我路过一个被洪水冲毁的村庄。</p>\n<p>那场洪水来得突然，一夜之间，整个村子被淹没。等我赶到的时候，水已经退了，但村子里一片狼藉。房屋倒塌，田地冲毁，牲畜死伤殆尽。</p>\n<p>人们在废墟中翻找，试图找回一些还能用的东西。一个妇人坐在路边，怀里抱着一个布包，神情呆滞。我走过去，发现那布包里是一个婴儿，已经死了。</p>\n<p>\"能帮我埋了他吗？\"妇人看着我，眼神空洞，\"我没力气了。\"</p>\n<p>我接过那个婴儿，小小的身体已经僵硬了。我在村外挖了一个坑，把他埋了。没有墓碑，只有一个小小的土堆。</p>\n<p>妇人跪在土堆前，没有哭，只是静静地看着。</p>\n<p>\"谢谢。\"她说，\"你是好人。\"</p>\n<p>我想说什么，但说不出口。</p>\n<p>我不是好人。如果我真的是好人，我就应该救这个孩子。但我没有。我只是在他死后，帮他挖了一个坑。</p>\n<p>这算什么好人？</p>\n<p>那天晚上，我在村外的山坡上坐了一夜。</p>\n<p>看着满天的星星，我想起了很多。想起了柳溪镇，想起了清水村，想起了那些我救不了的人。</p>\n<p>我开始怀疑，长生到底有什么意义。</p>\n<p>如果我只能眼睁睁看着别人死去，如果我什么都改变不了，如果我只是在不断地目睹死亡和离别，那我还活着干什么？</p>\n<p>只是为了看更多的死亡吗？</p>\n<p>那个问题，我找不到答案。</p>\n<p>但我必须继续活着。</p>\n<p>无论如何，必须活下去。</p>\n<p>---</p>\n<p>第五年，我遇到了一个老人。</p>\n<p>那是在一个客栈里，我独自喝酒。客栈很小，很破旧，墙皮剥落，露出里面的黄土。但酒是自家酿的，很烈，一口下去，从喉咙烧到胃里。</p>\n<p>一个老人坐到了我对面。</p>\n<p>他看起来七八十岁了，白发苍苍，但精神很好，眼睛里有光。那种光，不是年轻人的那种炽热，而是一种历经沧桑后的通透。</p>\n<p>\"年轻人，\"他说，\"你看起来有心事。\"</p>\n<p>我苦笑了一下。在他面前，我确实是个年轻人。三百岁对八十岁，不知道年轻了多少倍。</p>\n<p>\"我在想，\"我说，\"人活着，到底是为了什么。\"</p>\n<p>老人笑了笑，给自己倒了一杯酒。他的手很稳，没有老人的那种颤抖。</p>\n<p>\"为了活着。\"他说。</p>\n<p>\"就这么简单？\"</p>\n<p>\"就这么简单。\"他喝了一口酒，咂了咂嘴，\"你看这酒，好喝吗？\"</p>\n<p>我点点头。</p>\n<p>\"那就喝。你看这菜，好吃吗？\"</p>\n<p>我又点点头。</p>\n<p>\"那就吃。人活着，不就是为了这些吗？吃好，喝好，睡个好觉，见见朋友，看看风景。别的，都是虚的。\"</p>\n<p>我沉默了一会儿，说：\"但如果看到有人受苦，有人死去，怎么办？\"</p>\n<p>老人看着我，眼神很平静。那种平静，不是冷漠，而是看透。</p>\n<p>\"你能救所有人吗？\"他问。</p>\n<p>\"不能。\"</p>\n<p>\"那你能救一个人吗？\"</p>\n<p>我想了想，说：\"能，但会有代价。\"</p>\n<p>\"什么代价？\"</p>\n<p>\"痛苦。\"我说，\"很痛苦的惩罚。\"</p>\n<p>老人点点头，像是明白了什么。他没有问我为什么会有这种奇怪的惩罚，也没有质疑我话里的真实性。他只是静静地听着，然后思考。</p>\n<p>\"那你选择救还是不救？\"他问。</p>\n<p>我愣住了。</p>\n<p>这个问题，我从来没有认真想过。每一次，我都是凭着本能去救人，然后承受惩罚。但我从来没有想过，我也可以选择不救。</p>\n<p>\"我......\"我张了张嘴，不知道该说什么。</p>\n<p>老人笑了笑，拍了拍我的肩膀。他的手很温暖，很有力。</p>\n<p>\"年轻人，\"他说，\"救人是你的选择，承受代价也是你的选择。没有人逼你。但如果你选择了救人，就不要抱怨代价。如果你选择了不救，也不要自责。\"</p>\n<p>他站起身，往外走去。他的背有些驼，但步伐很稳。</p>\n<p>\"人活着，最重要的是心安。\"他说，\"只要你做的事，对得起自己的心，就行了。\"</p>\n<p>我看着他的背影，心里像是被什么东西击中了一样。</p>\n<p>心安。</p>\n<p>这两个字，简单，却很难做到。</p>\n<p>但那一刻，我似乎明白了一些什么。</p>\n<p>---</p>\n<p>之后的几年，我开始尝试另一种活法。</p>\n<p>不再试图改变历史，但也不再完全旁观。在不会引起天谴的范围内，做一些力所能及的事。</p>\n<p>给迷路的人指个路。</p>\n<p>给饥饿的人一口饭吃。</p>\n<p>给濒死的人一些安慰。</p>\n<p>这些事情不会改变历史，不会引起天谴，但可以让我的心里好受一些。</p>\n<p>我开始明白，长生者的使命，不是改变历史，而是见证历史。</p>\n<p>见证那些普通人的生死，记住他们的故事，替他们继续看这个世界。</p>\n<p>这是我唯一能做的。</p>\n<p>也是我必须做的。</p>\n<p>---</p>\n<p>第十年的秋天，我回到了柳溪镇。</p>\n<p>那个镇子已经重建了，有了新的房子，新的人，新的热闹。当年那些死难者被遗忘了，连我埋的那个孩子的土堆都不见了。</p>\n<p>我站在镇口，看着眼前的一切，心里有一种很奇怪的感觉。</p>\n<p>像是，那一切都只是一场梦。</p>\n<p>那个饿死的老兵，那个为米杀人的壮汉，那个等我带吃的回来却没能等到的小孩。他们都像是从未存在过，被时间抹去了，连痕迹都没留下。</p>\n<p>但我知道，他们存在过。</p>\n<p>我记得他们每一个人。记得他们的脸，他们的声音，他们死去时的样子。</p>\n<p>因为我是长生者。我记得所有我看过的死亡。</p>\n<p>这是我的诅咒，也是我的使命。</p>\n<p>他们先走一步，我替他们看着这世界。</p>\n<p>看着这世界变好，或者变坏。</p>\n<p>看着这乱世，会不会再来。</p>\n<p>而我，会一直在这里。</p>\n<p>看着。</p>\n<p>记住。</p>\n<p>替那些死去的人，继续活下去。</p>\n<p>---</p>\n<p>十年后，我不再是那个天真的年轻人了。</p>\n<p>我学会了接受，学会了放下，学会了在不改变历史的前提下，做一些力所能及的事。</p>\n<p>但我也学会了另一件事。</p>\n<p>不要和任何人走得太近。</p>\n<p>因为无论我多努力，他们都会死。而我，会活着，记住他们的死。</p>\n<p>这是我给自己定下的规矩。</p>\n<p>也是我这三百年来，一直遵守的规矩。</p>\n<p>直到，我遇到了小石头。</p>\n<p>但那是后来的事了。</p>\n<p>在第一个十年结束的时候，我还是一个人，孤独地走在漫长的路上，寻找着某种我自己也不知道的答案。</p>\n<p>那时候，我还没有找到。</p>\n<p>但我一直在找。</p>\n<p>这就是长生者的生活。</p>\n<p>漫长，孤独，但从未停止寻找。</p>"}},{"type":"chapter","title":"第十九章 第一次告别","data":{"id":19,"title":"第十九章 第一次告别","html":"<p>我第一次知道，长生最痛的不是死不了，而是看着别人死。</p>\n<p>尤其是那些你关心的人，那些你放在心里的人。他们走了，你还得活着，记住他们，想念他们，直到自己也分不清，记忆是财富还是诅咒。</p>\n<p>三百年来，我经历过无数死亡。战乱的、瘟疫的、饥荒的，死得各种各样。但那些死亡，都是别人的死亡，是\"背景\"，是\"数字\"。</p>\n<p>直到周伯。</p>\n<p>周伯让我明白，死亡不是数字，是一个活生生的人，从此消失不见。</p>\n<p>而且，我必须活着，记住这种消失。</p>\n<p>记住一辈子。</p>\n<p>---</p>\n<p>那个老人，是在我第七年遇到的。</p>\n<p>不是那个教我\"心安\"的老人，是另一个。一个普通的、平凡的、却在某个时刻照亮了我的生命的老人。</p>\n<p>他叫周伯，是个木匠。</p>\n<p>那个镇子叫青木镇，因为镇上有很多古树，参天蔽日，把整个镇子都笼罩在绿荫里。夏天的时候，走在街上都不用打伞，树叶把阳光过滤得斑驳陆离，落在地上，像是一地的碎金子。</p>\n<p>我在那里停留了三个月，住在一家叫\"青松居\"的客栈里。客栈不大，但干净，老板娘是个热心肠的中年妇人，做的饭菜也很可口。</p>\n<p>每天出门，我都会经过周伯的木工铺。</p>\n<p>那铺子很小，藏在两棵大槐树中间，门口堆着木屑，像是一座座小小的雪山。空气中飘着松香的味道，混合着木头的清香，闻起来让人心安。</p>\n<p>铺子的门楣上挂着一块匾，上面写着\"周记木作\"三个字，字迹已经有些模糊了，但还能看出当年的气势。</p>\n<p>周伯六十多岁，头发花白，但身体硬朗。他总是坐在铺子里，穿着一身灰色的粗布衣裳，腰间系着一条油渍斑斑的围裙。他拿着凿子和锤子，叮叮当当地敲着什么，动作很慢，但很有节奏，像是一种古老的乐曲。</p>\n<p>有时候他在做桌椅，刨子在木头上滑动，刨花卷曲着飞出来，一片片落在地上。有时候他在修门窗，用刨子找平，用凿子开榫，一丝不苟。有时候他只是做一些小玩意儿，给小孩子玩的木鸟、木狗、木马，雕得栩栩如生，连羽毛和毛发都清晰可见。</p>\n<p>我喜欢看他干活。</p>\n<p>那种专注，那种沉稳，那种对木头深深的热爱，让我觉得很羡慕。我也想有一件事，能让我如此专注，如此热爱，不计得失，不求回报。</p>\n<p>但我没有。</p>\n<p>我只是一个长生者，一个注定要在时间的长河里漂泊的孤魂。</p>\n<p>我喜欢看他干活。</p>\n<p>他的手很巧，一块普通的木头，在他手里很快就能变成栩栩如生的东西。他不需要图纸，心里想什么，手上就能做出什么。</p>\n<p>\"喜欢？\"有一天，他抬起头，看见我站在门口，笑着问。</p>\n<p>我点点头。</p>\n<p>\"进来坐。\"他指了指铺子里的一条长凳，\"别站在外面，挡着我光线。\"</p>\n<p>我走进去，坐在长凳上。那是我第一次走进他的铺子。</p>\n<p>铺子里很乱，到处都是木头、工具、刨花。但乱中有序，每样东西都放在它该在的地方。墙上挂着一排做好的小玩意儿：木马、木鸟、木船、木人。</p>\n<p>\"这些都是您做的？\"我问。</p>\n<p>\"嗯。\"他拿起一块木头，开始用刨子刨，\"闲着没事，做来玩儿。\"</p>\n<p>\"卖给孩子们？\"</p>\n<p>\"送。\"他说，\"镇上孩子喜欢，我就送给他们。\"</p>\n<p>\"不收钱？\"</p>\n<p>\"收钱干嘛。\"他笑了笑，\"我又不缺那点钱。看着孩子们高兴，比收钱强。\"</p>\n<p>我看着他的手，那双手粗糙，布满老茧，但动作很稳，很准。刨子在木头上滑动，刨花卷曲着飞出来，像是盛开的花朵。</p>\n<p>\"您做了多少年木匠了？\"我问。</p>\n<p>\"四十多年。\"他说，\"从十五岁学徒到现在，没干过别的。\"</p>\n<p>\"不厌烦？\"</p>\n<p>他停下手中的活，想了想，说：\"厌烦过。年轻的时候，觉得做木匠没出息，想去做点大事。后来想明白了，什么是大事？\"</p>\n<p>\"您想明白了吗？\"</p>\n<p>\"想明白了。\"他继续刨木头，\"大事就是，把手里的活做好。今天比昨天做得好，今年比去年做得好。这就够了。\"</p>\n<p>我看着他，心里有一种很奇怪的感觉。</p>\n<p>这个老人，没有什么学问，没有什么抱负，只是一个普通的木匠。但他说的这些话，比那些读书人说的都有道理。</p>\n<p>\"您有家人吗？\"我问。</p>\n<p>\"有过。\"他的动作顿了一下，\"老伴儿五年前走了。儿子在城里做生意，很少回来。\"</p>\n<p>\"您一个人？\"</p>\n<p>\"一个人。\"他说，\"习惯了。\"</p>\n<p>---</p>\n<p>那之后，我经常去周伯的铺子。</p>\n<p>有时候带一壶酒，有时候带一些点心。我们坐在铺子里，他干活，我看着，偶尔说说话。</p>\n<p>他说他的往事，我说我的见闻。当然，我说的是编造的见闻，关于远方的地方，关于奇奇怪怪的人。我不能告诉他真相，不能告诉他我活了三百年。</p>\n<p>但他似乎并不在意我说的是真是假。他只是喜欢有人陪着，有人听他说话。</p>\n<p>\"你见过大海吗？\"有一天，他问我。</p>\n<p>\"见过。\"我说。</p>\n<p>\"大海是什么样的？\"</p>\n<p>\"很大，很大。\"我想了想，说，\"站在海边，看不到边际。海水是蓝色的，但有时候是绿色的，有时候是灰色的，看天气。\"</p>\n<p>\"海上有船吗？\"</p>\n<p>\"有。很大的船，比房子还大，能在海上漂几个月不落地。\"</p>\n<p>他停下手中的活，眼睛亮晶晶的：\"真的？那船上的人吃什么？喝什么？\"</p>\n<p>\"带水，带粮食。还有钓鱼，吃海里的鱼。\"</p>\n<p>\"那要是遇到风暴呢？\"</p>\n<p>\"那就危险了。\"我说，\"风暴来的时候，浪比山还高，船随时可能翻。\"</p>\n<p>他沉默了，似乎在想象那个场景。</p>\n<p>\"我这辈子，最远只去过县城。\"他说，声音里有些遗憾，\"大海，只在书上看过。\"</p>\n<p>\"您想去吗？\"我问。</p>\n<p>他笑了笑，摇摇头：\"老了，走不动了。而且，我走了，谁来看铺子？\"</p>\n<p>\"您可以关了铺子，去走走。\"</p>\n<p>\"关铺子？\"他像是听到了什么笑话，\"这铺子我开了四十年，关一天我都睡不着。\"</p>\n<p>我看着他的手，那双粗糙的手，上面布满老茧和伤痕。那是四十年的痕迹，是岁月和劳作刻下的印记。</p>\n<p>\"您后悔吗？\"我问，\"一辈子只做这一件事？\"</p>\n<p>他想了想，说：\"不后悔。我爹也是木匠，我爷爷的爷爷也是木匠。我们周家，世代做木匠。这手艺，是老祖宗传下来的，我得传下去。\"</p>\n<p>\"传给谁？\"</p>\n<p>他的眼神黯淡了一下：\"儿子不愿意学。他说做木匠没出息，要去做生意。\"</p>\n<p>\"您不怪他？\"</p>\n<p>\"怪什么？\"他笑了笑，\"人各有志。他想做生意，就去做。我只要他过得好，就行。\"</p>\n<p>我看着他的笑容，心头泛起酸楚。</p>\n<p>这个老人，一辈子守着这个铺子，守着这份手艺，最后却没有人传承。他的儿子在城里做生意，很少回来看他。他一个人，守着满屋子的木头和工具，慢慢老去。</p>\n<p>这就是人生吗？</p>\n<p>付出一切，最后什么都留不下？</p>\n<p>\"你有没有想过，\"有一天，他突然问我，\"以后怎么办？\"</p>\n<p>\"什么以后？\"</p>\n<p>\"你总是一个人到处走，没有家，没有根。\"他说，\"年纪轻轻的，应该成个家，安定下来。\"</p>\n<p>我笑了笑，没有回答。</p>\n<p>成家？安定？</p>\n<p>我倒是想。但我不能。我不能和任何人走得太近，不能让他们发现我的秘密。更重要的是，我不能看着他们老去、死去，而我还在原地。</p>\n<p>那种痛苦，我承受不起。</p>\n<p>但看着周伯关切的眼神，我说不出口。</p>\n<p>\"缘分未到。\"我说。</p>\n<p>他摇摇头，叹了口气：\"你们年轻人，总是这样说。等缘分，等到什么时候？\"</p>\n<p>我不知道该怎么回答。</p>\n<p>---</p>\n<p>第九年的春天，周伯病了。</p>\n<p>起初只是咳嗽，他以为是着凉，没在意。后来越咳越厉害，开始咳血。我让他去看大夫，他说没事，老毛病了，吃点药就好。</p>\n<p>但药没有起作用。</p>\n<p>我请镇上的大夫来看，大夫把完脉，摇摇头，把我拉到一边。</p>\n<p>\"肺痨。\"他说，\"拖得太久了，没法治。\"</p>\n<p>\"还能撑多久？\"我问。</p>\n<p>大夫看了我一眼，眼神里有同情：\"几个月吧。好好养着，少受点罪。\"</p>\n<p>我回到铺子里，周伯坐在椅子上，还在试图用刨子刨一块木头。但他的手在抖，刨子不听使唤，在木头上划出歪歪扭扭的痕迹。</p>\n<p>\"大夫怎么说？\"他问，声音很平静。</p>\n<p>我看着他，不知道该不该说实话。</p>\n<p>\"您知道？\"我问。</p>\n<p>他笑了笑，放下刨子：\"我自己的身子，自己知道。这病，咳了半年了，能好早就好了。\"</p>\n<p>\"您为什么不说？\"</p>\n<p>\"说什么？\"他看着我，\"说了又能怎样？该来的总会来。\"</p>\n<p>他的身体一天天消瘦下去，原本硬朗的身板，变得佝偻。脸上的皱纹更深了，眼窝陷下去，眼睛里却依然有光。</p>\n<p>手上的力气也不行了，握着凿子会发抖，再也做不出那些精巧的东西。但他还是每天坐在铺子里，看着那些木头，有时候摸一摸，像是在抚摸自己的孩子。</p>\n<p>我每天都去看他，给他带药，带吃的，陪他聊天。</p>\n<p>\"你不用天天来。\"他说，\"我没事。\"</p>\n<p>\"我想来。\"我说。</p>\n<p>他看着我，眼神很温和：\"你是个好孩子。虽然来历不明，但心肠好。\"</p>\n<p>我苦笑。好孩子？我活了三百岁，杀过人，见过无数死亡，甚至亲手埋葬过自己的朋友。</p>\n<p>我不是好孩子。我只是一个长生者，一个注定要不断告别的怪物。</p>\n<p>但看着他苍老的脸，我说不出口。</p>\n<p>---</p>\n<p>他的病情恶化得很快。</p>\n<p>一个月后，他已经起不了床了。我每天去他家里，给他熬药，喂他吃饭，帮他擦身。</p>\n<p>\"你回去吧。\"有一天，他说，\"别把时间浪费在我这个将死的人身上。\"</p>\n<p>\"我不觉得是浪费。\"我说。</p>\n<p>他看着我，眼神有些复杂：\"你为什么要对我这么好？\"</p>\n<p>我没有回答。</p>\n<p>因为我自己也不知道。</p>\n<p>也许是因为他让我想起了什么。想起了那些被遗忘的温暖，想起了人与人之间最简单的连接。</p>\n<p>也许是因为，我在他身上，看到了一种我无法拥有的东西。</p>\n<p>一种平凡，但完整的人生。</p>\n<p>\"你走吧。\"他说，\"在我死之前，走吧。不要看着我死。\"</p>\n<p>\"为什么？\"</p>\n<p>\"因为我不想让你记住我现在的样子。\"他说，声音很轻，\"我想让你记住的，是我在铺子里干活的样子的，是我说话的样子，是我笑的样子。\"</p>\n<p>\"不是现在这个，躺在床上的，等死的样子。\"</p>\n<p>我看着他的眼睛，那双眼睛依然清澈，依然温和。</p>\n<p>\"我不走。\"我说。</p>\n<p>他叹了口气，没有再劝。</p>\n<p>---</p>\n<p>他走的那天，是个晴朗的下午。</p>\n<p>我像往常一样去看他，推开门，发现屋里很安静。阳光从窗户照进来，照在他的床上，在他身上镀了一层金边。</p>\n<p>他躺在床上，盖着被子，闭着眼睛，像是睡着了。</p>\n<p>但我知道，他没有睡着。</p>\n<p>我走过去，握住他的手。那双手冰凉，没有温度，已经僵硬了。</p>\n<p>\"周伯？\"我轻声叫。</p>\n<p>没有回应。</p>\n<p>我又叫了一声，还是没有回应。</p>\n<p>他走了。</p>\n<p>平静地，安详地，像是睡着了一样，离开了这个世界。</p>\n<p>我坐在床边，握着他的手，坐了很久。</p>\n<p>外面阳光明媚，鸟儿在叫，街上的孩子在嬉笑。一切都和往常一样，但对我来说，有什么东西永远地改变了。</p>\n<p>这是我第一次，真正失去一个朋友。</p>\n<p>---</p>\n<p>他走的那天，是个晴朗的下午。</p>\n<p>我像往常一样去看他，推开门，发现屋里很安静。他躺在床上，盖着被子，闭着眼睛，像是睡着了。</p>\n<p>但我知道，他没有睡着。</p>\n<p>我走过去，握住他的手。那双手冰凉，没有温度。</p>\n<p>\"周伯？\"我轻声叫。</p>\n<p>没有回应。</p>\n<p>我又叫了一声，还是没有回应。</p>\n<p>他走了。</p>\n<p>平静地，安详地，像是睡着了一样，离开了这个世界。</p>\n<p>我坐在床边，握着他的手，坐了很久。</p>\n<p>外面阳光明媚，鸟儿在叫，街上的孩子在嬉笑。一切都和往常一样，但对我来说，有什么东西永远地改变了。</p>\n<p>这是我第一次，真正失去一个朋友。</p>\n<p>不是因为战乱，不是因为瘟疫，不是因为任何外力。只是因为时间，只是因为他老了，走到了生命的尽头。</p>\n<p>而我，还在这里。</p>\n<p>我还活着，还在年轻，还在看着这个世界。</p>\n<p>但他不在了。</p>\n<p>永远不在了。</p>\n<p>---</p>\n<p>我把他葬在镇外的山坡上，面对着他铺子的方向。</p>\n<p>下葬那天，他的儿子从城里赶回来了。一个四十多岁的中年人，穿着绸缎衣裳，一看就是做生意发了财。</p>\n<p>他哭得撕心裂肺，说自己不孝，没有好好照顾父亲。</p>\n<p>我站在旁边，没有哭。</p>\n<p>我已经哭不出来了。</p>\n<p>我只是看着那个土堆，想着周伯生前的样子。想着他坐在铺子里，叮叮当当地敲着木头。想着他说\"大事就是把手里的活做好\"。想着他劝我成个家，安定下来。</p>\n<p>那些画面，像是一把刀，一刀一刀地割着我的心。</p>\n<p>但我没有哭。</p>\n<p>我只是站在那里，直到所有人都走了，直到天色暗下来，直到月亮升起来。</p>\n<p>然后，我跪在坟前，轻声说：\"周伯，谢谢您。\"</p>\n<p>谢谢您，让我知道，原来普通人也可以活得这么充实。</p>\n<p>谢谢您，让我明白，大事不是什么轰轰烈烈，而是把手里的活做好。</p>\n<p>谢谢您，陪我度过那段日子。</p>\n<p>我会记住您的。</p>\n<p>一直记住。</p>\n<p>---</p>\n<p>那天晚上，我在周伯的铺子里坐了一夜。</p>\n<p>铺子已经被他儿子锁上了，我翻墙进去。月光从窗户照进来，照在那些木偶、木马、木船上。</p>\n<p>我拿起一个木鸟，那是周伯生前最后做的东西，还没有完工。鸟的身体已经雕好了，但翅膀还差一只。</p>\n<p>我坐在他的椅子上，拿起他的工具，试着把那只翅膀做完。</p>\n<p>但我做不到。</p>\n<p>我的手在抖，眼泪终于流了下来。</p>\n<p>我不是在哭周伯。我是在哭我自己。</p>\n<p>哭我这三百年的孤独，哭我注定要继续下去的孤独，哭我要不断面对这种离别，直到永远。</p>\n<p>周伯说得对，我应该成个家，安定下来。</p>\n<p>但我不能。</p>\n<p>因为我是长生者。因为我不能看着我的家人老去、死去。因为我不能承受这种痛苦，一次又一次。</p>\n<p>那一夜，我做了一个决定。</p>\n<p>不再和任何人走得太近。不再交朋友，不再投入感情，不再让自己陷入这种离别的痛苦。</p>\n<p>我要做一个真正的旁观者。</p>\n<p>看着这个世界，记住这个世界，但不属于这个世界。</p>\n<p>这是长生的代价。</p>\n<p>这是我必须接受的命运。</p>\n<p>---</p>\n<p>天亮的时候，我离开了那个镇子。</p>\n<p>我没有回头。</p>\n<p>周伯的铺子，周伯的坟，周伯的笑容，都被我留在了身后。</p>\n<p>但它们也永远留在了我心里。</p>\n<p>那是我第一次真正的告别。</p>\n<p>第一次明白，长生意味着什么。</p>\n<p>意味着你会失去所有人，意味着你会记住所有人的死亡，意味着你会在这个世界上，越来越孤独。</p>\n<p>但我也记住了周伯的话。</p>\n<p>\"大事就是，把手里的活做好。\"</p>\n<p>我的活，就是继续活下去。继续看着这个世界，继续记住那些逝去的人。</p>\n<p>这是我唯一能做的。</p>\n<p>也是我必须做的。</p>\n<p>周伯，谢谢您。</p>\n<p>谢谢您让我明白，原来平凡的人生也可以这么充实。谢谢您让我知道，即使是一个普通的木匠，也可以活得有尊严，有意义。</p>\n<p>谢谢您，在我最迷茫的时候，陪我说过话。</p>\n<p>我会继续活下去。</p>\n<p>替您，替所有人，继续看这个世界。</p>\n<p>我会记住您做的那些木鸟、木马、木人。记住您铺子里的松香味。记住您说话的声音，笑的样子，干活的专注。</p>\n<p>我会记住所有的一切。</p>\n<p>直到我也死去的那一天。</p>\n<p>但那一天，永远不会来。</p>\n<p>所以我只能继续活着，继续记住，继续告别。</p>\n<p>一次又一次。</p>\n<p>直到时间尽头。</p>\n<p>周伯，这是我作为长生者的命运。</p>\n<p>我会接受的。</p>\n<p>但请您原谅，在往后的日子里，我可能不会再像对您这样，对任何人敞开心扉了。</p>\n<p>因为那种痛苦，我承受不起。</p>\n<p>承受不起，再失去一个像您这样的人。</p>\n<p>承受不起，再做一个最后的告别。</p>\n<p>所以，请让我把这份记忆，封存在心底。</p>\n<p>让它成为我最后一次，真正的动情。</p>\n<p>从今以后，我会是一个旁观者。</p>\n<p>看着这世界，但不属于这世界。</p>\n<p>这是您教会我的，最后的道理。</p>"}},{"type":"chapter","title":"第二十章 老者","data":{"id":20,"title":"第二十章 老者","html":"<p>我第一次领悟到长生的意义，是因为一碗粥。</p>\n<p>一碗白米粥，熬得软糯香甜，上面浮着一层米油，在晨光中泛着柔和的光。</p>\n<p>那碗粥，改变了我对生命的理解。</p>\n<p>也让我明白，长生不是诅咒，而是一种恩赐。不是要我背负着所有的死亡活下去，而是要我学会，在每一个当下找到活着的意义。</p>\n<p>---</p>\n<p>离开青木镇后，我走了很远的路。</p>\n<p>没有目的，没有方向，只是走。走过山川，走过河流，走过城镇和村庄。我像一个游魂，飘荡在这片土地上，不知道该去哪里，也不知道该做什么。</p>\n<p>周伯的死，让我陷入了深深的迷茫。</p>\n<p>我开始怀疑，长生到底有什么意义。如果注定要不断失去，如果注定只能旁观，如果注定越来越孤独，那我还活着干什么？</p>\n<p>我找不到答案。</p>\n<p>所以我只能走，不停地走，希望能在某个地方，找到那个答案。</p>\n<p>---</p>\n<p>那是第十一年的冬天。</p>\n<p>北方的冬天来得特别早，刚入冬，雪就下起来了。一开始是小雪，零零星星，像是柳絮飘飞。后来变成了大雪，鹅毛一样，铺天盖地，把整个天地都染成了白色。</p>\n<p>我走在山路上，雪花落在脸上，冰冷刺骨。风从领口灌进来，像是有无数把小刀在割着皮肤。我身上的衣服已经很旧了，补丁摞着补丁，根本挡不住风寒。</p>\n<p>但我还是走，一步一步，踩在厚厚的积雪上，发出咯吱咯吱的声音。</p>\n<p>我不知道我要去哪里。我只知道，我不能停。一旦停下来，那些念头就会涌上来。关于周伯，关于柳溪镇，关于所有我失去的人。那些念头会像毒蛇一样，缠绕着我的心，让我无法呼吸。</p>\n<p>所以我只能走。</p>\n<p>---</p>\n<p>那是第十一年的冬天。</p>\n<p>我来到了一个偏僻的山村。</p>\n<p>---</p>\n<p>那是第十一年的冬天。</p>\n<p>我来到了一个偏僻的山村。村子很小，只有十几户人家，散落在山谷里，像是大地上长出的几棵野草。</p>\n<p>天很冷，下着雪，我身上的衣服已经湿透了，又冻成了冰。我需要一个地方避寒，需要一口热乎的东西暖暖身子。</p>\n<p>村里没有客栈，只有几间破旧的茅屋。我敲了几户人家的门，都没有人应。也许是天冷，人们都躲在家里不愿出来。也许是对陌生人保持警惕。</p>\n<p>最后一户，是一个独居老人的家。</p>\n<p>那屋子比其他的更破旧，屋顶的茅草已经腐烂，墙上裂着缝，风从缝里灌进来，发出呜呜的声音。但烟囱里冒着烟，说明里面有人。</p>\n<p>我敲了敲门。</p>\n<p>\"谁？\"里面传来一个苍老的声音。</p>\n<p>\"过路人，\"我说，\"想讨口热水喝。\"</p>\n<p>门吱呀一声开了，一个老人出现在门口。</p>\n<p>他看起来有七八十岁了，背有些驼，但精神还好。脸上布满皱纹，像是风干的树皮，但眼睛很亮，很清澈。</p>\n<p>\"进来吧。\"他说，侧身让开。</p>\n<p>我走进屋子，一股暖意扑面而来。</p>\n<p>屋子很小，很简陋，只有一张床，一张桌子，几把椅子，一个灶台。但收拾得很干净，每样东西都放在该放的地方。灶台上坐着一口锅，锅里冒着热气，发出咕嘟咕嘟的声音。</p>\n<p>\"在熬粥，\"老人说，\"一起吃？\"</p>\n<p>\"那太麻烦您了。\"</p>\n<p>\"不麻烦，\"他说，\"反正一个人也吃不完。\"</p>\n<p>我在桌子边坐下，看着他忙碌。</p>\n<p>他从锅里舀出两碗粥，放在桌上。粥是白米粥，熬得很烂，米粒都开花了，黏稠适中。最上面浮着一层米油，乳白色的，在火光映照下泛着柔和的光。</p>\n<p>\"吃吧。\"他说，把一碗推到我面前。</p>\n<p>我端起碗，喝了一口。</p>\n<p>那一瞬间，我愣住了。</p>\n<p>我已经很久很久没有喝过这么香的粥了。</p>\n<p>不是因为这粥里加了什么特别的材料，恰恰相反，这就是最普通的白米粥，米是水，水是米，没有任何花样。但那种味道，那种纯粹的、朴实的、温暖的味道，让我想起了很多。</p>\n<p>想起了小时候，想起了母亲，想起了那些曾经被我遗忘的温暖。</p>\n<p>\"好喝吗？\"老人问。</p>\n<p>我点点头，眼眶有些发热。</p>\n<p>\"慢点喝，\"他说，\"粥要慢慢喝，才能喝出味道。\"</p>\n<p>---</p>\n<p>我们静静地喝着粥，谁都没有说话。</p>\n<p>屋子里很安静，只有外面风雪的声音，和锅里粥沸腾的声音。那种安静，不是空虚的安静，而是一种充实的、饱满的安静。</p>\n<p>喝完粥，老人给我倒了一杯热茶。</p>\n<p>\"年轻人，\"他说，\"你看起来有心事。\"</p>\n<p>我苦笑了一下。又是这句话。我已经听了很多遍，从不同的人嘴里。</p>\n<p>\"我在想，\"我说，\"人活着，到底是为了什么。\"</p>\n<p>老人笑了笑，那笑容很温和，像是冬日的阳光。</p>\n<p>\"你觉得呢？\"他问。</p>\n<p>\"我不知道。\"我说，\"我以为我知道，但现在我不知道了。\"</p>\n<p>\"你之前以为是什么？\"</p>\n<p>我想了想，说：\"我以为，人活着是为了做一些大事。是为了改变什么，是为了留下什么。但现在我发现，我什么都改变不了，什么都留不下。\"</p>\n<p>老人点点头，没有说话。</p>\n<p>\"我看到很多人在死去，\"我继续说，\"我想救他们，但我救不了。我关心的人，一个个离开，而我还在这里。我不知道这有什么意义。\"</p>\n<p>老人沉默了一会儿，然后问：\"你可曾好好喝过一碗粥？\"</p>\n<p>我愣住了。</p>\n<p>\"什么？\"</p>\n<p>\"我问你，\"他看着我的眼睛，\"你可曾好好喝过一碗粥？\"</p>\n<p>我不知道该怎么回答。</p>\n<p>\"我......\"我张了张嘴，\"我喝过粥。\"</p>\n<p>\"但你不曾好好喝过，\"他说，\"你的心不在这碗粥上。你在想着别的事，想着过去，想着未来，想着那些你救不了的人。你没有想着这碗粥。\"</p>\n<p>我沉默了。</p>\n<p>他说得对。</p>\n<p>我喝过无数碗粥，但从来没有好好喝过。我的心总是在别处，在远方，在那些我无法掌控的事情上。我喝粥，只是为了填饱肚子，为了活下去，而不是为了喝粥本身。</p>\n<p>\"年轻人，\"老人说，\"你活得太急了。\"</p>\n<p>\"太急了？\"</p>\n<p>\"嗯。\"他点点头，\"你总是在赶路，总是在想事情，总是在担心什么。你没有停下来，好好看看这个世界，好好感受一下生活。\"</p>\n<p>他指了指面前的粥碗。</p>\n<p>\"就像这碗粥，你喝它的时候，你有没有想过，这米是从哪里来的？这水是从哪里来的？熬粥的火候，是怎么掌握的？你有没有想过，这碗粥里，有多少人的心血？\"</p>\n<p>我摇摇头。</p>\n<p>\"农民种稻，商人卖米，我打柴烧水，慢慢熬制。\"他说，\"这一碗粥，凝结了无数人的劳动。你喝它的时候，应该感恩，应该珍惜，应该品味。但你没有，你只是急匆匆地喝完，然后想着下一件事。\"</p>\n<p>我低下头，看着空了的粥碗，心里有些惭愧。</p>\n<p>他说得对。我一直都是这样，活得太急，太赶，太焦虑。我总是想着要做什么，要达成什么，要证明什么。我从来没有停下来，好好享受当下的这一刻。</p>\n<p>我想起了过去的日子。</p>\n<p>想起那些在柳溪镇的日子，我喝着茶，看着河水，心里却在想着怎么救人。想起那些在清水村的日子，我挖着渠，流着汗，心里却在想着怎么改变历史。想起和周伯在一起的日子，我看着他说话，心里却在想着怎么告别。</p>\n<p>我从来没有真正地活在当下。</p>\n<p>从来没有。</p>\n<p>\"人活着，不是为了改变什么，也不是为了留下什么，\"老人说，\"人活活着，就是为了活着。就是为了好好喝一碗粥，好好晒一次太阳，好好看一次花开。\"</p>\n<p>\"但这些有什么意义？\"我问，\"如果只是吃喝，人和动物有什么区别？\"</p>\n<p>\"意义？\"他笑了笑，\"意义就在这些事情本身。你喝粥的时候，粥就是意义。你晒太阳的时候，阳光就是意义。你不需要去别处寻找意义，意义就在当下。\"</p>\n<p>\"可我......\"我犹豫了一下，\"我总觉得，我应该做一些更有意义的事情。\"</p>\n<p>\"什么是有意义的事情？\"他问。</p>\n<p>\"救人，\"我说，\"改变世界，留下一些东西。\"</p>\n<p>\"那你做到了吗？\"</p>\n<p>我沉默了一会儿，摇摇头：\"没有。我试过，但我做不到。\"</p>\n<p>\"为什么做不到？\"</p>\n<p>\"因为......\"我想起了那些天谴，那些痛苦，\"因为有些事情，我改变不了。\"</p>\n<p>老人点点头，像是明白了什么。</p>\n<p>\"那你为什么不接受呢？\"他问，\"接受你改变不了的事实，然后在你能改变的范围内，好好活着。\"</p>\n<p>\"但我......\"</p>\n<p>\"你活得太累了，\"他说，\"你想要承担太多，想要改变太多。但你是人，不是神。你能做的有限，那就做你能做的。不能做的，就放下。\"</p>\n<p>他看着我，眼神很温和，但也很坚定。</p>\n<p>\"年轻人，\"他说，\"你要学会放下。放下那些你无法改变的事情，放下那些让你痛苦的执念。只有这样，你才能真正地活着。\"</p>\n<p>我看着他，心里像是被什么东西击中了一样。</p>\n<p>放下。</p>\n<p>是的，我需要放下。放下对周伯的愧疚，放下对柳溪镇的自责，放下那些我无法改变的过去。我需要学会接受，学会和解，学会在每一个当下找到平静。</p>\n<p>\"谢谢您，\"我说，声音有些哽咽，\"您让我明白了很多。\"</p>\n<p>\"我什么都没做，\"他说，\"只是请你喝了碗粥。\"</p>\n<p>\"但就是这样一碗粥，\"我说，\"让我看到了我一直忽略的东西。\"</p>\n<p>他笑了笑，没有说话。</p>\n<p>我们继续喝着粥，屋子里很安静，只有外面风雪的声音。但那种安静，不再让我感到空虚，而是让我感到一种前所未有的平静。</p>\n<p>也许，这就是我一直在寻找的东西。</p>\n<p>不是答案，不是意义，只是平静。</p>\n<p>只是活在当下，好好喝一碗粥的平静。</p>\n<p>---</p>\n<p>那天晚上，我在老人的屋里住了一晚。</p>\n<p>他只有一张床，但他坚持让我睡床上，自己睡在一张破椅子上。我说不用，我可以睡地上，但他不同意。</p>\n<p>\"你赶路辛苦，需要休息。\"他说，\"我老了，睡哪里都一样。\"</p>\n<p>我躺在床上，听着外面的风雪声，心里有一种很奇怪的感觉。</p>\n<p>这个老人，和我非亲非故，却愿意把床让给我，愿意给我熬粥，愿意听我说话。他不求回报，只是单纯地帮助别人。</p>\n<p>为什么？</p>\n<p>第二天早上，我问他。</p>\n<p>\"为什么对我这么好？\"我问，\"您甚至不认识我。\"</p>\n<p>老人正在熬粥，闻言停下手中的活，看着我。</p>\n<p>\"需要理由吗？\"他问。</p>\n<p>\"不需要吗？\"</p>\n<p>他笑了笑，继续搅动锅里的粥。</p>\n<p>\"年轻人，\"他说，\"你问太多为什么了。有些事，不需要为什么。我帮你，是因为我想帮你。我熬粥，是因为我想熬粥。就这么简单。\"</p>\n<p>\"但如果我骗您呢？如果我是个坏人呢？\"</p>\n<p>\"那你就是个坏人，\"他说，\"但这不影响我帮你。我帮的是此刻的你，不是过去也不是未来的你。\"</p>\n<p>我看着他，心里像是被什么东西击中了一样。</p>\n<p>此刻。</p>\n<p>是的，我总是想着过去，想着未来，却从来没有活在当下。我总是为已经发生的事情后悔，为尚未发生的事情担忧，却从来没有好好体验当下的这一刻。</p>\n<p>\"您活得通透。\"我说。</p>\n<p>\"不是通透，\"他说，\"是简单。人活得太复杂，就会累。简单一点，反而轻松。\"</p>\n<p>---</p>\n<p>吃完早饭，我准备离开。</p>\n<p>老人送我到门口，递给我一个布包。</p>\n<p>\"这是？\"我问。</p>\n<p>\"几个饼子，路上吃。\"他说，\"还有一小罐腌菜，配饼子好吃。\"</p>\n<p>\"这......\"</p>\n<p>\"拿着吧，\"他说，\"反正我一个人也吃不完。\"</p>\n<p>我接过布包，心里暖暖的。</p>\n<p>\"谢谢您，\"我说，\"您教会了我很多。\"</p>\n<p>\"我什么都没教，\"他说，\"只是请你喝了碗粥。\"</p>\n<p>\"但就是这样一碗粥，\"我说，\"让我明白了很多。\"</p>\n<p>他看着我，眼神很温和。</p>\n<p>\"年轻人，\"他说，\"我不知道你经历了什么，也不知道你为什么这么痛苦。但我想告诉你，无论你活多久，无论你经历什么，都别忘了好好喝一碗粥。\"</p>\n<p>\"好好喝一碗粥？\"</p>\n<p>\"嗯。\"他点点头，\"活在当下，感恩当下，珍惜当下。这就是活着的意义。\"</p>\n<p>我站在那里，看着他，突然有种想要流泪的冲动。</p>\n<p>这个普通的老人，这个住在破旧茅屋里的老人，用一碗粥，解开了我心里的结。</p>\n<p>\"谢谢您。\"我深深地鞠了一躬。</p>\n<p>他笑了笑，摆摆手：\"走吧，路还长。\"</p>\n<p>---</p>\n<p>我走出村子，走在雪地里，心里前所未有的轻松。</p>\n<p>雪还在下，但不再觉得冷。风还在吹，但不再觉得刺骨。我走在白色的世界里，脚步轻快，像是一个卸下了重担的旅人。</p>\n<p>我想起了老人说的话。</p>\n<p>\"好好喝一碗粥。\"</p>\n<p>是的，我要学会好好喝一碗粥。学会活在当下，学会感恩，学会珍惜。</p>\n<p>长生不是用来改变什么的，也不是用来见证什么的。长生就是长生，就是比普通人活得更久，看得更多。</p>\n<p>但这不意味着我要背负着所有的死亡和离别活下去。我可以选择轻装上阵，可以选择在每一个当下找到意义，可以选择用一颗平静的心，去面对漫长的岁月。</p>\n<p>那位老人，我不知道他叫什么名字，也不知道他现在是否还在世。但我知道，他改变了我的命运。</p>\n<p>用一碗粥。</p>\n<p>一碗白米粥，熬得软糯香甜，上面浮着一层米油。</p>\n<p>那是我喝过的，最好喝的粥。</p>\n<p>也是我领悟到的，最重要的道理。</p>\n<p>---</p>\n<p>很多年以后，我又路过了那个村子。</p>\n<p>村子已经变了，茅屋变成了瓦房，小路变成了大道。我找到了那间破茅屋的位置，但茅屋已经不在了，取而代之的是一座新盖的房子。</p>\n<p>我敲了敲门，一个中年妇人出来，问我找谁。</p>\n<p>我说，我找一个老人，很多年前住在这里的，喜欢熬粥的老人。</p>\n<p>妇人想了想，摇摇头：\"没听说过。这里以前是个荒地，后来才建的房子。\"</p>\n<p>我站在那里，有些失落。</p>\n<p>那位老人，像是从未存在过一样，消失在了时间里。没有人记得他，没有人知道他曾经在这样一个寒冷的冬日，请一个陌生的过路人喝过一碗粥。</p>\n<p>但我记得。</p>\n<p>我记得他的样子，记得他的话，记得那碗粥的味道。</p>\n<p>我记得他说\"好好喝一碗粥\"时的眼神，记得他说\"人活着就是为了活着\"时的平静。</p>\n<p>我记得所有的一切。</p>\n<p>因为我是长生者，我记得所有温暖过我的瞬间。</p>\n<p>---</p>\n<p>从此往后，无论我走到哪里，无论我经历什么，我都会记得那位老人的话。</p>\n<p>好好喝一碗粥。</p>\n<p>活在当下，感恩当下，珍惜当下。</p>\n<p>这就是我作为长生者的使命。</p>\n<p>不是改变历史，不是拯救世界，只是好好活着，好好感受，好好记住。</p>\n<p>记住每一碗粥的温暖，记住每一次日出的美好，记住每一个对我微笑的人。</p>\n<p>然后，带着这些记忆，继续走下去。</p>\n<p>走下去，直到时间的尽头。</p>\n<p>那位老人，谢谢您。</p>\n<p>谢谢您用一碗粥，点醒了我。</p>\n<p>让我明白，长生不是诅咒，而是一种恩赐。</p>\n<p>让我明白，活着的意义，就在活着本身。</p>\n<p>我会好好活下去的。</p>\n<p>好好喝每一碗粥，好好过每一天。</p>\n<p>这就是我对您的，最好的回报。</p>"}},{"type":"chapter","title":"第二十一章 第一次救人","data":{"id":21,"title":"第二十一章 第一次救人","html":"<p>我第一次主动选择救人，是在明白代价之后。</p>\n<p>不是因为冲动，不是因为不忍，而是因为我选择了救。我知道会有惩罚，我知道会痛苦，但我还是要救。</p>\n<p>这是老者的教诲之后，我做的第一个选择。</p>\n<p>也是我真正学会\"心安\"的开始。</p>\n<p>---</p>\n<p>离开那个山村后，我继续走着。</p>\n<p>但心境已经不同了。</p>\n<p>以前的我，走路是为了逃避，是为了忘记，是为了让自己没有时间去想那些痛苦的事情。我走得很快，很急，像是在逃命。</p>\n<p>现在的 me，走路是为了感受，是为了体验，是为了好好看看这个世界。我走得慢了，看到什么都想停下来看看。</p>\n<p>路边的一朵花，天上的一朵云，田里的一头牛，我都想多看几眼。</p>\n<p>因为我终于明白，这些就是活着的意义。</p>\n<p>不是要改变什么，不是要留下什么，只是要看着，感受着，记住着。</p>\n<p>---</p>\n<p>那是第十二年的春天。</p>\n<p>我来到了一个县城，叫清河县城。县城不大，但很热闹，街上人来人往，店铺林立，叫卖声此起彼伏。</p>\n<p>有卖布的，卖米的，卖肉的，卖菜的。有铁匠铺，叮叮当当地敲着；有茶馆，里面坐满了喝茶聊天的人；有戏台，几个戏子正在咿咿呀呀地唱。</p>\n<p>我在一家叫\"平安居\"的客栈住下，准备休息几天。</p>\n<p>第一天，我在街上闲逛，看看这个，摸摸那个，像个刚进城的乡下人。但我乐在其中。</p>\n<p>我停在卖糖人的摊子前，看那个老师傅用糖浆画出各种各样的动物。龙、凤、虎、马，栩栩如生。我买了一个糖兔子，拿在手里，舍不得吃。</p>\n<p>我停在书摊前，翻看那些泛黄的古籍。有些书我读过，有些没有。我买了一本《本草纲目》，准备晚上看看。</p>\n<p>我停在河边，看着河水缓缓流过，柳絮飘落在水面上，像是一叶叶小舟。</p>\n<p>这一天，我什么都没做，只是看，只是感受。</p>\n<p>但心里，很满足。</p>\n<p>---</p>\n<p>第二天，我听说了一件事。</p>\n<p>早上，我在客栈的大堂里吃早饭，听到旁边一桌人在议论。</p>\n<p>\"听说了吗？刘家少爷快不行了。\"</p>\n<p>\"哪个刘家？\"</p>\n<p>\"还能哪个？县城最大的那个刘家，做丝绸生意的。\"</p>\n<p>\"刘子安？那个年轻轻的公子哥？\"</p>\n<p>\"就是他。听说得了怪病，请了很多大夫都治不好，现在躺在床上，出气多进气少，眼看就不行了。\"</p>\n<p>\"可惜了，才二十岁吧？\"</p>\n<p>\"是啊，还没成亲呢。刘老爷急坏了，到处求医问药，贴出告示说，谁能救他儿子，赏银千两。\"</p>\n<p>\"千两？那可是天文数字。\"</p>\n<p>\"是啊，但谁能救呢？那么多大夫都束手无策。\"</p>\n<p>我听完，没有在意。</p>\n<p>这种消息，我听过太多。大户人家的公子得了重病，悬赏求医，最后要么病死，要么遇到神医救活。与我无关。</p>\n<p>我是长生者，不是神医。我不会为了千两银子去冒险，也不会为了出风头而去逞能。</p>\n<p>我只想好好喝我的粥，好好晒我的太阳，好好过我的日子。</p>\n<p>但命运，似乎不想让我如意。</p>\n<p>---</p>\n<p>第二天下午，我在街上遇到了一个人。</p>\n<p>---</p>\n<p>那是一个老妇人，六十多岁，衣衫褴褛，坐在路边乞讨。</p>\n<p>我路过的时候，她抬起头，看了我一眼。</p>\n<p>那一眼，让我停下了脚步。</p>\n<p>因为她的眼神，和我很像。那种绝望，那种痛苦，那种对未来的恐惧。我在镜子里看过太多次。</p>\n<p>我蹲下来，问她：\"老人家，您怎么了？\"</p>\n<p>她看着我，眼泪突然就流了下来。</p>\n<p>\"我孙子......\"她说，声音嘶哑，\"我孙子要死了......\"</p>\n<p>\"您孙子？\"</p>\n<p>\"刘子安......\"她说，\"我是刘家的奶娘，子安是我奶大的......他现在要死了，我......我......\"</p>\n<p>她说不下去了，只是哭。</p>\n<p>我站在那里，心中五味杂陈。</p>\n<p>刘子安，那个大户人家的公子。原来这个老妇人，是他的奶娘。</p>\n<p>\"大夫怎么说？\"我问。</p>\n<p>\"说是肺痈，\"老妇人说，\"治不好了......少爷才二十岁，还没成亲，还没生子，怎么就......\"</p>\n<p>肺痈。</p>\n<p>我心里一动。</p>\n<p>我知道这个病。在现代医学里，这叫肺脓肿，是肺部感染化脓引起的。在古代，这确实是绝症，因为没法开刀引流，抗生素更是没有。</p>\n<p>但我知道一种治疗方法。</p>\n<p>一种古法，用特殊的草药配伍，配合针灸，可以引流脓液，控制感染。</p>\n<p>我懂医术，我懂针灸，我知道那个方子。</p>\n<p>我可以救他。</p>\n<p>但......</p>\n<p>我想起了天谴。</p>\n<p>---</p>\n<p>我站在那里，心里挣扎着。</p>\n<p>救，还是不救？</p>\n<p>如果救，我会遭受天谴。那种痛苦，我经历过，知道有多可怕。全身像是被撕裂，内脏像是被火烧，痛不欲生。</p>\n<p>而且，这一次可能更严重。因为刘子安是个重要的人物吗？他的死活，会不会改变历史？我不知道。</p>\n<p>但如果不救......</p>\n<p>我看着眼前的老妇人，看着她哭得撕心裂肺的样子，想起了周伯。</p>\n<p>想起了周伯死的时候，我也这样无能为力。</p>\n<p>想起了柳溪镇那个孩子，等我带吃的回来，等到死去。</p>\n<p>我想起了一切我曾经想救，却没有救成的人。</p>\n<p>老者说过，救人是我的选择，承受代价也是我的选择。没有人逼我。但如果我选择了救人，就不要抱怨代价。</p>\n<p>我深吸一口气。</p>\n<p>\"我可以试试，\"我说，\"带我去见刘公子。\"</p>\n<p>老妇人愣住了，然后狂喜：\"真的？您能救少爷？\"</p>\n<p>\"我不能保证，\"我说，\"但我可以试一试。\"</p>\n<p>---</p>\n<p>刘家人一开始不相信我。</p>\n<p>我穿着普通，貌不惊人，看起来就像是一个过路的江湖郎中。但当他们听说我是奶娘请来的，而且我说\"不救活不收钱\"，他们决定让我试试。</p>\n<p>反正，刘子安已经奄奄一息了，再坏还能坏到哪里去？</p>\n<p>我走进刘子安的卧室，看到了那个年轻人。</p>\n<p>他躺在床上，脸色苍白，呼吸急促，胸口剧烈起伏。他的额头上全是汗，嘴唇干裂，眼窝深陷。</p>\n<p>才二十岁，却像是已经走到了生命的尽头。</p>\n<p>我坐在床边，给他诊脉。</p>\n<p>脉象很弱，但还有救。我检查了他的症状，确定是肺痈无疑。而且是初期，脓液还没有完全形成，如果及时处理，还有希望。</p>\n<p>\"我需要一些东西，\"我对刘家人说，\"一些药材，还有银针。\"</p>\n<p>刘家人忙不迭地去准备。</p>\n<p>---</p>\n<p>治疗的过程很漫长，很痛苦。</p>\n<p>我先用银针刺激他的穴位，帮助他排痰。针尖刺入皮肤，需要精准的力道和角度。我屏住呼吸，一根一根地施针，每一针都小心翼翼。</p>\n<p>然后用特制的草药，外敷内用，双管齐下。</p>\n<p>那些草药是我让刘家人去准备的，有些很珍贵，有些很普通。我亲自熬药，控制火候，熬到药汁浓稠，药香四溢。</p>\n<p>第一天，没有效果。</p>\n<p>刘子安依然高烧不退，呼吸急促。刘家人开始焦虑，私下里议论纷纷，说我是骗子，说我不行。</p>\n<p>但我没有放弃。</p>\n<p>我对刘老爷说：\"给我三天时间。如果三天后还没有起色，我甘愿受罚。\"</p>\n<p>刘老爷看着我，眼神复杂。最后，他点了点头。</p>\n<p>第二天，依然没有效果。</p>\n<p>刘子安的病情没有恶化，但也没有好转。他依然躺在床上，脸色苍白，呼吸微弱。刘家人看我的眼神越来越怀疑，但我坚持继续。</p>\n<p>我整夜整夜地守在他床边，观察他的症状，调整药方，施针换药。</p>\n<p>奶娘也守在旁边，看着我的眼神里，有期待，也有担忧。</p>\n<p>\"先生，\"她问我，\"少爷真的能好吗？\"</p>\n<p>\"能，\"我说，\"但需要时间。\"</p>\n<p>\"可您不是说，三天......\"</p>\n<p>\"我说的是三天有起色，\"我说，\"不是三天痊愈。这种病，需要慢慢调理。\"</p>\n<p>她点点头，不再说话。</p>\n<p>第三天，转机出现了。</p>\n<p>早上，我给刘子安施针的时候，他突然剧烈地咳嗽起来。咳了很久，最后咳出了一大口脓痰，颜色发黄，带有血丝。</p>\n<p>刘家人吓坏了，以为病情恶化了。</p>\n<p>但我知道，这是好事。</p>\n<p>\"咳出来了，\"我说，\"脓痰咳出来，肺里的毒气就排出去了。\"</p>\n<p>果然，咳完之后，刘子安的呼吸明显顺畅了许多。他的脸色虽然还是苍白，但不再是那种死灰色了。而且，他的高烧也退了一些，摸上去不再烫手。</p>\n<p>\"有效！\"刘家人狂喜。</p>\n<p>我也松了一口气。</p>\n<p>但我知道，这还没完。肺痈的治疗需要很长时间，而且随时可能复发。我需要继续治疗，至少要一个月，才能确保痊愈。</p>\n<p>但我知道，这还没完。肺痈的治疗需要很长时间，而且随时可能复发。我需要继续治疗，至少要一个月，才能确保痊愈。</p>\n<p>但我没有机会了。</p>\n<p>---</p>\n<p>第四天晚上，天谴来了。</p>\n<p>当时我正在给刘子安施针，突然感觉胸口一阵剧痛，像是被人用大锤狠狠砸了一下。</p>\n<p>我惨叫一声，倒在地上，手中的银针散落一地。</p>\n<p>\"先生！\"刘家人惊呼。</p>\n<p>我想站起来，但做不到。剧痛从胸口蔓延到全身，每一寸骨头，每一寸肌肉，都在痛。那种痛，不是外伤的痛，是从内里发出来的，像是有无数把小刀在体内搅动。</p>\n<p>我知道，这是天谴。</p>\n<p>因为我改变了历史。</p>\n<p>刘子安本来应该死，但他没死。他活了下来，会继续活下去，会成亲，会生子，会做很多本来不会发生的事情。</p>\n<p>历史被改变了。</p>\n<p>而我，必须承受代价。</p>\n<p>后来我才知道，天谴的惩罚并不是根据你改变历史的大小来计算的。它是一种累进的惩罚——每当你触犯禁忌，惩罚就会比上一次更重、更久。这是我第二次改变历史，所以代价是七天的剧痛。如果还有下一次，或许会持续更久，更难以忍受。</p>\n<p>---</p>\n<p>我在刘家躺了七天。</p>\n<p>七天里，我痛不欲生。不能吃饭，不能喝水，只能躺在床上，忍受着那种从骨头里发出来的痛。</p>\n<p>那种痛，无法形容。像是有人用钝刀一刀一刀地割着我的肉，又像是有人用烧红的铁钳夹着我的骨头。我浑身冒冷汗，衣服湿透了又干，干了又湿。我在床上翻滚，嘶吼，用头撞墙，但都无济于事。</p>\n<p>刘家人照顾我，给我请大夫，但大夫束手无策。他们不知道我得了什么病，只知道我浑身没有外伤，却痛得死去活来。</p>\n<p>\"这是......什么怪病？\"大夫摇着头，\"我从未见过。\"</p>\n<p>\"会不会是中毒？\"有人问。</p>\n<p>\"不像。\"大夫检查了我的舌苔、瞳孔、脉搏，\"没有任何中毒的迹象。他的身体......很健康，甚至可以说，比普通人还健康。但他就是痛。\"</p>\n<p>\"那怎么办？\"</p>\n<p>\"只能熬，\"大夫说，\"熬过去，就好了。熬不过去......\"</p>\n<p>他没有说完，但大家都明白他的意思。</p>\n<p>刘子安来看我，他已经好多了，能够下床走动了。他跪在我的床边，眼睛红红的。</p>\n<p>\"先生，\"他说，\"您是为了救我，才变成这样的吗？\"</p>\n<p>我想说话，但说不出。我只能微微点头。</p>\n<p>\"为什么？\"他问，声音哽咽，\"您明明可以不救我的。您和我非亲非故，为什么要为了我，受这种罪？\"</p>\n<p>为什么？</p>\n<p>我也在想这个问题。</p>\n<p>为什么要救他？明明知道会遭受天谴，明明知道会痛苦，为什么还要救？</p>\n<p>也许是因为那个奶娘的眼泪。也许是因为我不想再看到有人死去。也许是因为，我想证明，即使会付出代价，我还是可以选择救人。</p>\n<p>但更深层次的原因，我自己也说不清楚。</p>\n<p>也许是因为，我想给自己一个交代。我想告诉自己，我活着，不只是为了活着。我还可以做一些事情，一些有意义的事情，哪怕会付出代价。</p>\n<p>老者说过，救人是我的选择，承受代价也是我的选择。我选择了救人，就必须承受代价，不要抱怨。</p>\n<p>我不抱怨。</p>\n<p>我只是痛苦。</p>\n<p>但这种痛苦，是我自己的选择。我心甘情愿。</p>\n<p>---</p>\n<p>第七天晚上，痛苦开始消退。</p>\n<p>像是退潮一样，那种剧痛一点一点地减轻，最后完全消失了。我躺在床上，浑身虚脱，像是从水里捞出来的一样，但至少，不痛了。</p>\n<p>我睁开眼睛，看到刘子安坐在我床边，正在打盹。</p>\n<p>\"水......\"我艰难地说。</p>\n<p>他猛地惊醒，看到我醒了，喜出望外：\"先生！您醒了！来人，快拿水来！\"</p>\n<p>我喝了几口水，感觉好多了。</p>\n<p>\"我躺了多久？\"我问。</p>\n<p>\"七天，\"他说，\"您整整躺了七天。我们都以为......\"</p>\n<p>他没有说完，但我明白他的意思。</p>\n<p>\"我没事，\"我说，\"死不了。\"</p>\n<p>\"先生，\"他看着我，眼神复杂，\"您到底是什么人？为什么救了我会变成这样？\"</p>\n<p>我没有回答。</p>\n<p>我不能告诉他真相。我不能告诉他我是长生者，不能告诉他我遭受了天谴。</p>\n<p>\"我没事，\"我说，\"只是旧疾复发，与你无关。\"</p>\n<p>他看着我，显然不相信，但也没有再追问。</p>\n<p>\"先生，\"他说，\"不管您是谁，您都是我的救命恩人。这辈子，我刘子安的命，就是您的。\"</p>\n<p>我笑了笑，摇摇头：\"你的命，是你自己的。好好活着，就是对我最好的报答。\"</p>\n<p>他看着我，深深地鞠了一躬。</p>\n<p>---</p>\n<p>第十天，我离开了刘家。</p>\n<p>刘家人要给我那千两赏银，我拒绝了。</p>\n<p>\"我救他，不是为了钱，\"我说，\"我只是想救。\"</p>\n<p>\"那您至少留下姓名，\"刘子安说，\"让我们日后报答。\"</p>\n<p>\"不用了，\"我说，\"好好活着，就是对我最好的报答。\"</p>\n<p>我转身离开，没有回头。</p>\n<p>---</p>\n<p>走在县城的街道上，阳光照在身上，暖洋洋的。</p>\n<p>我的身体还在隐隐作痛，那是天谴留下的后遗症。但我知道，这种痛会慢慢消失。</p>\n<p>而我心里，前所未有地平静。</p>\n<p>我终于做到了。</p>\n<p>在明白代价之后，依然选择救人。并且，心甘情愿地承受了代价，没有抱怨，没有后悔。</p>\n<p>这就是老者说的\"心安\"。</p>\n<p>我选择了我认为对的事情，我承担了相应的代价，我问心无愧。</p>\n<p>无论结果如何，我都可以坦然面对。</p>\n<p>---</p>\n<p>很多年以后，我听说刘子安活到了八十岁。</p>\n<p>他一生平安，儿孙满堂，是当地有名的善人。他建学堂，修桥梁，救济穷人，做了很多好事。</p>\n<p>有人说，他之所以成为善人，是因为年轻时得了一场大病，被一位神秘的先生救活。从那以后，他就发誓要积德行善，回报社会。</p>\n<p>我听到这些，笑了笑。</p>\n<p>那一次天谴，值了。</p>\n<p>不是因为救了一个人，而是因为那个人，又救了更多的人。</p>\n<p>这就是活着的意义。</p>\n<p>不是要改变历史，而是要在自己能做的范围内，做一些力所能及的事。哪怕会付出代价，哪怕会痛苦，但只要心安，就值得。</p>\n<p>那位老者，谢谢您。</p>\n<p>您教我好好喝一碗粥，教我活在当下，教我心安。</p>\n<p>我现在终于做到了。</p>\n<p>真正地做到了。</p>"}},{"type":"chapter","title":"第二十二章 旧伞","data":{"id":22,"title":"第二十二章 旧伞","html":"<p>我第一次知道，原来一个小小的善举，可以被记住那么久。</p>\n<p>久到我自己都忘记了，但那个孩子还记得。</p>\n<p>---</p>\n<p>那是个雨天。</p>\n<p>春雨绵绵，淅淅沥沥地下个不停。街上行人稀少，偶尔有几个人匆匆走过，撑着伞，低着头，像是怕被雨水打湿心事。</p>\n<p>我在一家茶馆里避雨，坐在靠窗的位置，看着外面的雨幕，喝着热茶。</p>\n<p>雨中的世界，像是被洗过一样，格外清新。树叶绿得发亮，石板路泛着水光，连空气里都带着泥土的清香。</p>\n<p>我喜欢下雨天。</p>\n<p>因为雨天，人们会慢下来。没有急事的人，会选择避雨，会选择停下来，会选择喝一杯热茶，看看窗外的风景。</p>\n<p>雨天，是这个世界难得的安静时刻。</p>\n<p>---</p>\n<p>雨越下越大。</p>\n<p>街上的积水越来越深，汇成一条条小溪，流向低洼处。偶尔有马车经过，溅起一片水花，引得路人纷纷躲避。</p>\n<p>就在这时，我看到了那个孩子。</p>\n<p>他看起来七八岁的样子，穿着一件蓝色的粗布衣裳，已经被雨水淋透了，贴在身上。他手里拿着一把伞，但那伞已经坏了，伞骨折断了几根，伞面破了一个大洞，根本遮不住雨。</p>\n<p>他站在路边，试图用那把破伞遮雨，但雨水从破洞灌进来，淋了他一头一脸。</p>\n<p>他看起来有些着急，不停地张望着，像是在等什么人。</p>\n<p>我看着他，心中一紧不忍。</p>\n<p>但我没有动。</p>\n<p>我已经学会了不随便插手。这个世界上可怜的人太多，我救不过来。而且，一把伞而已，不是什么大事。</p>\n<p>我转过头，继续喝茶。</p>\n<p>---</p>\n<p>但那个孩子的身影，一直在我脑海里挥之不去。</p>\n<p>我想起了自己小时候。想起那些下雨的日子，想起那些没有伞的日子，想起那种被雨水淋透的寒冷和无助。</p>\n<p>我叹了口气。</p>\n<p>算了，就帮这一次。</p>\n<p>我站起身，走出茶馆，来到那个孩子面前。</p>\n<p>\"你的伞坏了。\"我说。</p>\n<p>他抬起头，看着我，眼神里有些警惕：\"你......你是谁？\"</p>\n<p>\"一个过路人。\"我说，\"看到你的伞坏了，想帮你修修。\"</p>\n<p>\"修？\"他低头看着手里的破伞，\"这还能修吗？\"</p>\n<p>\"能。\"我说，\"给我看看。\"</p>\n<p>他犹豫了一下，还是把伞递给了我。</p>\n<p>我接过伞，仔细检查了一下。伞骨断了两根，伞面破了一个洞，但骨架还是好的，修起来不难。</p>\n<p>\"有针线吗？\"我问。</p>\n<p>\"有。\"他从怀里掏出一个小小的针线包，\"我娘给我的。\"</p>\n<p>我点点头，带着他回到茶馆，坐在角落里，开始修伞。</p>\n<p>---</p>\n<p>修伞的过程很简单。</p>\n<p>我用细线把断掉的伞骨绑好，用布片把破洞补上。虽然修得不是很美观，但至少能用了。</p>\n<p>孩子坐在我对面，看着我修伞，眼睛一眨不眨。</p>\n<p>\"您手艺真好。\"他说。</p>\n<p>\"不是什么手艺，\"我说，\"只是些粗活。\"</p>\n<p>\"您怎么会修伞的？\"</p>\n<p>\"以前修过。\"我说，\"一个人在外面走，总得会些手艺。\"</p>\n<p>\"您也是一个人？\"他问。</p>\n<p>\"嗯。\"</p>\n<p>\"我也是。\"他说，\"我爹死了，我娘改嫁了，现在跟着奶奶过。\"</p>\n<p>我停下手中的活，看了他一眼。</p>\n<p>他的脸上没有什么悲伤，只是平静地在陈述一个事实。这种平静，让我想起了自己。</p>\n<p>\"你在这里等谁？\"我问。</p>\n<p>\"等我奶奶。\"他说，\"她病了，我去给她抓药。但雨下大了，伞又坏了，我只能在这里等。\"</p>\n<p>\"抓药？\"我想起自己懂医术，\"什么病？\"</p>\n<p>\"大夫说是风寒，\"他说，\"但吃了药也不见好。\"</p>\n<p>我想了想，从怀里掏出几个铜板，递给他。</p>\n<p>\"拿着，给你奶奶买些好吃的。风寒要养，药要吃，但身子也要补。\"</p>\n<p>他看着我，眼睛睁得大大的：\"这......这太多了，我不能要。\"</p>\n<p>\"拿着吧，\"我说，\"就当是修伞的钱。\"</p>\n<p>\"修伞不用这么多钱......\"</p>\n<p>\"那就当是借给你的，\"我说，\"等你长大了，有钱了，再还给我。\"</p>\n<p>他想了想，接过铜板，认真地对我说：\"我一定会还您的。\"</p>\n<p>我笑了笑，把修好的伞递给他：\"快去吧，你奶奶在等你。\"</p>\n<p>他接过伞，撑开，果然不再漏雨了。</p>\n<p>\"谢谢您，\"他说，\"我叫阿福，住在城东的柳巷。您以后要是路过，一定要来找我。\"</p>\n<p>\"好。\"我说。</p>\n<p>他转身跑进雨里，小小的身影很快消失在雨幕中。</p>\n<p>我坐在茶馆里，看着他的背影，心里有一种很奇怪的感觉。</p>\n<p>一种......温暖的感觉。</p>\n<p>---</p>\n<p>那之后，我离开了那个县城，继续我的旅程。</p>\n<p>我没有去找阿福，也没有把这件事放在心上。对我来说，这只是一个小小的善举，不值一提。</p>\n<p>我修过无数把伞，帮过无数人，这只是其中一次而已。</p>\n<p>我继续走，继续看，继续活着。</p>\n<p>时间流逝，岁月如梭。</p>\n<p>---</p>\n<p>二十年后，我又路过那个县城。</p>\n<p>县城变了，变得更繁华，更热闹。街道拓宽了，房子变新了，但那条柳巷还在，只是变得破旧了。</p>\n<p>我走在柳巷里，看着那些熟悉的景象，心头泛起一阵感慨。</p>\n<p>二十年了，不知道那个叫阿福的孩子，现在怎么样了。</p>\n<p>应该已经长大了吧。也许已经成亲，也许已经有了自己的孩子。也许早就离开了这里，去别处谋生了。</p>\n<p>我摇摇头，不再想这些。</p>\n<p>过去的就让它过去吧。</p>\n<p>---</p>\n<p>就在这时，一个声音从身后传来。</p>\n<p>\"先生？\"</p>\n<p>我转过身，看到一个中年男人站在我身后。他看起来三十岁左右，穿着一身青布长衫，看起来像个读书人。</p>\n<p>\"您是......\"我问。</p>\n<p>\"我是阿福，\"他说，眼睛里有些激动，\"二十年前，您给我修过一把伞。\"</p>\n<p>我微微一怔，仔细看着他。</p>\n<p>二十年前的那个孩子，现在已经长这么大了。眉眼间还能看出当年的影子，但已经是一个成熟的大人了。</p>\n<p>\"你记得我？\"我问。</p>\n<p>\"记得，\"他说，\"一辈子都记得。\"</p>\n<p>---</p>\n<p>他把我请到他家，那是一间不大但很整洁的屋子。屋里有一个老妇人，坐在椅子上，正在晒太阳。</p>\n<p>\"这是我奶奶，\"阿福说，\"您给的钱，我给她买了药，买了吃的，她的病很快就好了。\"</p>\n<p>我看着那个老妇人，她已经很大年纪了，头发花白，但精神还好。</p>\n<p>\"恩公，\"老妇人看到我，想要站起来，被我拦住了。</p>\n<p>\"不用客气，\"我说，\"只是一点小事。\"</p>\n<p>\"对您来说是小事，\"阿福说，\"对我们来说，是救命的大事。\"</p>\n<p>他给我倒了一杯茶，坐在我对面。</p>\n<p>\"先生，\"他说，\"这些年，我一直在找您。\"</p>\n<p>\"找我？\"</p>\n<p>\"嗯。\"他点点头，\"您给我的那几个铜板，我后来想还给您，但您已经走了。我问遍了整个县城，都没有人知道您是谁，从哪里来，到哪里去。\"</p>\n<p>\"那只是一点小事......\"</p>\n<p>\"对您来说是小事，\"他打断我，\"但对我来说，是改变一生的大事。\"</p>\n<p>他看着我，眼神很认真。</p>\n<p>\"先生，您知道吗？那天之前，我觉得这个世界很冷，很残酷。我爹死了，我娘走了，我和奶奶相依为命，过着朝不保夕的日子。我觉得，这个世界上没有好人，没有人会在乎我们这种穷人的死活。\"</p>\n<p>\"但您出现了。\"他说，\"您给我修伞，给我钱，还跟我说，等我长大了再还给您。那一刻，我突然觉得，这个世界还是有好人的。还是有人愿意帮助我们这种穷人的。\"</p>\n<p>\"从那以后，我就发誓，\"他说，\"我要做一个像您一样的人。我要帮助别人，我要让这个世界变得更温暖。\"</p>\n<p>他顿了顿，继续说：\"我努力学习，考上了秀才，现在在县学教书。我帮助那些贫苦的孩子，给他们买书，给他们交学费。我做的这些事，都是在学您。\"</p>\n<p>\"先生，\"他看着我，眼睛里有些湿润，\"您可能觉得那只是一个小小的善举，但对我来说，那是照亮我生命的一束光。\"</p>\n<p>---</p>\n<p>我坐在那里，听着他的话，心里有一种说不出的感觉。</p>\n<p>二十年前的那把伞，那几个铜板，对我来说，确实只是一个小小的善举。我帮完就忘了，从来没有想过会有什么后果。</p>\n<p>但对这个孩子来说，那改变了他的一生。</p>\n<p>他因为我，相信了善良。因为我，选择了帮助他人。因为我，成为了一个更好的人。</p>\n<p>而我，却什么都不记得了。</p>\n<p>\"先生，\"阿福说，\"那把伞，我一直留着。\"</p>\n<p>他从屋里拿出一把伞，递给我。</p>\n<p>那把伞已经很旧了，伞骨有些松动，伞面有些褪色，但还能看出当年的样子。那是我二十年前修过的那把伞。</p>\n<p>\"您修过的伞，我一直舍不得扔，\"他说，\"它提醒我，这个世界上有好人，提醒我要做一个好人。\"</p>\n<p>我接过那把伞，握在手里，感觉沉甸甸的。</p>\n<p>不是因为伞的重量，而是因为那份情谊，那份记忆，那份被记住的温暖。</p>\n<p>---</p>\n<p>那天，我在阿福家吃了饭。</p>\n<p>他奶奶做了几个家常菜，虽然简单，但很温馨。我们聊了很多，聊这二十年的变化，聊他这些年的经历，聊他帮助过的那些孩子。</p>\n<p>他问我，这些年去了哪里，做了什么。</p>\n<p>我只是笑笑，说：\"到处走走，看看。\"</p>\n<p>我没有告诉他我是长生者，没有告诉他我活了多久，经历了多少。那些事情，太沉重，不适合分享。</p>\n<p>但我很高兴，很高兴看到阿福过得很好，很高兴知道他一直在帮助别人，很高兴知道我那一个小小的善举，竟然产生了这么大的影响。</p>\n<p>---</p>\n<p>临走的时候，阿福把那把伞送给了我。</p>\n<p>\"先生，这把伞本来就是您的，\"他说，\"现在，我还给您。\"</p>\n<p>\"不用......\"</p>\n<p>\"请收下，\"他说，\"这是我的一点心意。\"</p>\n<p>我接过伞，看着他，心里有些感动。</p>\n<p>\"阿福，\"我说，\"你做得很好。比我做得好多了。\"</p>\n<p>\"不，\"他说，\"我做的这些，都是在学您。您才是那个点亮我的人。\"</p>\n<p>我笑了笑，拍拍他的肩膀。</p>\n<p>\"好好活着，\"我说，\"好好帮助别人。这就是对我最好的回报。\"</p>\n<p>他点点头，深深地鞠了一躬。</p>\n<p>---</p>\n<p>我走出柳巷，走在县城的街道上，手里握着那把旧伞。</p>\n<p>伞已经很旧了，但我舍不得扔。</p>\n<p>因为它提醒我，一个小小的善举，可以被记住那么久。因为我而点亮的人，会继续点亮更多的人。</p>\n<p>这就是活着的意义。</p>\n<p>不是要做多么伟大的事情，而是要在自己力所能及的范围内，做一些小小的善事。这些善事，就像是一颗颗种子，会在别人心里生根发芽，开出花来。</p>\n<p>那位老者说得对。</p>\n<p>好好喝一碗粥，好好做一件事，好好帮一个人。</p>\n<p>意义就在这些事情本身。</p>\n<p>---</p>\n<p>很多年以后，那把伞已经破得不能用了。</p>\n<p>但我一直留着它，带在身边，从一个地方到另一个地方。</p>\n<p>它是我收到的，最珍贵的礼物。</p>\n<p>因为它代表着，我曾经温暖过一个人。</p>\n<p>而那个人，又温暖了更多的人。</p>\n<p>这就是长生的意义。</p>\n<p>不是要记住所有的死亡，而是要记住所有的温暖。</p>\n<p>然后，带着这些温暖，继续走下去。</p>\n<p>走下去，直到时间的尽头。</p>\n<p>---</p>\n<p>**卷三《初焰》完**</p>\n<p>（第15-22章 完）</p>"}},{"type":"chapter","title":"第二十三章 获得长生","data":{"id":23,"title":"第二十三章 获得长生","html":"<p>我第一次面临选择，是在一片陌生的森林里。</p>\n<p>那时候我刚来到这个世界，什么都不懂，什么都不明白。我只知道，我原本不属于这里，但现在，我在这里了。</p>\n<p>而且，我必须做出一个选择。</p>\n<p>一个会改变我一生的选择。</p>\n<p>---</p>\n<p>我不知道我是怎么来到这个世界的。</p>\n<p>我只记得那天晚上，我躺在床上，刷着手机，然后……然后我就到了这里。</p>\n<p>但那个\"然后\"之间，发生了什么，我至今都不清楚。</p>\n<p>就像是一段被剪掉的电影胶片，前一秒我还在现代的出租屋里，后一秒我就在这片陌生的森林里。中间的过程，一片空白。</p>\n<p>---</p>\n<p>穿越前的那个晚上，和往常一样，没有什么特别的。</p>\n<p>那是四月的一个周二，我刚加完班，回到出租屋已经晚上十点多了。那是一套很小的房子，一居室，二十平米，在城市边缘，房租便宜但设施齐全。</p>\n<p>我在一家小公司做程序员，工作不算太忙，但也不算轻松。每天就是写代码、改bug、开会、再写代码。生活单调，但充实。</p>\n<p>那天晚上，我点了一份外卖，边吃边看了两集电视剧，然后洗了澡，躺在床上刷手机。</p>\n<p>朋友圈里有人在晒旅游照片，有人在发加班抱怨，有人在转发各种文章。我随意地翻着，偶尔点个赞，留条评论。</p>\n<p>我妈给我发了一条微信，问我周末回不回家吃饭。我回复说\"回\"，然后她说\"想吃什么，妈给你做\"。</p>\n<p>我说\"红烧肉\"。</p>\n<p>她说\"好\"。</p>\n<p>那是我和那个世界的最后一次对话。</p>\n<p>---</p>\n<p>我记得我放下手机，关灯，准备睡觉。</p>\n<p>房间里很安静，只有窗外偶尔传来的车声。我躺在床上，闭上眼睛，脑子里还在想着明天的工作——有个bug还没修完，有个功能要上线，有个会议要开。</p>\n<p>然后，我感觉到了一阵眩晕。</p>\n<p>那种眩晕很奇怪，不是生病的眩晕，不是晕车晕船的感觉，而是一种……一种像是被什么东西吸进去的感觉。</p>\n<p>我感觉我的身体在变轻，像是一片羽毛，被风吹起，飘向某个未知的地方。</p>\n<p>我想睁开眼睛，但睁不开。眼皮像是被什么东西粘住了，重得抬不起来。</p>\n<p>我想喊叫，但喊不出声。喉咙像是被什么东西堵住了，发不出任何声音。</p>\n<p>我想挣扎，但动不了。身体像是被什么东西束缚住了，完全不受控制。</p>\n<p>我只能任由那种感觉带着我，飘向某个地方。</p>\n<p>---</p>\n<p>那种感觉持续了多久，我不知道。</p>\n<p>可能是几秒钟，也可能是几个小时。在那个状态下，时间失去了意义。</p>\n<p>我只记得那种失重感，那种漂浮感，那种……那种被什么东西吞噬的感觉。</p>\n<p>然后，突然，一切都停止了。</p>\n<p>我感觉到我的背部接触到了什么坚硬的东西，感觉到了疼痛，感觉到了……真实。</p>\n<p>我猛地睁开眼睛。</p>\n<p>映入眼帘的是一片绿色的树冠，阳光透过树叶的缝隙洒下来，形成斑驳的光影。</p>\n<p>我愣了几秒钟，脑子里一片空白。</p>\n<p>这是哪里？</p>\n<p>---</p>\n<p>我坐起来，环顾四周。</p>\n<p>周围全是参天大树，遮天蔽日，树干粗壮，树皮上长满了青苔。空气中弥漫着潮湿的泥土气息，还有一股说不清楚的、古老的味道。</p>\n<p>我低头看了看自己，还是穿着那套睡衣，脚上还是那双拖鞋。我摸了摸口袋，手机还在，掏出来一看，没有信号，电量只剩下百分之二十。</p>\n<p>\"有人吗？\"我喊道。</p>\n<p>声音在森林里回荡，惊起了几只鸟，扑棱棱地飞走了。但没有人的回应。</p>\n<p>\"有人吗？\"我又喊了一声，声音更大了，但依然没有人回应。</p>\n<p>只有鸟叫声，虫鸣声，风吹过树叶的沙沙声。</p>\n<p>我站起来，腿有些发软。我扶着一棵树，深呼吸了几次，试图让自己冷静下来。</p>\n<p>冷静，冷静。</p>\n<p>这一定是梦。一定是我在做梦。</p>\n<p>我掐了自己一下，很痛。不是梦。</p>\n<p>那我怎么会在这里？</p>\n<p>---</p>\n<p>我努力回忆，但脑子里一片空白。</p>\n<p>我只记得那种眩晕的感觉，记得那种被吸进去的感觉，然后……就到这里了。</p>\n<p>难道……我穿越了？</p>\n<p>那个念头一冒出来，我就觉得自己疯了。穿越？那只是小说里才有的情节，怎么可能发生在现实中？</p>\n<p>但眼前的这一切，又该怎么解释？</p>\n<p>我看了看那些树，那些草，那些阳光。它们都是那么真实，那么清晰，不可能是梦。</p>\n<p>我……我真的穿越了？</p>\n<p>我跌坐在地上，心里一片茫然。</p>\n<p>如果我真的穿越了，那我该怎么办？我该怎么回去？我还能回去吗？</p>\n<p>我的家人，我的朋友，我的工作，我的一切……难道就这样没有了？</p>\n<p>---</p>\n<p>那天白天，我在森林里走了很久，试图找到出路。</p>\n<p>但没有路。</p>\n<p>无论我往哪个方向走，都是树，树，还是树。那些树看起来都一个样子，高大，茂密，没有任何标记。我试图在树上做记号，但那些树皮太硬，我根本刻不动。</p>\n<p>我走了大概有两个小时，腿都酸了，但依然看不到森林的尽头。太阳渐渐升高，气温也越来越热，我的睡衣被汗水湿透了，黏在身上，很不舒服。</p>\n<p>我口渴得厉害，喉咙像是着了火一样。我四处寻找水源，但没有找到。森林里虽然有潮湿的气息，但地面上没有溪流，没有水洼，只有厚厚的落叶和腐烂的泥土。</p>\n<p>我喊过，叫过，但没有人回应。</p>\n<p>我开始害怕。</p>\n<p>我害怕我会死在这里。没有食物，没有水，我撑不了几天。我见过野外求生的纪录片，知道人在没有水的情况下，最多只能活三天。</p>\n<p>三天。</p>\n<p>我只有三天的时间。</p>\n<p>---</p>\n<p>中午的时候，我找到了一棵大树，树下有一块相对平整的石头。</p>\n<p>我坐下来，靠着树干，感到一种前所未有的疲惫。</p>\n<p>不是因为走路累的，是因为恐惧，因为绝望，因为不知道该怎么办。</p>\n<p>我掏出手机，还是没有信号。我试着打开地图，显示\"无法定位\"。我试着拨打紧急电话，没有反应。</p>\n<p>手机在这个世界里，只是一块废铁。</p>\n<p>我看着手机屏幕，看着上面显示的日期和时间——2023年4月11日，上午11:23。</p>\n<p>那是我在那个世界的最后一个时间戳。</p>\n<p>现在，它已经没有意义了。</p>\n<p>---</p>\n<p>我坐在那里，不知道该怎么办。</p>\n<p>我想哭，但哭不出来。眼泪在眼眶里打转，但就是不流下来。</p>\n<p>我想喊，但喊不出声。声音在喉咙里哽咽，发不出来。</p>\n<p>我只能坐在那里，抱着膝盖，缩成一团，像一只被遗弃的小动物。</p>\n<p>我不知道我在那里坐了多久。</p>\n<p>可能是几个小时，也可能只是一会儿。时间在那个时刻失去了意义。</p>\n<p>我只是坐在那里，看着太阳慢慢移动，看着树影慢慢变化，看着这个陌生的世界在我眼前静静运转。</p>\n<p>而我的世界，已经不存在了。</p>\n<p>---</p>\n<p>傍晚时分，天开始变暗。</p>\n<p>我意识到我必须找个地方过夜。森林里晚上可能会有野兽，可能会有危险，我不能就这么坐在露天的地方。</p>\n<p>我站起来，拖着疲惫的身体，寻找可以过夜的地方。</p>\n<p>我找到了一棵大树，树干上有一个树洞，不大，但足够一个人蜷缩在里面。我爬进去，用树叶和枯枝堵住洞口，只留一个小缝透气。</p>\n<p>树洞里很黑，很潮湿，有一股腐烂的木头味道。但至少有遮蔽，有安全感。</p>\n<p>我蜷缩在树洞里，抱着膝盖，听着外面的声音。</p>\n<p>鸟叫声渐渐停了，虫鸣声渐渐大了起来。风吹过树叶，发出沙沙的声音，像是有人在低语。远处偶尔传来几声不知名动物的叫声，让我浑身绷紧。</p>\n<p>我拿出手机，打开手电筒功能，微弱的光芒在树洞里亮起，给了我一点点安慰。</p>\n<p>我看着那光芒，看着手机屏幕上显示的低电量警告，心里有一种奇怪的感觉。</p>\n<p>这是我在那个世界最后的联系了。</p>\n<p>等手机没电了，我就彻底和那个世界断绝了联系。</p>\n<p>---</p>\n<p>那一夜，我没有睡。</p>\n<p>我蜷缩在树洞里，听着外面的声音，脑子里乱七八糟。</p>\n<p>我想我的家人。想他们在做什么，想他们有没有发现我失踪了，想他们会不会着急，会不会报警，会不会四处寻找。</p>\n<p>我想我的朋友。想我们约好的周末打游戏，想我们计划中的旅行，想那些还没有实现的约定。</p>\n<p>我想我的工作。想那个还没修完的bug，想那个要上线的功能，想那些还没有完成的项目。</p>\n<p>我想那个世界的一切，那些我曾经习以为常的一切。</p>\n<p>而现在，它们都离我而去了。</p>\n<p>我再也回不去了。</p>\n<p>---</p>\n<p>深夜时分，树洞外传来一阵奇怪的声音。</p>\n<p>像是脚步声，又像是爪子刨地的声音。我屏住呼吸，一动不动，心跳得厉害。</p>\n<p>那声音在树洞外停了一会儿，然后走开了。</p>\n<p>我不知道那是什么动物，也许是狼，也许是熊，也许是别的什么。但无论是什么，我都不是它的对手。</p>\n<p>我只能祈祷它不要发现我。</p>\n<p>那是我人生中最漫长的一夜。</p>\n<p>黑暗，孤独，恐惧，绝望，所有的负面情绪都涌了上来，把我淹没。</p>\n<p>我不知道我是怎么熬过来的。</p>\n<p>我只知道，当第一缕阳光透过树洞的缝隙照进来的时候，我哭了。</p>\n<p>眼泪止不住地流，我不知道是因为害怕，因为绝望，还是因为……因为我还活着。</p>\n<p>---</p>\n<p>天亮后，我从树洞里爬出来。</p>\n<p>阳光很刺眼，我眯着眼睛，适应了一会儿。</p>\n<p>森林里弥漫着晨雾，空气很清新，带着一股露水的味道。鸟叫声又响起来了，虫鸣声渐渐小了下去。</p>\n<p>新的一天开始了。</p>\n<p>但我不知道该做什么。</p>\n<p>我继续走，继续在森林里游荡，继续寻找出路，继续……等待。</p>\n<p>我不知道我在等待什么。</p>\n<p>也许是一个奇迹，也许是一个救星，也许是……死亡。</p>\n<p>---</p>\n<p>第二天，第三天白天，我都在森林里度过。</p>\n<p>我找到了一条小溪，解决了喝水的问题。我找到了一些野果，虽然不知道有没有毒，但饥饿让我顾不了那么多。</p>\n<p>我开始学会分辨方向，学会寻找可以过夜的地方，学会在森林里生存的基本技能。</p>\n<p>但我的精神状况越来越差。</p>\n<p>孤独像是一只无形的手，紧紧地攥着我的心脏。我开始自言自语，开始幻想，开始……产生幻觉。</p>\n<p>有时候，我会看到远处有人影闪过，但追过去什么都没有。有时候，我会听到有人叫我的名字，但仔细听只有风声。</p>\n<p>我知道那是因为孤独和恐惧导致的幻觉，但我控制不住。</p>\n<p>我需要和人说话，需要听到人的声音，需要……需要知道我还活着，我还存在。</p>\n<p>---</p>\n<p>就在我快要绝望的时候，我看到了一个人。</p>\n<p>那是一个老者，穿着一身灰色的长袍，头发和胡子都白了，但精神矍铄，眼神清澈。</p>\n<p>他坐在一块大石头上，像是在等我。</p>\n<p>\"你来了。\"他说，声音很平静，像是什么都在意料之中。</p>\n<p>\"您......您是谁？\"我问，\"这是哪里？我怎么会在这里？\"</p>\n<p>\"我是谁，不重要，\"他说，\"重要的是，你为什么会在这里。\"</p>\n<p>\"我不知道......\"</p>\n<p>\"你知道的，\"他看着我，眼神很深邃，\"你不是这个世界的人。你来自另一个世界，一个很远很远的地方。\"</p>\n<p>我愣住了。</p>\n<p>\"您怎么知道？\"</p>\n<p>\"我怎么会不知道？\"他笑了笑，\"我是看守这个世界的人。每一个从其他世界来的人，我都知道。\"</p>\n<p>他站起身，走到我面前，打量着我。</p>\n<p>\"你很特别，\"他说，\"你的灵魂，和这个世界很契合。你可以留在这里，成为这个世界的一部分。\"</p>\n<p>\"留在这里？\"我问，\"那我能回去吗？\"</p>\n<p>\"回去？\"他摇摇头，\"回不去了。那个世界，已经不属于你了。\"</p>\n<p>我心里一沉。</p>\n<p>\"那我该怎么办？\"我问，\"我什么都没有，没有食物，没有水，没有地方住。我会死的。\"</p>\n<p>\"你不会死，\"他说，\"至少，不会那么容易死。\"</p>\n<p>他伸出手，掌心里躺着一颗药丸，黑色的，散发着一种奇怪的光芒。</p>\n<p>\"这是什么？\"我问。</p>\n<p>\"长生丹，\"他说，\"吃了它，你就不会再老去，不会再病死。你会获得长生，成为这个世界的一个异类。\"</p>\n<p>\"长生？\"我愣住了，\"您是说......\"</p>\n<p>\"你会活很久，很久。\"他说，\"看着这个世界变化，看着人们生老病死，看着王朝更迭，看着沧海桑田。你会看到很多很多，经历很多很多。\"</p>\n<p>\"但这是有代价的，\"他说，\"你会孤独。你的朋友会死去，你的爱人会老去，你关心的一切都会消逝。而你，还在这里。\"</p>\n<p>\"你可以选择不吃，\"他说，\"那样的话，你会像普通人一样，生老病死，过一辈子。然后，死去。\"</p>\n<p>他把药丸放在我面前。</p>\n<p>\"选择吧，\"他说，\"长生，还是凡人。\"</p>\n<p>---</p>\n<p>我站在那里，看着那颗药丸，心里挣扎了很久。</p>\n<p>长生？</p>\n<p>那意味着我会活很久，很久。我会看到未来，看到这个世界的一切变化。我不会病死，不会老死，我会一直活着。</p>\n<p>我可以看尽这个世界的风景，可以经历无数个时代，可以学习无数的知识和技能。我可以成为这个世界上最有智慧的人，可以看到人类文明的兴衰更替。</p>\n<p>但这也意味着孤独。我会失去所有人，看着他们在我的眼前老去、死去。我会不断地告别，不断地痛苦，不断地重新开始。我会看着我的朋友一个个离世，看着我的爱人慢慢老去，而我还在原地。我会变得冷漠，变得麻木，变得不再相信感情。</p>\n<p>凡人？</p>\n<p>那意味着我会像普通人一样，过一辈子，然后死去。我会有人陪伴，有人爱，有人记得。我会经历普通人的一生，平凡但完整。我会娶妻生子，会老去，会死去，但我不会孤独。</p>\n<p>但这也意味着，我会错过很多。我会看不到未来的世界，看不到这个世界的变化，看不到那些我还没有见过的风景。我的生命只有短短几十年，一转眼就会过去。</p>\n<p>而且，我可能会死得很惨。在这片陌生的森林里，没有食物，没有水，我撑不了几天。即使我走出了森林，在这个陌生的世界里，我一个现代人，没有身份，没有背景，没有技能，怎么生存？</p>\n<p>我会饿死的，会冻死的，会被人杀死的。即使我能活下来，也是苟延残喘，过着最底层的生活。</p>\n<p>我该怎么选？</p>\n<p>我闭上眼睛，脑子里一片混乱。</p>\n<p>我想起了我的家人。想起了妈妈做的菜，想起了爸爸的笑声，想起了我们一家人坐在一起看电视的时光。那些时光，平凡但温暖，是我这辈子最珍贵的记忆。</p>\n<p>如果我选择长生，我就再也见不到他们了。我永远失去了那些温暖，那些陪伴，那些爱。</p>\n<p>但如果我选择凡人，我就会死。在这片森林里，或者走出森林后的某个地方，我会死去。那些记忆，那些温暖，那些爱，我一样会失去。</p>\n<p>无论如何，我都失去了。</p>\n<p>那我该怎么选？</p>\n<p>我想了很久，想到了我在原来的世界的生活。想到了我的家人，我的朋友，我的工作。想到了那些我还没有完成的事情，那些我还没有实现的梦想。</p>\n<p>我想回去。</p>\n<p>但我知道，我回不去了。</p>\n<p>然后，我想到了另一种可能。</p>\n<p>如果，我能活下去，能在这个世界活下去，也许，我可以找到新的意义。也许，我可以做一些事情，改变一些事情，让这个世界变得更好。</p>\n<p>即使会孤独，即使会痛苦，但至少，我还活着。</p>\n<p>活着，就有希望。</p>\n<p>而且，长生意味着我可以做更多的事情。我可以救更多的人，可以帮助更多的人，可以留下更多的东西。即使我会孤独，但我的存在，可以让这个世界变得更好。</p>\n<p>这不是一个自私的选择。</p>\n<p>这是一个......责任的选择。</p>\n<p>---</p>\n<p>我伸出手，拿起了那颗药丸。</p>\n<p>老者看着我，眼神里有些惊讶，但更多的是理解。</p>\n<p>\"你确定？\"他问，\"一旦吃了，就无法回头了。\"</p>\n<p>\"我确定，\"我说，\"我想活下去。\"</p>\n<p>\"即使会孤独？\"</p>\n<p>\"即使会孤独。\"</p>\n<p>我把药丸放进嘴里，咽了下去。</p>\n<p>药丸入口即化，化作一股暖流，流遍全身。我感觉到我的身体在变化，感觉到某种力量在体内苏醒。</p>\n<p>但同时，我也感觉到了某种东西在离我而去。</p>\n<p>那是我的过去，我的身份，我原来那个世界的一切。</p>\n<p>我不再是那个人了。</p>\n<p>我变成了一个全新的人，一个长生者，一个注定孤独的人。</p>\n<p>---</p>\n<p>\"很好，\"老者说，\"从今天起，你就是这个世界的长生者了。\"</p>\n<p>\"我该怎么称呼您？\"我问。</p>\n<p>\"我？\"他笑了笑，\"我只是一个引路人。你不需要记住我的名字，你只需要记住，你做出了选择。\"</p>\n<p>\"那我该怎么生活？\"我问，\"我什么都不懂，我不知道这个世界是什么样的，我不知道我该去哪里......\"</p>\n<p>\"你会学会的，\"他说，\"时间是最好的老师。你有的是时间，慢慢学，慢慢看，慢慢体会。\"</p>\n<p>\"但如果我遇到困难呢？如果我需要帮助呢？\"</p>\n<p>\"你会遇到很多困难，\"他说，\"但你也会学会自己解决。这是长生的第一课：学会独立，学会坚强。\"</p>\n<p>他转身，往森林深处走去。</p>\n<p>\"等等，\"我叫住他，\"我该怎么办？我要去哪里？\"</p>\n<p>\"去你想去的地方，\"他说，\"做你想做的事。这个世界很大，你可以慢慢看。\"</p>\n<p>\"但我什么都不懂......\"</p>\n<p>\"你会懂的，\"他说，\"时间会给你答案。\"</p>\n<p>\"还有，\"他停下脚步，回头看着我，\"记住，你的长生，是一个秘密。不要告诉任何人，否则，你会招来灾祸。\"</p>\n<p>\"为什么？\"</p>\n<p>\"因为人心，\"他说，\"人们会嫉妒你，会觊觎你，会想要你的长生。你必须隐藏，必须低调，必须学会伪装。\"</p>\n<p>\"伪装？\"</p>\n<p>\"是的，\"他说，\"你要学会像一个普通人一样生活，一样老去，一样死去。然后，换个地方，重新开始。这样，你才能安全。\"</p>\n<p>我点点头，记住了他的话。</p>\n<p>他转身，继续往森林深处走去。</p>\n<p>\"还有一件事，\"他的声音从远处传来，\"不要试图改变历史。那是禁忌。如果你试图改变什么，你会遭到天谴。\"</p>\n<p>\"天谴？\"</p>\n<p>\"你会知道的，\"他说，\"当你触犯禁忌的时候。\"</p>\n<p>他的身影消失在森林里，像是从未出现过一样。</p>\n<p>---</p>\n<p>我站在那里，一个人，面对着这个陌生的世界。</p>\n<p>阳光透过树叶洒下来，照在我身上，暖洋洋的。微风拂过，带来一阵清新的空气。</p>\n<p>我不知道我该去哪里，我不知道我该做什么。</p>\n<p>但我知道，从今以后，我会活很久，很久。</p>\n<p>我会看到很多事情，经历很多事情。</p>\n<p>我会学会很多东西，也会失去很多东西。</p>\n<p>这是我的选择。</p>\n<p>这是我的命运。</p>\n<p>---</p>\n<p>很多年以后，当我经历了无数生死离别，当我看尽了人间沧桑，当我终于明白了长生的意义，我会想起那一天。</p>\n<p>想起那片森林，想起那个老者，想起那颗药丸。</p>\n<p>想起我做出的那个选择。</p>\n<p>我没有后悔。</p>\n<p>虽然孤独，虽然痛苦，但我看到了很多普通人看不到的风景。我经历了很多人无法想象的岁月。我学会了珍惜，学会了放下，学会了在每一个当下找到意义。</p>\n<p>我见过王朝的更迭，见过文明的兴衰，见过无数人的生老病死。我见过最美的风景，也见过最惨烈的战争。我学会了医术，学会了武艺，学会了很多很多的技能。</p>\n<p>我救过很多人，也失去了很多人。</p>\n<p>我爱过，也痛过。</p>\n<p>但我从未后悔。</p>\n<p>因为这是我选择的路。</p>\n<p>这是我作为长生者的使命。</p>\n<p>替那些逝去的人，继续看这个世界。</p>\n<p>这是我选择的路。</p>\n<p>我会一直走下去。</p>\n<p>走下去，直到时间的尽头。</p>\n<p>---</p>\n<p>**这是开始。**</p>\n<p>**也是一切的起源。**</p>"}},{"type":"chapter","title":"第二十四章 谷雨","data":{"id":24,"title":"第二十四章 谷雨","html":"<p>我遇到那个老农的时候，正是谷雨时节。</p>\n<p>那是穿越后的第四天，或者第五天——我已经记不清具体的日子。在获得长生之后，时间似乎变得不那么重要了。</p>\n<p>三天前，我遇到了那个灰袍老者。他给了我一颗长生丹，告诉我从此我将活很久很久，但也注定孤独。我吃了那颗丹药，身体发生了变化。疲惫感消失了，饥饿感也减轻了许多，连走路都轻快了不少。</p>\n<p>但我的脑子还是乱的。</p>\n<p>我依然不知道这是哪里，不知道我该去哪里，不知道该怎么回去。那个老者说的话在我脑海里回响，但我还没有完全理解它们的意思。</p>\n<p>长生？那意味着什么？我会活很久？多久？一百年？两百年？还是更久？</p>\n<p>孤独？那又意味着什么？我会失去所有人？我会看着身边的人一个个死去？</p>\n<p>我在森林里又走了两天，脑子里装满了这些乱七八糟的念头。老者告诉我往东走会有城镇，但我走了很久，依然没有看到任何人烟。</p>\n<p>---</p>\n<p>那天早晨，我终于走到了森林的边缘。</p>\n<p>眼前出现了一片开阔的田野，远处有几座低矮的山丘，山丘上覆盖着绿色的植被。田野里有人在劳作。</p>\n<p>那是一个老农，穿着一身粗布衣裳，佝偻着背，正在田埂上走来走去，像是在寻找什么。</p>\n<p>我停下脚步，躲在一棵树后面，远远地看着他。</p>\n<p>这是我获得长生后遇到的第一个普通人。</p>\n<p>我不知道该怎么面对他。我该说什么？我该怎么做？他会不会把我当成怪物？会不会把我抓起来？</p>\n<p>那个老者的警告在我耳边响起：\"你的长生，是一个秘密。不要告诉任何人。\"</p>\n<p>我应该躲起来，应该避开他，应该等天黑后再走。</p>\n<p>但那个老农看起来不像是危险的人。他看起来很着急，很焦虑，在田埂上走来走去，不时弯下腰查看什么。</p>\n<p>我躲在树后看了很久，最终好奇心战胜了恐惧。</p>\n<p>我走了出去。</p>\n<p>---</p>\n<p>\"您好......\"我试探着打招呼。</p>\n<p>老农抬起头，看着我，恍惚片刻。</p>\n<p>他说了一句话，我听不懂。那是一种我完全陌生的语言，发音古怪，语调起伏很大。</p>\n<p>我摇摇头，指了指自己的耳朵，又摆摆手，表示我听不懂。</p>\n<p>老农皱起眉头，打量着我。</p>\n<p>我也打量着他。他看起来很老了，满脸皱纹，头发花白，但身体还算硬朗。他的手上布满了老茧，指甲里嵌着泥土，显然是个常年干农活的人。</p>\n<p>他又说了一句话，这次语速慢了一些，像是在问我什么。</p>\n<p>我还是摇摇头。</p>\n<p>我们之间陷入了沉默。</p>\n<p>---</p>\n<p>然后，老农做了一件让我意外的事。</p>\n<p>他指了指田野，做了一个手势——双手分开，像是在比划什么很大的东西。</p>\n<p>我不明白他的意思。</p>\n<p>他急了，又做了一遍手势，这次还伴随着一些动作：他弯下腰，双手在头上比划出两个角的形状，然后做出吃草的动作。</p>\n<p>我突然明白了。</p>\n<p>他在找牛。</p>\n<p>他丢了牛，正在找。</p>\n<p>我点点头，表示理解了。</p>\n<p>老农的脸上露出了一丝笑容，那是那种找到帮手后的欣慰笑容。他招招手，示意我跟他走。</p>\n<p>我犹豫了一下，然后跟了上去。</p>\n<p>---</p>\n<p>我们在田野里找了很久。</p>\n<p>老农走在前面，我走在后面。他不时停下来，查看地上的痕迹——牛粪、牛蹄印、被啃过的草。我跟在他身后，学着他的样子查看，但其实我什么都看不懂。</p>\n<p>我只是想帮忙。</p>\n<p>不知道为什么，在那个陌生的世界里，在那个我完全听不懂语言的老人身边，我突然感到了一种奇怪的平静。</p>\n<p>也许是因为他把我当成一个普通人，一个没有威胁的人，一个可以帮助他的人。</p>\n<p>也许是因为我终于不再是一个人在森林里游荡了。</p>\n<p>我们走了很远，从一块田走到另一块田，从一条田埂走到另一条田埂。太阳渐渐升高，气温也越来越热，老农的额头上冒出了汗珠，但他没有停下来休息的意思。</p>\n<p>我能感觉到他的焦急。</p>\n<p>那头牛对他很重要。也许是他的全部财产，也许是他的生计来源，也许是他家里最值钱的东西。在这个时代，一头牛意味着耕地的主力，意味着秋收的希望，意味着一家人一年的口粮。</p>\n<p>我想帮他找到。</p>\n<p>不仅仅是因为我想帮忙，也因为我想证明点什么。证明我可以在这个世界里做点什么，证明我不是一个完全无用的人，证明我可以靠自己的能力——哪怕只是找牛这样的小事——在这个世界上立足。</p>\n<p>我们穿过一片麦田，麦穗已经开始泛黄，在微风中轻轻摇曳。田里有几只麻雀在啄食，看到我们过来，扑棱棱地飞走了。</p>\n<p>老农不时停下来，查看地上的痕迹。他弯下腰，用手指捻起一撮泥土，凑到鼻子前闻了闻，然后指向一个方向。</p>\n<p>我跟着他，虽然我看不懂那些痕迹，但我学着他的样子，观察地上的每一个细节。一个浅浅的蹄印，一撮被啃过的草叶，一滴已经干涸的水渍。</p>\n<p>这些细小的线索，在老农眼里，就是找到牛的希望。</p>\n<p>---</p>\n<p>中午时分，我们在一条小溪边发现了牛的踪迹。</p>\n<p>那是一堆新鲜的牛粪，还在冒着热气。老农蹲下来查看，脸上露出喜色，说了几句话，虽然我听不懂，但从他的表情来看，应该是\"找到了\"之类的意思。</p>\n<p>我们沿着小溪继续寻找。</p>\n<p>溪水清澈，流过石头，发出潺潺的声音。溪边长满了青草，有些地方的草被啃过，留下整齐的齿痕。</p>\n<p>我跟在老农身后，心里有一种奇怪的感觉。</p>\n<p>在原来的世界里，我是一个程序员，每天面对的是电脑屏幕，是代码，是各种抽象的逻辑。我从来没有像这样，在田野里走动，寻找一头走失的牛。</p>\n<p>这种感觉很原始，很简单，但也很真实。</p>\n<p>我不再是那个被代码和逻辑包围的人。我变成了一个在田野里找牛的人。</p>\n<p>---</p>\n<p>我们在溪边的灌木丛里找到了那头牛。</p>\n<p>它被困在灌木丛里，牛角缠在了藤蔓上，动弹不得。它看起来很焦躁，不停地挣扎，但越是挣扎，缠得越紧。</p>\n<p>老农看到牛，脸上露出欣喜的表情，快步走过去。</p>\n<p>我也跟了过去。</p>\n<p>我们花了很长时间才把牛解救出来。那些藤蔓缠得很紧，老农用手指去解，解不开。我找来一块石头，小心翼翼地割断藤蔓，生怕伤到牛。</p>\n<p>牛被解救出来后，老农抚摸着它的头，说了一些温柔的话。牛安静下来，低下头，用舌头舔着老农的手。</p>\n<p>那一刻，我看到了一种纯粹的、不加修饰的情感。</p>\n<p>那是人和动物之间的联系，是农村生活中最平常但也最珍贵的东西。</p>\n<p>我看着老农布满皱纹的脸，看着牛温顺的眼睛，突然想起了现代世界里的那些东西——手机、电脑、高楼大厦、车水马龙。那些东西在这一刻显得那么遥远，那么不真实。</p>\n<p>在这里，在这个简单的田野里，人和牛之间的关系是如此直接，如此真实。没有中介，没有技术，只有一个老人和他的牛，用简单的动作和声音交流着。</p>\n<p>这种原始的情感连接，是我很久没有体验过的。</p>\n<p>---</p>\n<p>老农牵着牛，示意我跟他走。</p>\n<p>我跟着他，穿过田野，走向远处的村庄。</p>\n<p>村庄很小，只有十几户人家，房屋都是土坯房，屋顶盖着茅草。村口有一棵大树，树下有几个孩子在玩耍，看到我们过来，都好奇地看着我。</p>\n<p>老农把我带到他家。</p>\n<p>那是一间简陋的屋子，院子里养着几只鸡，墙角堆着柴火。一个老妇人从屋里出来，看到老农牵着牛，脸上露出如释重负的表情。</p>\n<p>老农对老妇人说了一番话，然后指了指我。</p>\n<p>老妇人看着我，露出和善的笑容，说了句什么，然后进屋去了。</p>\n<p>过了一会儿，她端出一碗水，递给我。</p>\n<p>我接过水碗，喝了一口。那是井水，清凉甘甜，带着一丝泥土的气息。</p>\n<p>那是我穿越后喝的第一口水。</p>\n<p>---</p>\n<p>我在老农家吃了一顿饭。</p>\n<p>那是一顿简单的农家饭：糙米饭、咸菜、一碗青菜汤。老农还拿出了一小壶酒，给自己倒了一杯，也给我倒了一杯。</p>\n<p>酒很烈，入口辛辣，但喝下后胃里暖洋洋的。</p>\n<p>我们坐在院子里，吃着饭，喝着酒。老农和老妇人说着我听不懂的话，偶尔用手势比划着，像是在讲述找牛的经历。老妇人听着，不时看向我，露出感激的笑容。</p>\n<p>我坐在那里，虽然听不懂他们在说什么，但我感觉到了一种温暖。</p>\n<p>那是一种被接纳的温暖，一种被感谢的温暖，一种在这个陌生世界里找到归属感的温暖。</p>\n<p>老农和老妇人的对话听起来像是一首古老的歌谣，语调起伏，音节短促。我仔细听着，试图分辨出一些重复的词汇，一些可能的含义。</p>\n<p>\"谢谢\"——我猜那个发音可能是谢谢。</p>\n<p>\"牛\"——那个发音重复了几次，应该是指那头牛。</p>\n<p>\"吃\"——老妇人指着饭菜，又指指我，那个发音应该是吃。</p>\n<p>我开始在心里默默记下这些词汇，这些音节。我知道，要在这个世界生存下去，我必须学会他们的语言。而从这顿饭开始，从这几个简单的词汇开始，是一个不错的起点。</p>\n<p>老农见我认真听他讲话，似乎很高兴，又对我说了几句，这次语速更慢，还用手势比划着。</p>\n<p>我也试着用手势回应，指指自己，指指他，然后做出帮忙找牛的动作。</p>\n<p>老农笑了，那是一种欣慰的笑容。他拍拍我的肩膀，说了几句话，虽然听不懂，但我能感觉到那应该是\"好\"或者\"不错\"之类的意思。</p>\n<p>在那个简陋的农家小院里，在听不懂的语言和简单的手势中，我开始建立起了在这个世界的第一份连接。</p>\n<p>---</p>\n<p>吃完饭，老农送我到村口。</p>\n<p>他指了指东边，说了几句话，又指了指西边，摇了摇头。</p>\n<p>我猜他的意思是：往东走有城镇，往西走没有路。</p>\n<p>我点点头，表示感谢。</p>\n<p>老农从怀里掏出几个铜钱，塞进我手里。我推辞，但他坚持要给，还拍拍我的肩膀，像是在说\"拿着吧，你应得的\"。</p>\n<p>我收下了铜钱。</p>\n<p>那是我穿越后赚的第一笔钱。</p>\n<p>虽然不多，但那是靠我的劳动——帮老农找牛——换来的。</p>\n<p>---</p>\n<p>我向东走去。</p>\n<p>走了很远，回头看时，还能看到村口那棵大树，还能看到老农站在树下，向我挥手。</p>\n<p>我也挥了挥手，然后继续走。</p>\n<p>太阳渐渐西沉，天空染上了一层金色。田野里的庄稼在晚风中轻轻摇曳，远处的山丘被夕阳染成了红色。</p>\n<p>我走在田埂上，手里攥着那几个铜钱，心里有一种奇怪的感觉。</p>\n<p>那是穿越后第一次，我感到自己还活着。</p>\n<p>不是作为一个迷路的穿越者，不是作为一个获得长生的异类，而是作为一个普通的人，一个可以帮助别人、被别人感谢的人。</p>\n<p>那头牛，那顿饭，那几个铜钱，让我在这个陌生的世界里找到了第一个锚点。</p>\n<p>---</p>\n<p>很多年以后，当我经历了无数风雨，当我看尽了人间沧桑，当我终于学会了如何做一个长生者，我还会想起那个谷雨时节的下午。</p>\n<p>想起那个焦急的老农，想起那头被困在灌木丛里的牛，想起那碗清凉的井水，想起那杯辛辣的米酒。</p>\n<p>那是我穿越后遇到的第一个人。</p>\n<p>也是第一个让我明白，即使在这个陌生的世界里，我也可以做点什么的人。</p>\n<p>从那以后，我开始学会观察，学会倾听，学会用手势和表情与人交流。我开始学会这个世界的语言，学会这个世界的规则，学会如何在这个世界里活下去。</p>\n<p>但那都是后话了。</p>\n<p>在那个谷雨时节的下午，我只是一个刚刚穿越过来的年轻人，帮一个老农找到了他的牛，换来了一顿饭和几个铜钱。</p>\n<p>那是我在这个世界的第一步。</p>\n<p>也是最平凡、最温暖的一步。</p>"}},{"type":"chapter","title":"第二十五章 陌生的星空","data":{"id":25,"title":"第二十五章 陌生的星空","html":"<p>我躺在一片草地上，仰望着头顶的星空。</p>\n<p>那是穿越后的第七个夜晚。</p>\n<p>前三天，我在森林里游荡，像只没头苍蝇一样乱撞。第三天傍晚，我遇到了那个灰袍老者，获得了长生。接下来的两天，我继续往东走，在第四天或者第五天遇到了那个老农，帮他把牛找了回来，在他家里吃了第一顿饭。</p>\n<p>但我没有停留。老者的告诫在我耳边回响：不要和任何人走得太近，不要暴露你的秘密。所以第二天一早，我就告别了老农，继续向东走去。</p>\n<p>我又走了两天，穿过田野，穿过小溪，穿过一片片陌生的土地。我不敢生火，怕引来野兽，也怕引来人。饿了就摘野果，渴了就喝溪水，困了就找棵大树靠着睡。</p>\n<p>第六天傍晚，我终于又看到了一片开阔的田野，远处有几户人家，炊烟袅袅。</p>\n<p>这一次，我没有靠近。我拖着疲惫的身体，走到田地边的一棵大树下，靠着树干坐了下来。我不敢去敲那些人家的门，我不知道该怎么跟他们解释我是谁，从哪里来。</p>\n<p>我就那么坐着，看着太阳落山，看着天色变暗，看着星星一颗颗亮起来。</p>\n<p>然后，我发现了。</p>\n<p>---</p>\n<p>那天的夜空很清澈，没有云，月亮很圆，星星很多。</p>\n<p>我仰头看着，起初只是无意识地看，打发时间，也让自己不去想那些可怕的事情。</p>\n<p>但看着看着，我发现不对劲。</p>\n<p>那些星星......那些星星的位置不对。</p>\n<p>我眨了眨眼睛，仔细再看。</p>\n<p>北斗七星呢？我找不到北斗七星。那七颗组成勺子形状的星星，我在现代看了二十几年，闭着眼睛都能指出来。但现在，我扫遍了整个北方的天空，找不到那个熟悉的勺子。</p>\n<p>北极星呢？我也找不到。北方天空最亮的那颗星，所有星星都围着它转的那颗，不见了。</p>\n<p>我急了，坐直了身体，眼睛在天空中四处搜寻。</p>\n<p>猎户座呢？那三颗排成一线的腰带星，那四颗组成肩膀和膝盖的亮星，我也找不到。</p>\n<p>仙后座呢？那个像W或者M形状的星座，也没有。</p>\n<p>仙女座呢？金牛座呢？双子座呢？</p>\n<p>都没有。</p>\n<p>我找了很久，一颗一颗地辨认，一颗一颗地排除。天空中的星星很多，很亮，但那些我熟悉的星座，一个都没有。</p>\n<p>我看到有几颗星星排成了一个不规则的四边形，但那不是飞马座。我看到有一条淡淡的银河横跨天际，但那银河的形状和我记忆中的不一样，更宽，更亮，颜色也略带一些淡淡的紫色。</p>\n<p>我甚至试图寻找一些季节性不那么强的星座，比如牧夫座的大角星，比如室女座的角宿一。但北方的天空里没有大角星，南方的天空里也没有角宿一。</p>\n<p>所有的星星都在错误的位置，组成错误的形状。</p>\n<p>这个天空，是陌生的。</p>\n<p>---</p>\n<p>我坐在那里，浑身发冷，尽管夜风并不凉。</p>\n<p>一个念头像闪电一样劈进我的脑海。</p>\n<p>这不是地球。</p>\n<p>如果这是地球，哪怕是不同的时代，哪怕是不同的地点，星空虽然会有变化，但那些主要的星座应该还在。北斗七星可能会在天空的不同位置，可能会出现得早一些或者晚一些，但它应该还在。北极星可能会换一颗，但它应该还在那个方向。</p>\n<p>但现在，什么都没有。</p>\n<p>所有的星座都是陌生的。天空中有一条明亮的星河，但那不是银河系的样子。有几颗特别亮的星星，但我叫不出它们的名字，它们在错误的位置，组成错误的形状。</p>\n<p>这不是地球的天空。</p>\n<p>这意味着......</p>\n<p>这意味着我穿越的不是时间，而是空间。我来到了另一个世界，一个完全陌生的世界，一个连星空都不同的世界。</p>\n<p>我回不去了。</p>\n<p>不是回不去了那个时间点，而是回不去了那个世界。</p>\n<p>我的父母，我的朋友，我的家，我的城市，我的国家，我熟悉的一切......它们不在这个宇宙的任何一个角落。它们在另一个世界，另一个时空，我永远也到不了的地方。</p>\n<p>我再也见不到他们了。</p>\n<p>---</p>\n<p>那个认知像一把刀，狠狠地捅进我的心脏。</p>\n<p>我捂着脸，浑身发抖。我想哭，但哭不出来。喉咙像是被什么东西堵住了，发不出声音，只有眼泪从指缝里流出来，热热的，然后被夜风吹凉。</p>\n<p>我想我妈。</p>\n<p>我想她做的红烧肉，想她唠叨我早点睡觉，想她在我小时候睡前给我讲的故事。我想我爸，想他沉默但有力的手掌，想他在我考上大学时难得的笑容。我想我的朋友们，想我们一起打游戏的日子，想我们约好要一起做的事情。</p>\n<p>我甚至想我那个简陋的出租屋，那个只有二十平米的小房间，那张吱呀作响的床，那台老旧的电脑。那些我曾经抱怨过的东西，现在想起来都是那么的珍贵。</p>\n<p>我想那个世界的一切，那些我曾经习以为常的一切。</p>\n<p>我想我的床，我的电脑，我的手机，我那个虽小但温暖的出租屋。</p>\n<p>我想那个世界的一切。</p>\n<p>那个世界有我熟悉的天空，有北斗七星，有北极星，有猎户座。那个世界有我熟悉的人，有爱我的人，有我爱的人。</p>\n<p>而这个世界，什么都没有。</p>\n<p>只有我，一个人，躺在这片陌生的草地上，仰望着一片陌生的星空。</p>\n<p>---</p>\n<p>我不知道我在那里坐了多久。</p>\n<p>可能是几个小时，也可能只是一会儿。时间在那个时刻失去了意义。</p>\n<p>我就那么躺着，看着那些陌生的星星，脑子一片空白。</p>\n<p>没有希望了。</p>\n<p>之前，即使我知道穿越了，即使我知道回不去了，但心里总还有那么一丝幻想。也许有一天，会有什么奇迹发生，我会突然回到那个世界，回到我的床上，发现这一切只是一场梦。</p>\n<p>但现在，那最后一丝幻想也破灭了。</p>\n<p>这不是梦，也不是普通的穿越。这是彻底的、永远的分离。我来到了另一个世界，一个物理上完全不同的世界。即使我有办法穿越时空，我也找不到回去的路，因为我根本不知道那个世界在这个宇宙中的坐标。</p>\n<p>我再也回不去了。</p>\n<p>---</p>\n<p>夜渐渐深了。</p>\n<p>田野里传来虫鸣声，此起彼伏，像是一首永不停歇的交响曲。那些虫子的叫声和我在现代听到的也不一样，更尖锐，更急促，像是某种警报。</p>\n<p>远处传来几声狗吠，然后是人的声音，低沉而模糊，我听不懂他们在说什么。那个灰袍老者跟我说话的时候，我能听懂，但在这里，这些普通人说的话，对我来说就像外语一样陌生。</p>\n<p>我不仅需要适应一个新的世界，还需要学习一门新的语言。</p>\n<p>这个认知让我更加绝望。</p>\n<p>我什么都不是了。</p>\n<p>在原来的世界，我是一个程序员，虽然不是什么大牛，但也能养活自己，有自己的专业，有自己的社交圈，有自己的位置。</p>\n<p>但在这里，我是一个文盲，一个哑巴，一个连语言都听不懂的异类。我没有身份，没有背景，没有技能，没有认识的人。我甚至连这个世界的规则都不知道。</p>\n<p>我该怎么活下去？</p>\n<p>---</p>\n<p>月亮慢慢移动，星星也转了一个角度。</p>\n<p>我盯着那片陌生的天空，试图从中找到一些熟悉的痕迹。也许我看错了，也许那些星座只是位置变了，也许我再仔细找找就能找到。</p>\n<p>我找了很久。</p>\n<p>没有。</p>\n<p>无论我怎么找，都找不到任何熟悉的星座。这个天空完全是另一套体系，另一个体系的天文学，另一个体系的神话传说。</p>\n<p>我放弃了。</p>\n<p>我躺在草地上，闭上眼睛，眼泪又流了出来。</p>\n<p>\"我回不去了。\"我在心里对自己说，声音颤抖，\"我真的回不去了。\"</p>\n<p>那句话在脑海里回响，一遍又一遍。</p>\n<p>我回不去了。</p>\n<p>我要在这个世界度过我的余生。不是几年，不是几十年，是几百年，几千年。那个灰袍老者说过，我会活很久，很久。</p>\n<p>很久。</p>\n<p>在那个陌生的世界里，孤独地活很久。</p>\n<p>---</p>\n<p>天快亮的时候，我做了一个决定。</p>\n<p>我睁开眼睛，看着东方泛起的鱼肚白。星星渐渐隐去，只剩下几颗最亮的还在坚持。然后是第一缕阳光，穿透云层，洒在大地上。</p>\n<p>我坐起身，看着那片被晨光染红的田野。</p>\n<p>远处的农舍里传来动静，有人在起床，有人在生火，有人在准备新的一天的劳作。那些声音很平凡，很普通，但在我听来，却有一种奇异的力量。</p>\n<p>那是活着的声音。</p>\n<p>那是这个世界的人们在活着的声音。</p>\n<p>他们不知道我从哪里来，不知道我经历了什么，不知道我看着这片天空时有多么绝望。他们只是像往常一样起床，像往常一样生活，像往常一样迎接新的一天。</p>\n<p>他们活得那么简单，那么自然，那么......理所当然。</p>\n<p>我突然意识到，我也可以这样。</p>\n<p>我回不去了，这是事实。但我还活着，这也是事实。我可以选择沉浸在绝望里，也可以选择接受现实，在这个世界里活下去。</p>\n<p>那个灰袍老者说过，时间是最好的老师。我有的是时间，慢慢学，慢慢看，慢慢体会。</p>\n<p>我不知道该怎么开始，不知道该去哪里，不知道该做什么。</p>\n<p>但我知道，只要我还活着，就有希望。</p>\n<p>也许有一天，我会学会这个世界的语言，会交到朋友，会找到事情做，会在这个陌生的世界里建立起新的生活。</p>\n<p>也许有一天，我会忘记那片熟悉的星空，会习惯这片陌生的天空，会在这片天空下找到新的意义。</p>\n<p>也许。</p>\n<p>我站起身，拍了拍身上的草屑和露水。</p>\n<p
