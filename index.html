<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>千秋一叹 — 在线阅读</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@300;400;500;600;700&display=swap');

:root {
  --bg-body: #f4f1ea;
  --bg-content: #fdfbf7;
  --bg-sidebar: #f0ece3;
  --text-main: #2b2b2b;
  --text-sub: #5c5c5c;
  --accent: #8b4513;
  --accent-hover: #a0522d;
  --border: #dcd6c8;
  --shadow: rgba(0,0,0,0.06);
  --hr: #d0cabc;
  --table-head: #ebe6db;
  --table-row-alt: #f7f4ed;
  --sidebar-width: 280px;
}
[data-theme="dark"] {
  --bg-body: #1c1c1c;
  --bg-content: #242424;
  --bg-sidebar: #1f1f1f;
  --text-main: #e8e4dc;
  --text-sub: #9e9a93;
  --accent: #c9a86c;
  --accent-hover: #d8b97a;
  --border: #333;
  --shadow: rgba(0,0,0,0.35);
  --hr: #3a3a3a;
  --table-head: #2a2a2a;
  --table-row-alt: #202020;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  font-family: 'Noto Serif SC', 'Source Han Serif SC', 'SimSun', serif;
  background: var(--bg-body);
  color: var(--text-main);
  line-height: 1.9;
  transition: background .35s ease, color .35s ease;
}
/* subtle grain texture */
body::before {
  content:"";
  position:fixed;
  inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;
  z-index:-1;
}
/* ambient light spots */
body::after {
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 15% 10%, rgba(139,69,19,0.04) 0%, transparent 45%),
    radial-gradient(circle at 85% 90%, rgba(139,69,19,0.04) 0%, transparent 45%);
  pointer-events:none;
  z-index:-1;
}
[data-theme="dark"] body::after {
  background:
    radial-gradient(circle at 15% 10%, rgba(201,168,108,0.04) 0%, transparent 45%),
    radial-gradient(circle at 85% 90%, rgba(201,168,108,0.04) 0%, transparent 45%);
}
.app { display:flex; min-height:100vh; }
.sidebar {
  width: var(--sidebar-width);
  background: var(--bg-sidebar);
  border-right: 1px solid var(--border);
  display:flex;
  flex-direction:column;
  position:fixed;
  inset: 0 auto 0 0;
  z-index: 200;
  transition: transform .4s cubic-bezier(0.22, 0.61, 0.36, 1), width .4s cubic-bezier(0.22, 0.61, 0.36, 1);
}
.sidebar.collapsed {
  transform: translateX(-100%);
}
.sidebar-header {
  padding: 14px 18px 12px 30px;
  border-bottom: 1px solid var(--border);
  background:
    radial-gradient(120% 80% at 50% -10%, rgba(139,69,19,0.08) 0%, transparent 60%),
    linear-gradient(180deg, rgba(139,69,19,0.04) 0%, transparent 100%);
  position: relative;
}
.brand-row {
  display: flex;
  align-items: center;
  gap: 18px;
}
.brand-decoration {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin-left: 0;
  gap: 4px;
}
.seal {
  width: 32px;
  height: 32px;
  border: 2px solid rgba(139,69,19,0.55);
  color: rgba(139,69,19,0.75);
  font-family: 'Noto Serif SC', serif;
  font-size: 16px;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  box-shadow: 0 2px 6px rgba(139,69,19,0.12);
  transform: rotate(-6deg);
  background: rgba(139,69,19,0.04);
  flex-shrink: 0;
}
.brand-text {
  display: flex;
  flex-direction: column;
  justify-content: center;
  height: auto;
  padding: 0;
}
.brand {
  font-family: 'Noto Sans SC', 'Noto Serif SC', sans-serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 2px;
  text-shadow: 0 1px 0 rgba(255,255,255,0.4);
  line-height: 1.15;
}
.brand-sub {
  font-family: 'Noto Serif SC', serif;
  font-size: 12px;
  color: var(--text-sub);
  margin-top: 4px;
  letter-spacing: 1px;
  line-height: 1.2;
}
.header-ornament {
  margin: 0;
  width: 56px;
  height: 3px;
  border-radius: 2px;
  background: linear-gradient(90deg, transparent 0%, var(--accent) 45%, var(--accent) 55%, transparent 100%);
  opacity: 0.5;
}
.nav-scroll { flex:1; overflow-y:auto; padding: 14px 0; }
.nav-group-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 11px;
  color: var(--text-sub);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  padding: 12px 22px 8px;
  opacity: 0.8;
}
.nav-item {
  display: block;
  padding: 10px 22px 10px 30px;
  font-size: 14px;
  color: var(--text-main);
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: background .2s, border-color .2s, color .2s, padding-left .2s;
  text-decoration: none;
}
.nav-item:hover {
  background: rgba(139,69,19,0.05);
  padding-left: 34px;
}
.nav-item.active {
  background: rgba(139,69,19,0.10);
  border-left-color: var(--accent);
  color: var(--accent);
  font-weight: 500;
}
.sidebar-footer {
  padding: 16px 22px 18px;
  border-top: 1px solid var(--border);
  background:
    radial-gradient(120% 60% at 50% 110%, rgba(139,69,19,0.06) 0%, transparent 55%);
  display:flex;
  flex-direction: column;
  align-items:center;
  gap: 8px;
}
.footer-line {
  width: 24px;
  height: 2px;
  border-radius: 1px;
  background: var(--accent);
  opacity: 0.35;
}
.footer-text {
  font-family: 'Noto Serif SC', serif;
  font-size: 12px;
  color: var(--text-sub);
  letter-spacing: 2px;
}
.main {
  margin-left: var(--sidebar-width);
  flex:1;
  display:flex;
  flex-direction:column;
  transition: margin-left .4s cubic-bezier(0.22, 0.61, 0.36, 1);
}
.main.full {
  margin-left: 0;
}
.topbar {
  height: 60px;
  background: rgba(253,251,247,0.85);
  border-bottom: 1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding: 0 28px;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  transition: background .35s;
}
[data-theme="dark"] .topbar {
  background: rgba(36,36,36,0.85);
}
[data-theme="dark"] .seal {
  border-color: rgba(201,168,108,0.55);
  color: rgba(201,168,108,0.85);
  background: rgba(201,168,108,0.08);
  box-shadow: 0 2px 6px rgba(0,0,0,0.35);
}
[data-theme="dark"] .brand {
  text-shadow: 0 1px 0 rgba(0,0,0,0.3);
}
.page-title {
  font-family: 'Noto Sans SC', 'Noto Serif SC', sans-serif;
  font-size: 17px;
  font-weight: 500;
  color: var(--accent);
  letter-spacing: 1px;
}
.topbar-actions { display:flex; gap: 12px; align-items:center; }
.btn-icon {
  width: 38px;
  height: 38px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-main);
  cursor: pointer;
  font-size: 18px;
  display:flex;
  align-items:center;
  justify-content:center;
  transition: background .2s, transform .15s, border-color .2s;
}
.btn-icon:hover {
  background: rgba(139,69,19,0.06);
  border-color: var(--accent);
  transform: translateY(-1px);
}
.btn {
  padding: 8px 16px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg-content);
  color: var(--text-main);
  cursor: pointer;
  font-size: 13px;
  font-family: 'Noto Serif SC', serif;
  transition: background .2s, transform .15s, border-color .2s;
}
.btn:hover {
  background: var(--bg-body);
  border-color: var(--accent);
  transform: translateY(-1px);
}
.btn:disabled { opacity:0.35; cursor:not-allowed; transform:none; border-color: var(--border); }
.content-body {
  flex:1;
  max-width: 720px;
  margin: 0 auto;
  width: 100%;
  background: var(--bg-content);
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
  padding: 8px 40px 24px;
  min-height: calc(100vh - 60px - 76px);
  opacity: 0;
  transform: translateY(10px);
  animation: fadeInUp .5s ease forwards;
}
@keyframes fadeInUp {
  to { opacity: 1; transform: translateY(0); }
}
.content-body h3.chapter-title {
  font-family: 'Noto Sans SC', 'Noto Serif SC', sans-serif;
  font-size: 30px;
  font-weight: 600;
  text-align: center;
  margin: 0 0 28px;
  color: var(--text-main);
  letter-spacing: 4px;
  position: relative;
  padding-bottom: 16px;
}
.content-body h3.chapter-title::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 60px;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0.6;
}
.content-body p { text-indent: 2em; margin-bottom: 1em; font-size: 17px; text-align: justify; text-align-last: left; }
.chapter-nav {
  max-width: 720px;
  margin: 0 auto;
  width: 100%;
  background: var(--bg-content);
  border-top: 1px solid var(--border);
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
  padding: 18px 28px;
  display:flex;
  justify-content:space-between;
}
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.25);
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
  z-index: 150;
  opacity: 0;
  pointer-events: none;
  transition: opacity .35s ease;
}
.overlay.show { opacity: 1; pointer-events: auto; }

@media (max-width: 900px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; }
  .content-body { padding: 16px 22px 28px; border-left: none; border-right: none; }
  .chapter-nav { border-left: none; border-right: none; }
}

/* 辅助文档样式 */
.doc-page { max-width: 760px; margin: 0 auto; }
.doc-page h1 {
  font-family: 'Noto Sans SC', 'Noto Serif SC', sans-serif;
  font-size: 30px;
  font-weight: 600;
  text-align: center;
  margin-bottom: 10px;
  color: var(--accent);
  font-weight: 400;
  letter-spacing: 3px;
}
.doc-page h2 {
  font-family: 'Noto Sans SC', 'Noto Serif SC', sans-serif;
  font-size: 22px;
  margin-top: 36px;
  margin-bottom: 18px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--accent);
  color: var(--accent);
  font-weight: 600;
  letter-spacing: 1px;
}
.doc-page h3 {
  font-size: 17px;
  margin-top: 26px;
  margin-bottom: 14px;
  color: var(--text-main);
  font-weight: 600;
}
.doc-page blockquote {
  background: var(--bg-body);
  border-left: 3px solid var(--accent);
  padding: 18px 22px;
  margin: 22px 0;
  border-radius: 0 10px 10px 0;
  color: var(--text-sub);
  font-style: italic;
}
.doc-page table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  margin: 22px 0;
  font-size: 14px;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 3px 16px var(--shadow);
  border: 1px solid var(--border);
}
.doc-page th {
  background: var(--table-head);
  color: var(--accent);
  font-weight: 600;
  padding: 14px 16px;
  text-align: left;
  border-bottom: 1px solid var(--border);
}
.doc-page td {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}
.doc-page tr:last-child td { border-bottom: none; }
.doc-page tr:nth-child(even) { background: var(--table-row-alt); }
.doc-page p { text-indent: 0; margin-bottom: 1em; line-height: 1.95; font-size: 16px; }
.doc-page ul, .doc-page ol { margin: 18px 0 18px 26px; }
.doc-page li { margin-bottom: 10px; line-height: 1.85; }
.doc-page code {
  background: var(--bg-body);
  padding: 3px 7px;
  border-radius: 5px;
  font-family: Consolas, monospace;
  color: var(--accent);
  font-size: 14px;
}
.doc-page pre {
  background: var(--bg-body);
  padding: 18px;
  border-radius: 10px;
  overflow-x: auto;
  margin: 18px 0;
  border: 1px solid var(--border);
}
/* 作品信息卡片 */
.info-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin: 22px 0 32px;
}
.info-item {
  background: var(--bg-body);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 18px;
  box-shadow: 0 2px 12px var(--shadow);
  transition: transform .2s, box-shadow .2s;
}
.info-item:hover {
  transform: translateY(-3px);
  box-shadow: 0 5px 18px var(--shadow);
}
.info-label {
  display: block;
  font-size: 11px;
  color: var(--text-sub);
  margin-bottom: 6px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
.info-value {
  display: block;
  font-size: 15px;
  color: var(--text-main);
  font-weight: 500;
  line-height: 1.55;
}
</style>
</head>

tem" data-index="28" onclick="loadItem(28)">第二十九章 新的旅程</a>

  <main class="main">
    <div class="topbar">
      <button class="btn-icon" style="margin-right:10px" onclick="isMobile()?toggleSidebar():toggleSidebarDesktop()" title="目录">☰</button>

const allItems = [{"type":"chapter","title":"第一章 墓园","data":{"id":1,"title":"第一章 墓园","html":"<p>我又来给自己上坟了。</p>\n<p>五座坟并排立在小山丘上，最左边那座是空的。我亲手挖的，土还新。不知道将来谁会把我埋进去，也许是路过的樵夫，也许是山下的野狗。反正我也看不见了。</p>\n<p>我坐在空坟旁边，拔开酒葫芦。酒是昨天打的，已经凉了，入口发涩。我仰头喝了一口，漱了漱口，吐在旁边。酒沫子渗进土里，很快没了痕迹。</p>\n<p>三百年。我数过，从那个雨夜穿越到这个世界，三百一十七年。</p>\n<p>最右边是小石头。坟前有块圆滚滚的石头，上面刻着他七岁的模样，笑得缺了颗门牙。那年乱世，我在废墟里捡到他。他瘦得肋骨一根根分明，却死死拽着我衣角，指甲都抠进我肉里。</p>\n<p>\"我跟你走。\"</p>\n<p>我本想把他送人。一户开米铺的，家境殷实，没有孩子。我把小石头领过去，米铺老板挺满意，给了他一块桂花糕。我转身要走，他忽然把桂花糕扔了，跑过来抱住我的腿。</p>\n<p>\"我不要桂花糕，我要跟你走。\"</p>\n<p>于是我带他走了。教他读书，教他练剑，教他做人。他叫我师父，可在我心里，他就是我的孩子。</p>\n<p>石头活了八十三岁。临走前三天，他突然想吃桂花糕。我跑遍全城，找到一家还在做老式桂花糕的铺子。买回来后，他已经咽不下东西了，只是用手指碰了碰，笑了一下。</p>\n<p>\"甜的。\"</p>\n<p>那是他这辈子最后一句话。他走时握着我的手，眼睛已经看不清了，还在说：\"师父，这辈子能遇见你，真好。\"</p>\n<p>我说，“傻孩子，下辈子别再遇见我了”。</p>\n<p>他摇头，手指在我掌心轻轻挠了一下。那是他小时候撒娇的习惯。“不，我还要遇见你”。</p>\n<p>我摸着那块石头，已经被岁月磨得发亮。石头，你的世界结束了。今年的枫叶又红了，像你小时候最喜欢的那片。你总说等枫叶红透了，要我带你去山顶看。我答应了你七十二年，每年都忘。现在山顶的枫叶红了吧，你自己去看吧。</p>\n<p>我喝了一口酒，从怀里掏出半块桂花糕，放在他坟前。糕已经硬了，长出绿毛。他吃不到了。</p>\n<p>左边是苏晚晴。</p>\n<p>坟前有一束干枯的白菊，是她生前最喜欢的。江南的医馆里，她种了一院子白菊。我每天给她递药，她每天给我倒一杯茶。茶是普通的绿茶，但她泡得特别好，杯底总沉着两片茶叶，像艘小船。</p>\n<p>她问我，你们那个世界是什么样。</p>\n<p>我说，有钢铁做的鸟，可以在天上飞。有铁盒子，不用马拉就能跑。有千里眼顺风耳，隔着千里也能说话。</p>\n<p>她捧着茶杯，眼睛亮晶晶的。那一定很有趣。你们那里的人，也会生病吗？</p>\n<p>我说，也会。但能活七八十岁，很常见。</p>\n<p>她笑了一下。那很好啊。</p>\n<p>我知道她的意思。她知道我能活很久，知道她只能陪我走一程。但她从没问过，为什么我不能把她也变得长寿。她只是每天给白菊浇水，然后给我倒一杯茶。</p>\n<p>后来她病了。咳嗽，咳血，整夜整夜睡不着。我守在床边，给她讲我以前世界的事。讲电梯，讲冰箱，讲红绿灯。她听着，笑着，说真想看看。</p>\n<p>她走那天，外面在下雪。她忽然坐起来，看着窗外，说今年的白菊不知道能不能熬过冬天。</p>\n<p>我说，我帮你看着。</p>\n<p>她摇头，握住我的手。别看了，去喝口热茶吧。茶凉了。</p>\n<p>那是她最后一句话。我没哭。只是坐在她坟前，把那杯茶喝了。茶早凉了，苦涩刺喉。</p>\n<p>如今白菊枯了。我望着那束干花，闭上眼睛，还能看见她低头泡茶的样子。茶叶在杯底打转，像艘小船。</p>\n<p>晚晴。我好久没喝过那么好的茶了。</p>\n<p>中间是李长风。</p>\n<p>坟前插着一把生锈的剑。剑柄缠着破布，是我从他尸体上解下来的。那上面全是血，洗不干净，我就直接缠上去了。现在血变成了褐色，硬得像壳。</p>\n<p>我最佩服他。不是因为他武功多高，是他活得那么肆意，那么痛快。第一次见他，他在酒馆里跟人拼酒，喝了三坛，还能站着唱曲。唱的是《将进酒》，调子跑到姥姥家了，但气势十足。</p>\n<p>他说，顾兄，人生苦短，要及时行乐。</p>\n<p>我知道他会死。遇见他的第一天，我就知道。他三十岁那年，会在战场上被乱箭射死。我无数次想开口，告诉他别接那个任务，告诉他有埋伏。但每次话到嘴边，又咽回去。</p>\n<p>那就是他的命。他选择那样活，就要那样死。</p>\n<p>他走那天，我去送他。穿着战甲，意气风发，像把出鞘的剑。</p>\n<p>\"顾兄，等我回来，请你喝酒！\"</p>\n<p>我说，好，我等你。</p>\n<p>但我知道等不到了。</p>\n<p>后来我去战场上找他。在一堆尸体里找到他。身中十七箭，像个刺猬。他的剑断了，手还紧紧握着剑柄。我把他背回来，重得吓人。葬在这里后，我把断剑重新铸好，插在坟前。</p>\n<p>剑柄上刻着他写的两个字：无悔。</p>\n<p>我握住那把剑，锈迹斑斑，掌心刺痛。长风，酒我还给你留着。你说得对，人生苦短。你这辈子，值了。</p>\n<p>我举起酒葫芦，对着他的坟，倒了一口酒。酒渗入土里，像血。</p>\n<p>右边第二座是沈墨白。</p>\n<p>坟前什么都没有，只有荒草。我从来没给他扫过坟。不是恨，是不知道该放什么。花？他不配。剑？他不屑。酒？他不喝。</p>\n<p>他死前给我写过一封信。信封上只有四个字：你是对的。</p>\n<p>我把信烧了。不是不想看，是不敢看。我知道他写了什么。无非是后悔，无非是辩解，无非是求我原谅。但他知道的，我原谅不了。不是因为他杀了人，是因为他没听我的。</p>\n<p>那年他二十三岁，还没成为那个给天下带来十年浩劫的人。我在酒馆里遇见他，他一个人坐在角落，面前摆着一副棋盘，自己跟自己下。</p>\n<p>我走过去，坐下。他说，顾兄，要不要下一盘。</p>\n<p>我说，不用。我来是想告诉你，放下吧。</p>\n<p>他抬头看我，眼神深得像口井。放下什么？</p>\n<p>我说，你心里那盘棋。你下不赢的。</p>\n<p>他笑了一下，把棋子一枚枚收进盒子里。顾兄，你不明白。有些路，一旦开始，就回不了头。我这辈子，只能这么活。</p>\n<p>我说，你可以换个活法。</p>\n<p>他摇头，把棋盒盖上。然后站起身，走了。没回头。</p>\n<p>后来我听说他做了什么。杀人，放火，夺权，争霸。一件件，一桩桩。我坐在茶馆里听人说书，说他如何心狠手辣，如何机关算尽。说书先生讲得绘声绘色，我在台下喝茶，手没抖一下。</p>\n<p>因为我知道。我早知道了。</p>\n<p>他死那天，是自杀。功成名就之后，忽然疯了似的，把所有人都赶出府邸，然后放了一把火。我赶到时，只找到半块烧焦的玉佩。是我们第一次见面时，我送他的。</p>\n<p>我说，这玉佩能保平安。他收下了，说会随身带着。</p>\n<p>他随身带了十五年。到死都没扔。</p>\n<p>我看着他空荡荡的坟前，拔起一根草，在手里揉碎。墨白，你这辈子，到底图什么。</p>\n<p>草汁染绿了手指，我甩了甩，没甩掉。</p>\n<p>最左边是无名之墓。</p>\n<p>土是新的，还散发着腥味。我蹲下去，抓了一把土，在指间搓了搓。土很软，像面粉。不知道将来谁会把我埋进去。也许没人，我就这么躺着，等风吹散骨头。</p>\n<p>我活了太久，久到忘记了时间的意义。见过王朝更迭，见过沧海桑田，见过无数英雄化作尘土。</p>\n<p>而我还在这里。</p>\n<p>我躺下去，躺在空坟里。土很凉，背很痛。我望着天，天很蓝，云很白。我闭上眼睛，想象自己已经死了。感觉还不错。</p>\n<p>然后我爬起来，拍拍身上的土。酒葫芦里还剩最后一口酒，我喝了。酒很凉，咽下去，胃有点痛。</p>\n<p>天完全黑了，星星一颗颗亮起来。我最后看一眼这四座有名字的坟，和一座没名字的坟，转身向山下走去。</p>\n<p>山下的城镇还亮着灯火。有盏灯刚亮，有盏灯刚灭。有人在等我，有人即将遇见我。我的故事，还没结束。</p>\n<p>我摸了摸腰间的酒葫芦，空荡荡的。该去打酒了。</p>\n<p>山路上有块石头，我踢了一脚。石头滚下山坡，发出咕噜咕噜的声响，越来越小，最后听不见了。</p>\n<p>我顺着石头滚下去的方向，慢慢走下去。</p>"}},{"type":"chapter","title":"第二章 送小石头","data":{"id":2,"title":"第二章 送小石头","html":"<p>小石头说想晒晒太阳。</p>\n<p>那是他临终前第三天。他已经起不了身了，躺在榻上，盖着三床棉被还在发抖。但他说想晒晒太阳。</p>\n<p>我把他抱起来，很轻。八十三岁的人，瘦得只剩一把骨头，比当年我在废墟里捡到他时还轻。</p>\n<p>院子里的桂花树开花了。今年开得早，香气很浓，甜得发腻。我把小石头放在躺椅上，给他盖好毯子。他眯着眼睛，看着天上的云。</p>\n<p>\"师父，云走得真慢。\"</p>\n<p>我嗯了一声，坐在旁边，给他剥橘子。橘子是早市上买的，皮很厚，不好剥。我剥了半天，剥出一手的汁水。</p>\n<p>小石头吃得很慢，一瓣橘子嚼很久。嚼着嚼着，忽然说：\"师父，我想吃桂花糕。\"</p>\n<p>我手停了一下。</p>\n<p>桂花糕。六十年前，我把送到米铺那天，他扔掉的桂花糕。</p>\n<p>\"好。\"我把橘子放下，\"我去买。\"</p>\n<p>\"要城东老孙家的。\"小石头说，\"别家的太甜，腻得慌。\"</p>\n<p>我点点头，起身往外走。小石头又叫我：\"师父。\"</p>\n<p>我回头。他躺在那里，阳光照在他脸上，白得透明。</p>\n<p>\"你快点回来。\"</p>\n<p>我说，好。</p>\n<p>---</p>\n<p>城东老孙家的桂花糕，做了四十年。我走到的时候，铺子前排着长队。我等了很久，久到太阳偏西。</p>\n<p>老孙已经不在了，现在是他儿子在掌勺。桂花糕还是老味道，用纸包着，热乎乎的。</p>\n<p>我捧着桂花糕往回走，走得很急。路过一家布庄时，我停下来，买了一块青布。小石头那件袍子已经破得不能穿了，我想给他做件新的。</p>\n<p>他穿不了了。我知道。但我还是买了。</p>\n<p>回到院子时，太阳已经快落山了。桂花树的影子拉得很长，一直伸到小石头的躺椅边上。</p>\n<p>他还在等我。眼睛还睁着，但已经看不清了。听见我进门，他转过头，笑了一下。</p>\n<p>\"回来了？\"</p>\n<p>\"回来了。\"我在他身边坐下，打开纸包，\"趁热吃。\"</p>\n<p>桂花糕还温着。我掰了一小块，送到他嘴边。他张嘴，含住，嚼了两下。</p>\n<p>然后停住了。</p>\n<p>他咽不下去。喉咙已经枯了，像一口干涸的井。他努力了几下，桂花糕碎在嘴边，掉在毯子上。</p>\n<p>我用手接住，想再喂他。他摇摇头。</p>\n<p>\"师父。\"</p>\n<p>\"嗯。\"</p>\n<p>\"甜的。\"</p>\n<p>他说完这两个字，闭上眼睛，笑了一下。不是笑给我看的，是笑给他自己看的。像是终于完成了什么心愿。</p>\n<p>我拿着那块桂花糕，坐在旁边，直到太阳完全落下去。天黑了，桂花香气更浓了，浓得让人喘不过气来。</p>\n<p>他没有再睁眼。</p>\n<p>---</p>\n<p>那天晚上，我把他抱回屋里。他还活着，但已经不会说话了。呼吸很浅，像一阵风就能吹断。</p>\n<p>我坐在床边，握着他的手。他的手很干，很粗糙，满是练剑磨出的茧子。八十三年来，这双手握过剑，种过花，给我缝过衣服，给我倒过茶。</p>\n<p>现在它们只是静静地躺着，像两片枯叶。</p>\n<p>\"师父。\"他忽然叫了一声。</p>\n<p>我以为他醒了，低头看他。眼睛还闭着，是梦话。</p>\n<p>\"师父，那棵桂花树，是你种的吗？\"</p>\n<p>我恍惚片刻。那棵桂花树，是我六十年前种的。那年他十岁，说想有一棵自己的树。我就种了。</p>\n<p>\"是。\"我说，\"我种的。\"</p>\n<p>他笑了一下，在梦里。\"我就知道。\"</p>\n<p>然后他不说话了。呼吸越来越浅，越来越慢。我数着他的呼吸，一下，两下，三下……数到第七十二下时，停了。</p>\n<p>我等着。等着他再吸一口气。</p>\n<p>没有。</p>\n<p>我握着他的手，坐了很久。窗外天快亮了，桂花香气淡了，取而代之的是晨露的味道，很清新，很凉。</p>\n<p>他手心里的温度，一点点散去。从温热，到微凉，到冰凉。我握着，感受那种变化，像是握着一捧沙，从指缝里漏走。</p>\n<p>我本该哭的。但我没有。</p>\n<p>我只是想起六十年前，他说\"我不要桂花糕，我要跟你走\"时的样子。瘦骨嶙峋，眼神倔强，指甲抠进我肉里。</p>\n<p>那时候我就知道，他会是我这辈子最大的劫。</p>\n<p>但我还是带他走了。</p>\n<p>---</p>\n<p>天亮后，我开始给他整理遗物。他东西不多，一个箱子就装完了。几件旧衣服，几本书，一把剑，还有一些零碎。</p>\n<p>我在箱底发现一块玉佩。是我送给他的，他二十岁那年，成人礼。</p>\n<p>玉佩上刻着两个字：沉舟。</p>\n<p>我的名字。他说，师父的名字，他要随身带着，就像师父在身边。</p>\n<p>我把玉佩握在手里，很凉。然后挂在他脖子上，替他系好。</p>\n<p>\"带着吧。\"我说，\"下辈子，凭这个来找我。\"</p>\n<p>他没有回答。</p>\n<p>---</p>\n<p>葬礼很简单。我没有请太多人，只叫了几个他的徒弟。他们跪在地上哭，我站着，看着棺木入土。</p>\n<p>泥土一锹一锹盖上去，发出沉闷的声响。我听着那种声音，想起很多年前，我给自己挖坟时的声音。</p>\n<p>一样的。都是土落在土上的声音。</p>\n<p>填完土，我在坟前坐了很久。徒弟们先走了，只剩下我一个人。夕阳照在坟头上，把泥土照成金黄色。</p>\n<p>我拔开酒葫芦，喝了一口，倒了一口。</p>\n<p>\"石头，师父欠你七十二年的枫叶。\"</p>\n<p>风吹过，桂花树的叶子沙沙作响。一片叶子落下来，飘到坟头上，停在那里。</p>\n<p>我把它捡起来，夹进怀里。然后起身，拍拍身上的土，向山下走去。</p>\n<p>身后，桂花树的影子拉得很长，像一只手，伸向我，又缩回去。</p>\n<p>我没有回头。</p>\n<p>---</p>\n<p>那天晚上，我梦见了小石头。</p>\n<p>他七岁的样子，站在那棵桂花树下，抬头看着我，缺了颗门牙。</p>\n<p>\"师父，\"他说，\"枫叶红了。\"</p>\n<p>我醒来时，枕巾是湿的。</p>\n<p>窗外，天刚亮，桂花香气又浓了。我坐在床上，看着那棵桂花树，忽然明白了一件事。</p>\n<p>原来不是我在陪他。是他在陪我。</p>\n<p>这八十三年来，一直都是。</p>\n<p>我起床，洗漱，出门。路过坟前时，停了一下。坟头新土还散发着腥味，和昨天一样。</p>\n<p>\"我走了。\"我说，\"下次再来看你。\"</p>\n<p>没有回答。但我知道，他听见了。</p>\n<p>我顺着山路往下走，酒葫芦在腰间轻轻晃动。里面还有半壶酒，是小石头去年酿的，说等我百岁大寿时一起喝。</p>\n<p>我等不到了。他也等不到了。</p>\n<p>但这半壶酒，我会慢慢喝完。一口一口，替他也喝掉。</p>\n<p>山路尽头，城镇的灯火已经亮了。有人在卖早点，热气腾腾的。我走过去，买了一块桂花糕。</p>\n<p>不是老孙家的，是别家的。太甜，腻得慌。</p>\n<p>我咬了一口，皱了皱眉，还是咽下去了。</p>\n<p>甜的。</p>"}},{"type":"chapter","title":"第三章 糖人","data":{"id":3,"title":"第三章 糖人","html":"<p>老张头的糖人摊子，支在城隍庙门口，支了四十年。</p>\n<p>我第一次见他，是在五十年前。那时候他爹还在，是个精瘦的老头，手艺极好，吹出来的糖人活灵活现。孙悟空的金箍棒能晃，猪八戒的耳朵能扇，孩子们围着摊子，眼睛瞪得溜圆。</p>\n<p>老张头那时候还小，二十岁出头的样子，在旁边帮忙熬糖。糖稀在铜锅里咕嘟咕嘟冒泡，他拿着根竹签，不停地搅。搅烦了，就偷看他爹吹糖人。</p>\n<p>\"看什么看，\"他爹骂他，\"糖要糊了。\"</p>\n<p>他低下头，继续搅。但眼睛还瞟着。</p>\n<p>我坐在对面的茶摊上，喝着茶，看着这一幕。那时候我刚收养小石头不久，他趴在我腿上，看得入了迷。</p>\n<p>\"师父，\"他拽我袖子，\"那个糖人，能吃吗？\"</p>\n<p>\"能。\"我说，\"但吃了就没了。\"</p>\n<p>他想了想，说：\"那我不吃，我就看看。\"</p>\n<p>我笑了笑，摸出两个铜板，走过去，买了一个糖兔子。递给小石头，他捧着，舍不得吃，看了很久。</p>\n<p>最后糖兔子化了，粘了他一手。他舔了舔手指，说：\"甜的。\"</p>\n<p>那是他第一次吃糖。</p>\n<p>---</p>\n<p>二十年后，我又路过城隍庙。</p>\n<p>老张头他爹已经不在了，摊子换成了老张头掌勺。他也老了，四十多岁，腰有点弯，但手艺还在。吹出来的糖人比他爹的还精细，连猪八戒的汗毛都能看见。</p>\n<p>他儿子在旁边帮忙，十几岁，和他当年一样，拿着竹签搅糖稀。</p>\n<p>\"看什么看，\"老张头骂他，\"糖要糊了。\"</p>\n<p>那孩子低下头，继续搅。但眼睛还瞟着。</p>\n<p>我坐在茶摊上，要了一壶茶。小石头已经二十多岁了，不再趴在我腿上看糖人。他在旁边坐着，腰上别着剑，像个大人了。</p>\n<p>\"师父，\"他说，\"你还记得小时候那个糖兔子吗？\"</p>\n<p>\"记得。\"</p>\n<p>\"化了，粘了我一手。\"他笑了一下，\"但我舔干净了。\"</p>\n<p>我也笑了一下。那时候他多小啊，现在都能独当一面了。</p>\n<p>老张头吹了个糖龙，金灿灿的，龙须还在颤。一个小孩买了，小心翼翼地捧着，舍不得吃。</p>\n<p>我和小石头看了很久。</p>\n<p>\"师父，\"小石头忽然说，\"等我有了孩子，你也给他买一个糖人吧。\"</p>\n<p>我说，好。</p>\n<p>但他这辈子没有孩子。</p>\n<p>---</p>\n<p>又过了二十年。</p>\n<p>我再路过城隍庙，老张头还在。六十多岁了，头发花白，背也驼了，但还在吹糖人。</p>\n<p>他儿子不在旁边了。我问茶摊老板，说那孩子没出息，嫌吹糖人丢人，去城里打工了。</p>\n<p>老张头一个人忙活，吹糖、捏糖、卖糖，动作慢了很多。糖人也没以前精细了，猪八戒的耳朵有点歪，孙悟空的金箍棒有点弯。</p>\n<p>但孩子们还是围着看。</p>\n<p>我坐在茶摊上，要了一壶茶。小石头已经四十多岁了，他不让我陪他来，说要自己闯荡。我就一个人来，一个人坐，一个人看。</p>\n<p>老张头吹了个糖老鼠，递给一个小姑娘。小姑娘拿着，舍不得吃，看了很久。</p>\n<p>我想起身，也买一个。但想了想，没买。</p>\n<p>买了给谁？小石头已经不爱吃糖了。</p>\n<p>---</p>\n<p>又过了十年。</p>\n<p>老张头七十岁了，还在吹糖人。但他吹不动了，糖稀熬得太稠，吹出来的糖人都裂了。</p>\n<p>他孙子回来了，二十多岁，穿着一身洋装，皮鞋擦得锃亮。他在摊子前站了很久，看着老张头手忙脚乱。</p>\n<p>\"爷爷，\"他说，\"别吹了。\"</p>\n<p>老张头没听见，还在吹。糖人裂了，掉在地上，碎了。</p>\n<p>\"爷爷，\"他孙子提高声音，\"跟我去城里吧。\"</p>\n<p>老张头抬起头，看着他，眼神有点迷茫。</p>\n<p>\"我开了个厂，\"他孙子说，\"做糖果的，机器做的，比这个快多了。您去给我当个顾问，不用干活，就坐着喝茶。\"</p>\n<p>老张头没说话，低头看着地上的碎糖人。</p>\n<p>\"这个，\"他孙子踢了踢地上的碎糖，\"没人买了。现在孩子都吃巧克力，吃洋糖，谁还吃这个。\"</p>\n<p>老张头还是没说话。</p>\n<p>他孙子叹了口气，掏出一张银票，放在摊子上。</p>\n<p>\"您考虑考虑。\"</p>\n<p>然后他走了，皮鞋踩在地上，咔咔响。</p>\n<p>老张头看着那张银票，看了很久。然后弯腰，把地上的碎糖人一块块捡起来，扔进铜锅里。</p>\n<p>糖稀又咕嘟咕嘟冒泡了。</p>\n<p>我坐在茶摊上，要了一壶茶。茶很苦，像中药。</p>\n<p>---</p>\n<p>又过了五年。</p>\n<p>老张头不在了。摊子还在，换成他孙子在管。但不是吹糖人了，是卖洋糖，花花绿绿的包装，印着外国字。</p>\n<p>我坐在茶摊上，要了一壶茶。茶摊老板换人了，是个年轻人，不认识我。</p>\n<p>\"那个吹糖人的呢？\"我问。</p>\n<p>\"死了，\"年轻人说，\"前年冬天死的。冻死的，在桥洞里。他孙子不管他，他就自己跑出来，在桥洞里吹糖人，冻死了。\"</p>\n<p>我放下茶杯。</p>\n<p>\"他孙子呢？\"</p>\n<p>\"不知道，\"年轻人说，\"反正没回来。摊子转给别人了，卖洋糖，赚得比吹糖人多。\"</p>\n<p>我看着那个摊子。花花绿绿的包装，在阳光下闪着光。孩子们围着，买糖，撕开包装，塞进嘴里，嚼两下，扔了包装纸。</p>\n<p>没有人小心翼翼地捧着，没有人舍不得吃。</p>\n<p>我坐了很久，喝完那壶茶。然后起身，走到摊子前。</p>\n<p>\"有糖人吗？\"我问。</p>\n<p>卖糖的年轻人看着我，像看一个怪物。</p>\n<p>\"什么糖人？\"</p>\n<p>\"吹的，\"我说，\"用糖稀吹的，孙悟空，猪八戒。\"</p>\n<p>年轻人笑了。</p>\n<p>\"那个啊，早没了。现在谁还吃那个。您要尝尝这个吗？进口的，巧克力，可好吃了。\"</p>\n<p>他递给我一块巧克力，金纸包着。</p>\n<p>我接过来，没拆，握在手里。金纸有点硌手。</p>\n<p>\"多少钱？\"</p>\n<p>\"送给您了，\"年轻人说，\"您一看就是念旧的人。但念旧没用，该过去的，都得过去。\"</p>\n<p>我点点头，把巧克力揣进怀里，走了。</p>\n<p>---</p>\n<p>那天晚上，我回到住处，小石头已经睡了。他五十多岁了，还是一个人，无儿无女。</p>\n<p>我坐在院子里，看着月亮。怀里的巧克力已经化了，金纸粘在手上。</p>\n<p>我把它剥开，咬了一口。</p>\n<p>很甜，甜得发腻。但那种甜，和糖人的甜不一样。糖人的甜是清甜的，带着麦芽的香气，嚼着嚼着，能嚼出一点苦来。</p>\n<p>这个没有。这个只有甜，一直甜，甜到舌头发麻。</p>\n<p>我把剩下的巧克力扔了。</p>\n<p>然后我想起五十年前，那个化了粘了小石头一手的糖兔子。他舔手指的样子，眼睛亮晶晶的。</p>\n<p>那时候糖很珍贵，吃一口，能甜一整天。</p>\n<p>现在糖很便宜了，但那种甜，没了。</p>\n<p>---</p>\n<p>又过了很多年，我路过一座小城。</p>\n<p>街边有个老人，在吹糖人。手艺很糙，孙悟空长得像猪八戒，猪八戒长得像块石头。</p>\n<p>但我停下来，看了很久。</p>\n<p>\"多少钱一个？\"我问。</p>\n<p>\"五个铜板。\"</p>\n<p>我摸出五个铜板，买了一个。他吹了个糖兔子，歪歪扭扭的，耳朵一长一短。</p>\n<p>我捧着，没吃，看了一路。</p>\n<p>回到住处，小石头问我：\"师父，这是什么？\"</p>\n<p>\"糖人。\"</p>\n<p>\"能吃吗？\"</p>\n<p>\"能。\"我说，\"但吃了就没了。\"</p>\n<p>他想了想，说：\"那我不吃，我就看看。\"</p>\n<p>我笑了笑，把糖兔子递给他。</p>\n<p>他捧着，看了很久。阳光照在糖兔子上，晶莹剔透，像一块琥珀。</p>\n<p>\"师父，\"他说，\"这个糖人，以后还会有人吹吗？\"</p>\n<p>我想了想，说：\"不知道。也许会，也许不会。\"</p>\n<p>\"那如果不会了，怎么办？\"</p>\n<p>\"那就记住了。\"我说，\"记住它曾经存在过，记住它的甜，记住它的样子。这样，它就不算真的消失。\"</p>\n<p>小石头点点头，把糖兔子举起来，对着阳光看。</p>\n<p>\"真好看。\"</p>\n<p>他看了一下午，直到糖兔子化了，粘了他一手。</p>\n<p>然后他舔了舔手指，说：\"甜的。\"</p>\n<p>我笑了笑，没说话。</p>\n<p>窗外的天很蓝，云很白。远处传来孩子们的笑声，不知道在笑什么。</p>\n<p>也许他们在吃巧克力，也许他们在吃棉花糖，也许他们什么都没吃，只是跑着玩。</p>\n<p>但那种甜，和糖人的甜，不一样。</p>\n<p>糖人的甜，是要等的。等糖稀熬好，等师傅吹好，等它慢慢凉下来，才能吃。那种等，也是一种甜。</p>\n<p>现在的甜，不用等，撕开包装就有。但那种等的过程，没了。</p>\n<p>我拿起茶壶，倒了一杯茶。茶很凉，但还能喝。</p>\n<p>小石头还在舔手指，把最后一点糖都舔干净了。</p>\n<p>\"师父，\"他说，\"下次路过，我们再买一个吧。\"</p>\n<p>我说，好。</p>\n<p>但我知道，那个吹糖人的老人，明年就不在了。</p>\n<p>而我，还会在这里，很久很久。</p>\n<p>替他们，记住这种甜。</p>"}},{"type":"chapter","title":"第四章 晚晴归处","data":{"id":4,"title":"第四章 晚晴归处","html":"<p>苏晚晴走的那天，窗外在下雪。</p>\n<p>江南很少下雪，那年却下了很大的一场。雪片子像鹅毛，扑簌簌地落，把院子里的白菊盖住了，白茫茫一片。</p>\n<p>我坐在床边，握着她的手。她的手很凉，像一块玉，捂不热。</p>\n<p>\"今天什么日子？\"她忽然问。</p>\n<p>我想了想，说：\"冬至。\"</p>\n<p>\"难怪这么冷。\"她笑了一下，声音很轻，像一片雪花落在地上，\"你记得吗？我们第一次见面，也是冬天。\"</p>\n<p>我记得。</p>\n<p>那是三年前，我在江南的一个小镇上，发了高烧。倒在路边，被人抬到她的医馆里。我醒来时，她正在给我把脉，眉头皱着。</p>\n<p>\"你这病，\"她说，\"很奇怪。\"</p>\n<p>\"怎么奇怪？\"</p>\n<p>\"脉象像是……\"她顿了顿，\"不像活人。\"</p>\n<p>我笑了。她说得对，我确实不算活人。我死了又活，活了又死，三百年了。</p>\n<p>但她治不好我，因为我没病。我只是累了，想歇一歇。</p>\n<p>我在她的医馆里住了七天。七天里，她每天给我熬药，我不喝，她就倒掉，第二天再熬。我问她，明知没用，为什么还熬。</p>\n<p>她说：\"药是要熬的，喝不喝是你的事。\"</p>\n<p>第七天，我好了。不是药治好的，是我自己歇够了。我走之前，问她多少钱。</p>\n<p>她说：\"不要钱。\"</p>\n<p>\"为什么？\"</p>\n<p>\"你长得好看，\"她说，\"看着顺眼。\"</p>\n<p>我出神了一瞬，然后笑了。这是我三百年里，第一次有人夸我好看。</p>\n<p>---</p>\n<p>后来我就留在江南了。</p>\n<p>我在她的医馆旁边租了间屋子，每天坐在院子里，看她给人看病。她看病很慢，每个病人都要问很久，家常里短，什么都问。有的老太太来拿药，能跟她说一个时辰的话。</p>\n<p>我就在旁边听着，听着听着，就睡着了。</p>\n<p>醒来时，她给我盖了件毯子，面前放着一杯茶。茶是普通的绿茶，但她泡得特别好，杯底总沉着两片茶叶，像艘小船。</p>\n<p>\"你泡的茶，为什么总有小船？\"我问。</p>\n<p>\"什么小船？\"</p>\n<p>\"茶叶。\"我指着杯底，\"像艘小船，浮在那里。\"</p>\n<p>她低头看了看，笑了。\"那是你杯子放得久，茶叶沉下去了。\"</p>\n<p>\"是吗？\"我说，\"但我喜欢。像艘小船，稳稳的。\"</p>\n<p>她没说话，只是看着我，看了很久。然后她说：\"你是哪里人？\"</p>\n<p>\"很远的地方。\"</p>\n<p>\"远到……回不去了？\"</p>\n<p>我愣了一下，然后点头。\"回不去了。\"</p>\n<p>她没再问，只是又给我倒了一杯茶。茶叶在水里打转，慢慢沉下去，又像艘小船。</p>\n<p>---</p>\n<p>我们在江南住了三年。</p>\n<p>三年里，我给她递药，她给我泡茶。我给她劈柴，她给我缝衣服。我给她讲我以前世界的事，她给我讲她小时候的事。</p>\n<p>她说，她爹也是个大夫，死得早，留给她这间医馆。她说，她本来有个未婚夫，是个秀才，后来中了举人，去京城赶考，再也没回来。她说，她这辈子，可能就这样了，一个人，守着这间医馆，直到死。</p>\n<p>我说，不会的。你会活很久。</p>\n<p>她笑了一下，没说话。</p>\n<p>我知道她活不久。我认识她的第一天，就知道她会死，知道她会病死，知道就在今年冬天。但我没说，她也没问。</p>\n<p>我们只是这样，一天一天地过。</p>\n<p>---</p>\n<p>第一年春天，她在院子里种了白菊。</p>\n<p>\"白菊有什么好？\"我问。</p>\n<p>\"白菊不争不抢，\"她说，\"静静地开，静静地落，像我想要的人生。\"</p>\n<p>我看着她种花，挖坑，放苗，填土，浇水。动作很慢，但很稳。</p>\n<p>\"你想要什么样的人生？\"我问。</p>\n<p>\"平静的，\"她说，\"不惊不喜，不怨不恨，就这样，一天天过下去。\"</p>\n<p>我说，这很好。</p>\n<p>她抬头看我，笑了一下。\"你也是吧？\"</p>\n<p>我想了想，说：\"我以前不是。我以前……总想改变什么。但现在，我也想要平静的。\"</p>\n<p>她点点头，继续种花。</p>\n<p>那年秋天，白菊开了，满院子都是。她摘了一束，放在窗台上，每天看着。</p>\n<p>我说，你比白菊好看。</p>\n<p>她说，油嘴滑舌。</p>\n<p>但她笑了，笑得很开心。</p>\n<p>---</p>\n<p>第二年夏天，我生了一场病。</p>\n<p>不是真的病，是旧伤复发。三百年来，我受过太多伤，有些好不了，时不时就会疼。那次疼得厉害，我在床上躺了半个月。</p>\n<p>她每天给我熬药，换药方，针灸，按摩。我让她别忙了，没用的，我这是老毛病，治不好的。</p>\n<p>她说：\"治不治得好，我说了算。\"</p>\n<p>我说，你这人，怎么这么倔。</p>\n<p>她说，彼此彼此。</p>\n<p>半个月后，我好些了，能下床了。她瘦了一圈，眼圈发黑。我说，你歇歇吧。</p>\n<p>她说，等你不疼了，我就歇。</p>\n<p>我说，我不疼了。</p>\n<p>她看着我，看了很久，然后点点头。\"好，那我去睡了。\"</p>\n<p>她走到门口，忽然又回头。\"你那次生病，喊了一个名字。\"</p>\n<p>\"什么名字？\"</p>\n<p>\"小石头。\"</p>\n<p>我愣了一下。</p>\n<p>她没再问，只是笑了一下，走了。</p>\n<p>那天晚上，我坐在院子里，看着月亮，坐了很久。小石头那时候还活着，但我已经知道，他会比我先走。晚晴也是。</p>\n<p>他们都是过客，而我，是站台。</p>\n<p>---</p>\n<p>第三年冬天，她病了。</p>\n<p>一开始只是咳嗽，她没在意，说是着凉了。后来越咳越厉害，开始咳血。我让她别给人看病了，歇着，她不肯。</p>\n<p>\"病人还等着呢，\"她说，\"我歇了，他们怎么办？\"</p>\n<p>我说，你自己都病了，还管别人。</p>\n<p>她说，大夫就是这样，别人的命，比自己的重要。</p>\n<p>我说，胡说。</p>\n<p>她笑了一下，又开始咳嗽，咳出一口血，手帕染红了。我拿过手帕，要扔，她不让。</p>\n<p>\"别扔，\"她说，\"洗洗还能用。\"</p>\n<p>我看着那块手帕，看了很久。然后我说：\"晚晴，我知道你会死。\"</p>\n<p>她愣了一下，然后笑了一下。\"我知道你知道。\"</p>\n<p>\"你不怕？\"</p>\n<p>\"怕什么？\"她说，\"人都会死的。我只是……有点遗憾。\"</p>\n<p>\"遗憾什么？\"</p>\n<p>她看着我，看了很久。\"遗憾，不能陪你更久。\"</p>\n<p>我说不出话来。</p>\n<p>她握住我的手，她的手很凉，但握得很紧。\"顾沉舟，我这辈子，很圆满。真的。我治过很多人，种过一院子的花，还……还遇见过你。\"</p>\n<p>\"晚晴……\"</p>\n<p>\"别说话，\"她说，\"让我说完。我知道你不是普通人，知道你活得很久，知道我只能陪你走一程。但我不后悔。这一程，我很开心。\"</p>\n<p>她顿了顿，又说：\"只是，我走了以后，你要好好活着。喝茶要喝热的，不要等凉了再喝。天冷了要加衣服，不要逞强。还有……\"</p>\n<p>她想了想，笑了。\"还有，记得给我的白菊浇水。\"</p>\n<p>我说，好。</p>\n<p>---</p>\n<p>那是三天前。</p>\n<p>现在，她躺在这里，窗外在下雪。白菊被雪盖住了，看不见了。</p>\n<p>她忽然坐起来，看着窗外，说：\"今年的白菊，不知道能不能熬过冬天。\"</p>\n<p>我说：\"我帮你看着。\"</p>\n<p>她摇头，握住我的手。\"别看了。去喝口热茶吧。茶凉了。\"</p>\n<p>我愣了一下。</p>\n<p>她笑了一下，看着我，看了很久。然后她闭上眼睛，手慢慢松开。</p>\n<p>我等着她再睁开眼睛。</p>\n<p>她没有。</p>\n<p>---</p>\n<p>我坐了很久，直到窗外的雪停了，天黑了，星星出来了。</p>\n<p>她的手已经凉了，像一块真正的玉。我握着，感受那种凉，从她的手心，传到我的手心，再传到我的心里。</p>\n<p>我本该哭的。但我没有。</p>\n<p>我只是想起，她给我泡的第一杯茶。茶叶在杯底打转，像艘小船。她说，那是放得久了，茶叶沉下去了。</p>\n<p>但我知道，不是。</p>\n<p>那是她特意放的。她知道我会喜欢。</p>\n<p>我起身，走到院子里，把白菊上的雪扫掉。菊花冻得僵硬，但还活着。我把它们搬进屋里，放在她床边。</p>\n<p>她说过，白菊不争不抢，静静地开，静静地落。</p>\n<p>现在她落了。白菊还在开。</p>\n<p>我回到床边，倒了一杯茶。茶叶在水里打转，慢慢沉下去，像艘小船。</p>\n<p>我喝了一口。</p>\n<p>茶是凉的，苦涩刺喉。</p>\n<p>---</p>\n<p>葬礼很简单。我按照她的遗愿，把她葬在医馆后面的山坡上，能看见院子里的白菊。</p>\n<p>我在她的坟前，种了一棵白菊。是她去年留的种子，我一直收着。</p>\n<p>种完，我坐在坟前，看着那棵刚种下的白菊。它很小，很弱，但还活着。</p>\n<p>我说：\"晚晴，我答应你，每年冬天，都给你的白菊扫雪。\"</p>\n<p>没有回答。</p>\n<p>但我知道，她听见了。</p>\n<p>我起身，拍拍身上的土，向山下走去。走到一半，忽然想起什么，回头看了最后一眼。</p>\n<p>月光照在她的坟上，白茫茫的，像落了一层雪。</p>\n<p>也像落了一层温柔。</p>\n<p>我转回头，继续走。酒葫芦在腰间轻轻晃动，发出清脆的声响。</p>\n<p>里面的酒，是她去年酿的，桃花酒。她说，等我百岁大寿时，一起喝。</p>\n<p>我等不到了。她也等不到了。</p>\n<p>但这壶酒，我会慢慢喝完。一口一口，替她也喝掉。</p>\n<p>山路尽头，城镇的灯火已经灭了。天快亮了，晨曦照在东方的天际，淡淡的，像一杯凉了的茶。</p>\n<p>我喝了一口酒，很甜，甜得发腻。</p>\n<p>然后我想起，她给我泡的茶。那种清苦，那种回甘，那种杯底的小船。</p>\n<p>我再也喝不到了。</p>\n<p>---</p>\n<p>很多年以后，我路过江南。</p>\n<p>那个医馆还在，但已经换了主人，成了一个杂货铺。院子里的白菊还在，每年秋天都开，满院子都是。</p>\n<p>我坐在对面的茶摊上，要了一壶茶。茶是普通的绿茶，但泡得不好，茶叶浮在水面上，像一群溺水的虫子。</p>\n<p>我喝了一口，很苦，没有回甘。</p>\n<p>但我喝完了。</p>\n<p>喝完，我走到医馆门口，站了很久。门板上有一道刻痕，是我当年刻的，记录她的身高。她让我刻的，说想看看自己有没有长高。</p>\n<p>刻痕还在，浅浅的一道。</p>\n<p>我伸出手，摸了摸那道刻痕。木板很旧，很粗糙，像她的手。</p>\n<p>\"晚晴，\"我说，\"我很好。茶我还是喝凉的，改不了了。\"</p>\n<p>没有回答。</p>\n<p>但我知道，她听见了。</p>\n<p>我转身，向城外走去。身后，白菊开得正盛，白色的花瓣在风中轻轻摇晃，像一群小船，在浪尖上起伏。</p>\n<p>稳稳的，像她曾经给我的温柔。</p>"}},{"type":"chapter","title":"第五章 粥","data":{"id":5,"title":"第五章 粥","html":"<p>那家客栈，我在三十年前住过。</p>\n<p>那时候掌柜的是个老太太，姓周，头发花白，但精神很好。每天早上亲自熬粥，白米粥，熬得稠稠的，上面浮着一层米油。配一碟咸菜，两个馒头，就是一顿早饭。</p>\n<p>我住了半个月，每天早上都喝她的粥。她看我顺眼，每次给我多舀一勺，说：\"年轻人，多吃点，长身体。\"</p>\n<p>那时候小石头还在，十几岁，正是长身体的时候。他每次都能吃三碗，吃得额头冒汗。周老太太看着笑，说这孩子有福气。</p>\n<p>走的时候，周老太太送我们到门口，说：\"下次路过，还来住啊。\"</p>\n<p>我说，好。</p>\n<p>---</p>\n<p>二十年前，我又路过。</p>\n<p>周老太太已经不在了，换成她女儿掌勺。也是个老太太了，但比她娘胖一些，脸上总是带着笑。粥还是那锅粥，白米粥，稠稠的，上面浮着一层米油。</p>\n<p>她说，她娘临走前把配方传给她，说一定要熬够时辰，不能偷懒。</p>\n<p>我住了十天。她认得我，说：\"您还是老样子，一点没变。\"</p>\n<p>我笑了笑，没说话。</p>\n<p>小石头那时候已经三十多岁了，不再跟着我到处跑。我一个人住，一个人吃，一个人喝粥。她每次给我盛粥，都多舀一勺，说：\"您多吃点，别客气。\"</p>\n<p>走的时候，她送我到门口，说：\"下次路过，还来住啊。\"</p>\n<p>我说，好。</p>\n<p>---</p>\n<p>十年前，我又路过。</p>\n<p>掌柜的换成了周老太太的外孙女，三十多岁，泼辣得很。粥还是那锅粥，但熬得没那么稠了，米油也少了。她说，现在人都忙，没工夫等那么久。</p>\n<p>我住了三天。她不认识我，但我提起她外婆，她眼睛一亮。</p>\n<p>\"您认识我太姥姥？\"</p>\n<p>\"住过她的店。\"</p>\n<p>\"那您得有多少岁了？\"她上下打量我，\"我太姥姥都死了四十年了。\"</p>\n<p>我说，我显年轻。</p>\n<p>她笑了一下，没再追问。但每天给我盛粥，还是多舀一勺。可能是习惯，可能是她娘跟她说过什么。</p>\n<p>走的时候，她送我到门口，说：\"下次路过，还来住啊。\"</p>\n<p>我说，好。</p>\n<p>---</p>\n<p>今年，我又路过。</p>\n<p>客栈还在，但已经变了样。重新装修过，门脸很新，挂着红灯笼，写着\"百年老店\"。但进去一看，不是客栈了，是酒楼。一楼吃饭，二楼住宿，三楼是雅间，有唱曲的。</p>\n<p>掌柜的是个年轻人，二十出头，周老太太的曾外孙。他坐在柜台后面，拿着个算盘，噼里啪啦地打。见我进来，抬头看了一眼，又低下头去。</p>\n<p>\"住店？\"</p>\n<p>\"住店，\"我说，\"也吃饭。\"</p>\n<p>\"先交钱。\"他伸出手，\"一晚三百文，饭钱另算。\"</p>\n<p>我交了钱，他给了我一把钥匙，上楼。</p>\n<p>房间很小，但干净。窗户对着街，下面人来人往，很吵。我坐了一会儿，下楼吃饭。</p>\n<p>酒楼里人很多，吵吵嚷嚷的。我找了个角落坐下，要了一碗粥。</p>\n<p>伙计怔了一下，\"就一碗粥？\"</p>\n<p>\"就一碗粥。\"</p>\n<p>\"白米粥五十文，\"他说，\"瘦肉粥一百文，鲍鱼粥三百文。您要哪种？\"</p>\n<p>\"白米粥。\"</p>\n<p>伙计看了我一眼，像看一个怪物。然后走了。</p>\n<p>粥很快就上来了。不是熬的，是煮的。米粒还没开花，水米分离，上面漂着几根咸菜丝，切得粗细不均。</p>\n<p>我喝了一口，很稀，像喝水。</p>\n<p>但我还是喝完了。</p>\n<p>---</p>\n<p>第二天早上，我又去要了一碗粥。</p>\n<p>还是那个伙计，还是那个表情。\"又是白米粥？\"</p>\n<p>\"嗯。\"</p>\n<p>\"您不点菜？我们这儿招牌菜很多，红烧肘子、清蒸鲈鱼……\"</p>\n<p>\"不要，\"我说，\"就粥。\"</p>\n<p>他摇摇头，走了。</p>\n<p>粥上来，还是那样，水米分离，咸菜丝切得粗细不均。</p>\n<p>我喝着粥，看着窗外。街上人来人往，有卖糖葫芦的，有卖风筝的，有耍猴的。很热闹，但和我没关系。</p>\n<p>掌柜的走过来，坐在我对面。</p>\n<p>\"老人家，\"他说，\"您在我这儿住了三天了，每天就喝一碗白粥。\"</p>\n<p>\"嗯。\"</p>\n<p>\"您是不是……没钱了？\"他压低声音，\"要是没钱，您说一声，我可以少收点。但您这样，光喝粥，身体受不了啊。\"</p>\n<p>我笑了笑，\"有钱。\"</p>\n<p>\"那您为什么……\"</p>\n<p>\"我喜欢喝粥。\"</p>\n<p>他看着我，看了很久。然后他说：\"您是不是认识我太姥姥？\"</p>\n<p>\"嗯，\"我说，\"三十年前，住过她的店。\"</p>\n<p>他微微一怔，然后笑了。\"您别逗了。三十年前？您现在才多大？看起来也就三十来岁。\"</p>\n<p>\"我显年轻。\"</p>\n<p>\"再年轻也不可能，\"他说，\"三十年前您要是住过店，现在至少得五六十岁。您这看起来……\"</p>\n<p>他顿住了，上下打量我。</p>\n<p>\"您不会是骗子吧？\"他忽然说，\"骗吃骗住的那种。我跟您说，我这儿有伙计，有打手，您别想耍花样。\"</p>\n<p>我放下碗，看着他。</p>\n<p>\"我不是骗子。\"</p>\n<p>\"那您说，\"他往前凑了凑，\"您到底多大岁数？\"</p>\n<p>我想了想，说：\"三百多岁。\"</p>\n<p>他呆了一瞬，然后大笑起来。笑得前仰后合，拍桌子。</p>\n<p>\"三百多岁！哈哈哈！您真会说笑！\"</p>\n<p>我没笑，只是看着他。</p>\n<p>他笑完了，擦擦眼泪，说：\"行，您三百多岁。那您肯定认识我太姥姥，认识我姥姥，认识我娘。您跟我说说，她们长什么样？\"</p>\n<p>\"你太姥姥，\"我说，\"头发花白，但精神很好。每天早上亲自熬粥，白米粥，熬得稠稠的，上面浮着一层米油。她看我顺眼，每次给我多舀一勺。\"</p>\n<p>他恍惚片刻，笑容有些僵。</p>\n<p>\"您……您怎么知道？\"</p>\n<p>\"我还知道，\"我说，\"你姥姥比她胖一些，脸上总是带着笑。你娘三十多岁，泼辣得很。现在轮到你了。\"</p>\n<p>他看着我，看了很久。眼神从好笑，变成疑惑，变成警惕，最后变成……一种说不清的复杂。</p>\n<p>\"您到底是谁？\"</p>\n<p>\"我谁也不是，\"我说，\"就是一个住店的。\"</p>\n<p>他站起来，往后退了一步。</p>\n<p>\"您……您等着，我去叫人。\"</p>\n<p>他转身跑了。</p>\n<p>我坐在那里，把剩下的粥喝完。粥已经凉了，更难喝了。但我还是喝完了。</p>\n<p>---</p>\n<p>过了一会儿，他带着两个伙计过来，手里拿着棍子。</p>\n<p>\"就是他，\"他指着我，\"他说他是妖怪，三百多岁了，认识我太姥姥。\"</p>\n<p>两个伙计看着我，像看一个疯子。</p>\n<p>我放下碗，站起身。</p>\n<p>\"我不是妖怪，\"我说，\"也不是骗子。我就是……活得久了点。\"</p>\n<p>\"活得久？\"一个伙计说，\"您当我们是傻子？\"</p>\n<p>\"我没有。\"</p>\n<p>\"那您证明一下，\"掌柜的说，\"您怎么证明您三百多岁？\"</p>\n<p>我想了想，说：\"我证明不了。\"</p>\n<p>\"那就是骗子！\"他大声说，\"来人啊，把他赶出去！\"</p>\n<p>两个伙计上来，一左一右，架住我的胳膊。我没有反抗，让他们架着，往门外走。</p>\n<p>走到门口，我回头看了他一眼。</p>\n<p>\"你太姥姥熬粥，要熬够时辰。米下锅，大火烧开，小火慢熬，一个时辰不能停。这样熬出来的粥，上面才会有一层米油。\"</p>\n<p>他微微一怔。</p>\n<p>\"你姥姥也是这么熬的。你娘可能嫌麻烦，熬得没那么稠了。到了你这儿，直接煮成稀饭。\"</p>\n<p>他张了张嘴，想说什么。</p>\n<p>\"我不是说你不对，\"我说，\"时代变了，人都忙，没工夫等那么久。只是……\"</p>\n<p>我顿了顿。</p>\n<p>\"只是那层米油，真的很好喝。\"</p>\n<p>说完，我转身走了。两个伙计松了手，没有追。</p>\n<p>---</p>\n<p>我走在街上，阳光很好，照在身上暖暖的。</p>\n<p>身后，客栈里传来吵闹声，可能是掌柜的在骂人，可能是伙计在议论。我没回头。</p>\n<p>我走到城门口，坐在墙根下，看着来来往往的人。有赶车的，有挑担的，有牵着孩子的。每个人都有自己的去处，每个人都有自己的故事。</p>\n<p>而我，没有去处。我只是路过，看看，然后走。</p>\n<p>一个老太太走过来，在我身边坐下，从篮子里拿出一个馒头，掰了一半给我。</p>\n<p>\"吃吧，\"她说，\"看你饿了。\"</p>\n<p>我接过馒头，咬了一口。很硬，很干，但能吃。</p>\n<p>\"谢谢您。\"</p>\n<p>\"谢什么，\"她说，\"一个馒头而已。\"</p>\n<p>她坐在我旁边，慢慢吃着自己的那半个馒头。阳光照在她脸上，皱纹很深，但眼神很亮。</p>\n<p>\"您多大岁数了？\"我问。</p>\n<p>\"七十多了，\"她说，\"老了，干不动活了，就出来晒晒太阳。\"</p>\n<p>\"您看起来精神很好。\"</p>\n<p>\"精神好有什么用，\"她笑了一下，\"活得久，看得多，心里的东西就沉。\"</p>\n<p>我看着她，\"您心里沉什么？\"</p>\n<p>\"沉那些走了的人，\"她说，\"我爹，我娘，我男人，我孩子。都走了，就剩我一个。\"</p>\n<p>她顿了顿，又说：\"但我不难过。他们走了，我就替他们活着。替他们看看这太阳，替他们晒晒这 warmth。\"</p>\n<p>我愣了一下。</p>\n<p>她吃完馒头，拍拍手，站起身。</p>\n<p>\"年轻人，\"她说，\"你也别难过。人活着，就是这样，有人走，有人来。走了的，记住就行。\"</p>\n<p>她走了，佝偻着背，慢慢消失在人群里。</p>\n<p>我坐在那里，看着她的背影，看了很久。</p>\n<p>然后我想起了周老太太。她熬粥的样子，她多给我舀一勺的样子，她送我到门口的样子。</p>\n<p>她说，下次路过，还来住啊。</p>\n<p>我说，好。</p>\n<p>但我不会再去了。那里的粥，已经不是那个味道了。</p>\n<p>---</p>\n<p>傍晚，我出了城，沿着官道走。</p>\n<p>路边有个茶摊，我坐下，要了一碗茶。茶很苦，像药。</p>\n<p>摊主是个中年男人，问我：\"客官从哪儿来？\"</p>\n<p>\"城里。\"</p>\n<p>\"城里怎么样？\"</p>\n<p>\"很热闹，\"我说，\"但粥不好喝。\"</p>\n<p>他愣了一下，然后笑了一下。\"粥不好喝，就喝茶。茶不好喝，就喝酒。总有一款适合您。\"</p>\n<p>我也笑了一下。</p>\n<p>他说得对。粥不好喝了，还有茶。茶不好喝了，还有酒。只要还在走，总能找到好喝的。</p>\n<p>我喝完茶，放下铜板，继续走。</p>\n<p>身后，茶摊的灯笼亮了，暖黄色的光，在暮色中很温柔。</p>\n<p>就像很多年前，周老太太客栈里的那盏灯。</p>\n<p>我没有回头，但我知道，那盏灯，会一直亮在那里。</p>\n<p>替所有路过的人，照亮一程。</p>"}},{"type":"chapter","title":"第六章 长风去","data":{"id":6,"title":"第六章 长风去","html":"<p>李长风死的那天，是个晴天。</p>\n<p>我记得很清楚，因为他在出发前说：\"顾兄，这么好的天，不打仗可惜了。\"</p>\n<p>我当时正在给他系战甲的带子。他的手不方便，左臂上个月受了伤，还没好利索。我替他系紧，打了个死结。</p>\n<p>\"别去。\"我说。</p>\n<p>他恍惚片刻，然后笑了起来。\"顾兄，你开玩笑吧？军令如山，我能不去？\"</p>\n<p>\"你会死。\"</p>\n<p>他看着我，看了很久。然后他说：\"我知道。\"</p>\n<p>我愣住了。</p>\n<p>\"你……知道？\"</p>\n<p>\"我知道，\"他说，\"我知道这一仗有埋伏，知道去了就回不来，知道我的命就到今天为止。\"</p>\n<p>他顿了顿，又说：\"但我还是要去。\"</p>\n<p>\"为什么？\"</p>\n<p>\"因为这是我的命，\"他说，\"我选择这样活，就要这样死。\"</p>\n<p>我看着他，说不出话来。</p>\n<p>他拍拍我的肩膀，说：\"顾兄，你别难过。我这一生，值了。\"</p>\n<p>---</p>\n<p>我第一次见李长风，是在一家酒馆里。</p>\n<p>他那时候二十出头，穿着一身洗得发白的布衣，腰上别着一把剑。剑很旧，剑鞘上的漆都掉了，但他走得很神气，像穿着龙袍。</p>\n<p>他走到我对面，坐下，把剑往桌上一拍。</p>\n<p>\"兄台，\"他说，\"我看你一个人喝酒，不痛快。我陪你喝。\"</p>\n<p>我看了他一眼。\"我不认识你。\"</p>\n<p>\"喝了就认识了，\"他说，\"我叫李长风，你呢？\"</p>\n<p>\"顾沉舟。\"</p>\n<p>\"好名字，\"他说，\"来，干一杯！\"</p>\n<p>他举起酒杯，一饮而尽。我也喝了。</p>\n<p>那是我们相识的开始。</p>\n<p>后来我才知道，他是个孤儿，从小在街头长大，学了一身武艺。他说，他要成为天下第一剑客，让所有人都知道他的名字。</p>\n<p>我说，你会的。</p>\n<p>但我没告诉他，他活不到成为天下第一的那天。</p>\n<p>---</p>\n<p>我们认识的那一年，他做了三件大事。</p>\n<p>第一件，他一个人挑了黑风寨，杀了三十七个山贼，救了一村百姓。第二件，他在比武大会上打败了前任盟主，名震江湖。第三件，他救了一个被绑架的官家小姐，小姐要嫁给他，他拒绝了。</p>\n<p>我问他，为什么拒绝。</p>\n<p>他说：\"我不喜欢她。\"</p>\n<p>\"但她喜欢你。\"</p>\n<p>\"那又怎样？\"他说，\"我要娶的人，必须是我喜欢的。别人喜欢我，我就要娶，那我这辈子得娶多少人？\"</p>\n<p>我说，你说得对。</p>\n<p>他笑了一下，说：\"顾兄，你这人很有意思。别人都说我傻，放着好好的亲事不要。你不说。\"</p>\n<p>\"因为我知道，你说得对。\"</p>\n<p>他看着我，看了很久。然后说：\"顾兄，我觉得我们是同类人。\"</p>\n<p>\"同类人？\"</p>\n<p>\"嗯，\"他说，\"都不怕死。\"</p>\n<p>我愣了一下，然后笑了。</p>\n<p>他错了。我怕死，怕得要命。我死了太多次，又活了太多次，我知道死是什么滋味。</p>\n<p>但他不怕。他是真的不怕。</p>\n<p>---</p>\n<p>我们在一起的那两年，是他最快乐的日子。</p>\n<p>我们走遍大江南北，喝酒，打架，看风景。他每到一个地方，就要挑战当地的高手。输了，他就请教，赢了，他就请客喝酒。</p>\n<p>他说，这叫以武会友。</p>\n<p>我说，这叫到处惹事。</p>\n<p>他笑，说：\"顾兄，你不懂，这叫活着。\"</p>\n<p>我问，什么叫活着。</p>\n<p>他说：\"活着，就是想做就做，想喝就喝，想打就打。不怕死，也不怕输。\"</p>\n<p>我说，那你输过吗？</p>\n<p>他说，输过，很多次。但每次输了，我就变强了。所以我不怕输。</p>\n<p>我问，那你怕什么。</p>\n<p>他想了想，说：\"怕老。\"</p>\n<p>\"怕老？\"</p>\n<p>\"嗯，\"他说，\"怕老了以后，打不动了，只能坐在家里晒太阳。那多无聊啊。\"</p>\n<p>我说，那你就别老。</p>\n<p>他看着我，笑了一下。\"顾兄，你说话真有意思。人不老，那不成了妖怪？\"</p>\n<p>我也笑了。</p>\n<p>我没有告诉他，我就是妖怪。不会老，不会死，看着身边的人一个个离开，自己却还在这里。</p>\n<p>---</p>\n<p>第三年，他三十岁。</p>\n<p>那年边疆战事起，朝廷征兵。他二话不说，就报了名。</p>\n<p>我说，你别去。</p>\n<p>他说，为什么？</p>\n<p>我说，你会死。</p>\n<p>他笑了一下，说：\"顾兄，你又在说笑了。\"</p>\n<p>\"我没有说笑。\"</p>\n<p>他看着我，看了很久。然后他说：\"顾兄，你是不是知道什么？\"</p>\n<p>我没有说话。</p>\n<p>他说：\"不管你知道什么，我都要去。这是我的机会。\"</p>\n<p>\"什么机会？\"</p>\n<p>\"名扬天下的机会，\"他说，\"我要让所有人都知道，李长风不仅是个剑客，还是个将军。我要让史书上，有我的名字。\"</p>\n<p>我说，史书上会有你的名字。</p>\n<p>但我没说，那名字后面，会跟着\"战死\"两个字。</p>\n<p>---</p>\n<p>他在军营里待了半年，从一个普通士兵，做到了副将。</p>\n<p>每次来信，他都要说他的战绩。杀了多少敌人，救了多少百姓，立了多少功。他说，再过一年，他就能做到将军。</p>\n<p>我说，你会的。</p>\n<p>但我没说，他等不到那一年。</p>\n<p>出事前一个月，他写信给我，说有一仗很重要。如果能赢，他就能封侯。他说，顾兄，等我封侯了，请你喝酒，最好的酒。</p>\n<p>我说，好，我等你。</p>\n<p>但我没去等他。我去了军营，在他身边，看着他。</p>\n<p>他看到我很惊讶，说：\"顾兄，你怎么来了？\"</p>\n<p>我说，我想看看你。</p>\n<p>他笑了一下，说：\"你是怕我有危险吧？放心，我命硬，死不了。\"</p>\n<p>我没有说话。</p>\n<p>---</p>\n<p>决战前三天，我找到他，告诉他，这一仗有埋伏，不要去。</p>\n<p>他说，我知道。</p>\n<p>我说，你知道？</p>\n<p>他说，我知道这一仗是陷阱，知道将军想借敌人的手除掉我，知道我去了就回不来。</p>\n<p>我说，那你为什么还要去。</p>\n<p>他说，因为这是我的选择。</p>\n<p>他看着我，说：\"顾兄，我这辈子，没怕过死。我只怕一件事。\"</p>\n<p>\"什么事？\"</p>\n<p>\"怕白活一场。\"</p>\n<p>他说：\"如果我不去，我能活。但我活着，就是个逃兵，是个懦夫。我这一辈子，就毁了。\"</p>\n<p>\"但如果你去了，你就死了。\"</p>\n<p>\"死了，我也是个英雄，\"他说，\"人们会记得我，史书会写我。我活了三十年，值了。\"</p>\n<p>我说，不值。活着比什么都重要。</p>\n<p>他摇头，说：\"顾兄，你不懂。你活得太久了，你忘了什么叫活着。\"</p>\n<p>我愣住了。</p>\n<p>他说：\"活着，不是喘气，不是吃饭，不是睡觉。活着，是要有意义，有价值，有光芒。哪怕只有一瞬间，也要让所有人都看见。\"</p>\n<p>他拍拍我的肩膀，说：\"顾兄，我这一生，很短，但很亮。这就够了。\"</p>\n<p>---</p>\n<p>决战那天早上，我给他系战甲。</p>\n<p>系完，他说：\"顾兄，等我回来，请你喝酒。\"</p>\n<p>我说，好。</p>\n<p>但我知道，我等不到了。</p>\n<p>他骑着马，走了。盔甲在阳光下闪着光，像一颗流星。</p>\n<p>我站在城墙上，看着他的背影，直到看不见。</p>\n<p>---</p>\n<p>那场仗打了三个时辰。</p>\n<p>我在城墙上，听着远处的喊杀声，听着战鼓声，听着马蹄声。然后，声音停了。</p>\n<p>我知道，结束了。</p>\n<p>我骑马出城，去了战场。尸体堆积如山，血流成河。我在死人堆里找他，找了很久。</p>\n<p>最后，我找到了。</p>\n<p>他躺在一堆尸体中间，身中十七箭，像个刺猬。他的剑断了，但手还紧紧握着剑柄。</p>\n<p>他的眼睛还睁着，看着天。</p>\n<p>我跪下，把他的眼睛合上。</p>\n<p>\"长风，\"我说，\"你赢了。\"</p>\n<p>他没有回答。</p>\n<p>我把他背起来，很重。比我想象的重。</p>\n<p>回到城里，我把他葬在城外的一座山上。那里能看见军营，能看见他战斗过的地方。</p>\n<p>我在他的坟前，插了一把剑。那把断剑，我重新铸好了。</p>\n<p>剑柄上，刻着他的名字，还有两个字：无悔。</p>\n<p>---</p>\n<p>那天晚上，我坐在他的坟前，喝了一夜的酒。</p>\n<p>酒是他留下的，说是等我封侯了请我喝的。现在他死了，我自己喝。</p>\n<p>喝一口，我说一句话。</p>\n<p>\"长风，你说得对。\"</p>\n<p>\"我活得太久了，忘了什么叫活着。\"</p>\n<p>\"你活了三十年，比我这三百年，更亮。\"</p>\n<p>\"你说，活着要有光芒。\"</p>\n<p>\"你的光芒，我看到了。\"</p>\n<p>\"很亮，很刺眼，让我想哭。\"</p>\n<p>但我没有哭。</p>\n<p>我只是喝完了那壶酒，然后把壶摔在地上。</p>\n<p>瓷壶碎了，像他的生命，像所有我留不住的人。</p>\n<p>---</p>\n<p>很多年以后，我路过那座山。</p>\n<p>他的坟还在，但已经荒草丛生。我打扫了一下，拔掉杂草，倒了一杯酒。</p>\n<p>\"长风，\"我说，\"我又来了。\"</p>\n<p>没有回答。</p>\n<p>\"你说得对，活着要有光芒。\"</p>\n<p>\"我这三百年，一直在找我的光芒。\"</p>\n<p>\"现在，我找到了。\"</p>\n<p>\"我的光芒，就是记住你们。\"</p>\n<p>\"记住你的剑，记住你的笑，记住你的无悔。\"</p>\n<p>\"然后，替你们，继续看这世间。\"</p>\n<p>风吹过，荒草沙沙作响，像是他在笑。</p>\n<p>我也笑了一下，把剩下的酒喝完。</p>\n<p>\"等我，\"我说，\"等我这三百年走完了，我去找你喝酒。\"</p>\n<p>\"到时候，不醉不归。\"</p>\n<p>我起身，拍拍身上的土，向山下走去。</p>\n<p>身后，夕阳照在他的坟上，那把剑闪着光，像一颗流星。</p>\n<p>像他活着的时候一样亮。</p>"}},{"type":"chapter","title":"第七章 沈墨白的局","data":{"id":7,"title":"第七章 沈墨白的局","html":"<p>我第一次见到沈墨白，是在棋盘上。</p>\n<p>那是一盘死棋。</p>\n<p>黑子被白子围困，东南西北都是死路，怎么看都是输局。但执黑的那人还在下，一子一子，往绝境里填。</p>\n<p>我坐在旁边看了一炷香的时间。他终于抬头，看了我一眼。</p>\n<p>\"先生也懂棋？\"</p>\n<p>\"不懂，\"我说，\"但我能看出，你这盘棋输了。\"</p>\n<p>他笑了一下，那笑容很淡，像水面上的涟漪，一晃就没了。\"输了吗？我觉得还能下。\"</p>\n<p>\"怎么下？\"</p>\n<p>他拿起一枚黑子，放在了一个我看不懂的位置。那地方既不是活眼，也不是要道，像是随手扔的。</p>\n<p>\"置之死地而后生，\"他说，\"先生不懂棋，应该懂这个道理。\"</p>\n<p>我看着他。</p>\n<p>他二十出头，穿着一身青布长衫，洗得发白，但干净。脸很瘦，眼窝很深，眼神却很亮，亮得有些刺眼。</p>\n<p>我知道他是谁。</p>\n<p>沈墨白，二十年后的天下大敌。会给这世道带来十年浩劫，会死在我亲手给他选的坟地里。</p>\n<p>但现在，他还只是一个在棋盘上找活路的年轻人。</p>\n<p>---</p>\n<p>那盘棋，最后他真的赢了。</p>\n<p>不是我懂的那种赢，是他自己定义的赢。他说，输和赢，不在棋盘里，在棋盘外。</p>\n<p>我问他什么意思。</p>\n<p>他说：\"棋盘上的输赢，是规矩定的。规矩是谁定的？是人。人定的规矩，就能改。\"</p>\n<p>\"怎么改？\"</p>\n<p>\"掀了棋盘，\"他说，\"规矩就没了。\"</p>\n<p>我没说话。</p>\n<p>他看着我，笑了一下。\"先生觉得我是疯子？\"</p>\n<p>\"不是，\"我说，\"我觉得你很危险。\"</p>\n<p>\"危险？\"他笑出声来，\"先生说话真有意思。一个下棋的，有什么危险？\"</p>\n<p>我没有回答。</p>\n<p>我在想，如果现在杀了他，未来那十年浩劫，是不是就不会发生。</p>\n<p>但这个念头刚冒出来，我就感觉胸口一阵剧痛，像是被人捅了一刀。我知道，这是天谴。</p>\n<p>我不能改。</p>\n<p>---</p>\n<p>后来我知道，沈墨白是个书生，但书读得不太好。考了三次科举，都没中。不是因为学问不行，是因为他的文章太狂，考官不喜欢。</p>\n<p>他说，那些考官都是庸才，看不懂他的文章。</p>\n<p>我说，也许是你写得太难懂。</p>\n<p>他说：\"先生，真理从来都是难懂的。好懂的，都是废话。\"</p>\n<p>我没法反驳。</p>\n<p>我们认识的那一年，他二十五岁。没家，没业，没朋友，每天就是在茶馆里下棋，或者去书摊上看书。</p>\n<p>我请他吃饭，他从不拒绝。但他从不回请，因为他没钱。</p>\n<p>我说，你可以找份差事。</p>\n<p>他说：\"什么差事？教书？我不会教孩子。当账房？我算不清账。做官？那些庸才不让我做。\"</p>\n<p>\"那你想做什么？\"</p>\n<p>他想了想，说：\"我想改规矩。\"</p>\n<p>\"什么规矩？\"</p>\n<p>\"所有的规矩，\"他说，\"这天下所有的规矩，都该改。\"</p>\n<p>我看着他的眼睛，那里面有一种火，烧得很旺，但很冷。</p>\n<p>我知道，那火会烧掉很多人。</p>\n<p>---</p>\n<p>第三年，他变了。</p>\n<p>他不再下棋，不再看书，开始结交各路人物。有江湖上的，有官场上的，有商场上的。他变得很忙，很少有时间和我吃饭。</p>\n<p>但每次见面，他都会告诉我一些他的计划。</p>\n<p>他说，他要建一个组织，叫\"墨门\"。不是那种江湖门派，是一种新的东西。他说，这个组织会改变天下。</p>\n<p>我说，怎么改变？</p>\n<p>他说：\"从规矩开始。\"</p>\n<p>他跟我解释了很多，什么新的制度，新的律法，新的秩序。我听得懂，但我听不懂。因为他的话里，有一种狂热，让我害怕。</p>\n<p>我说，你这会很危险。</p>\n<p>他说：\"先生，我知道。\"</p>\n<p>\"你知道？\"</p>\n<p>\"我知道，\"他说，\"我知道这条路很难走，知道可能会死，知道最后可能什么都改变不了。但我还是要走。\"</p>\n<p>\"为什么？\"</p>\n<p>他看着我，眼神很深。\"因为现在的规矩，不公平。\"</p>\n<p>他说：\"有人生来就是王侯，有人生来就是奴隶。有人读一辈子书考不上功名，有人不学无术却能做官。这不公平，先生。\"</p>\n<p>我说，这世界本来就是不公平的。</p>\n<p>他说：\"那就改。\"</p>\n<p>\"怎么改？\"</p>\n<p>他笑了一下，那笑容里有一种我看不懂的东西。\"掀了棋盘，重新下。\"</p>\n<p>---</p>\n<p>第五年，\"墨门\"成立了。</p>\n<p>一开始很小，只有十几个人。但他发展得很快，三年就有了上千人。五年就有了上万人。</p>\n<p>他开始做一些事。劫富济贫，惩奸除恶，替天行道。江湖上开始有人叫他\"墨侠\"。</p>\n<p>我说，你这是在做善事。</p>\n<p>他说：\"不是善事，是手段。\"</p>\n<p>\"什么手段？\"</p>\n<p>\"收人心的手段，\"他说，\"我要让天下人都知道，有一个墨门，在为他们做主。\"</p>\n<p>我说，然后呢？</p>\n<p>他说：\"然后，他们就会跟着我。\"</p>\n<p>\"跟着你干什么？\"</p>\n<p>他没说话，只是笑了一下。</p>\n<p>那笑容让我想起了五年前，他在棋盘上的样子。置之死地而后生。</p>\n<p>---</p>\n<p>第七年，他开始做一些让我不安的事。</p>\n<p>他杀了几个官员，不是因为那些官员贪污，是因为那些官员不听话。他烧了几个书院，不是因为那些书院教得不好，是因为那些书院在教\"旧规矩\"。</p>\n<p>我说，你变了。</p>\n<p>他说：\"我没变，先生。我只是在做我必须做的事。\"</p>\n<p>\"什么事？\"</p>\n<p>\"掀棋盘，\"他说，\"总得有人先动手。\"</p>\n<p>我说，那些官员，那些书生，他们无辜。</p>\n<p>他说：\"先生，这世上没有无辜的人。要么站在新规矩这边，要么站在旧规矩那边。没有中间。\"</p>\n<p>我说，那我是哪边？</p>\n<p>他看着我，看了很久。然后说：\"先生，你哪边都不是。你站在棋盘上，看着我们下。\"</p>\n<p>我没说话。</p>\n<p>他说：\"先生，我知道你不是普通人。你活了很久，看过很多事，知道很多道理。但你从来不参与，只是看着。\"</p>\n<p>\"因为有些事情，我不能参与。\"</p>\n<p>\"为什么？\"</p>\n<p>我想了想，说：\"因为我改变不了结局。\"</p>\n<p>他笑了一下，\"先生，你怎么知道改变不了？你试过吗？\"</p>\n<p>我看着他。</p>\n<p>他说：\"先生，你有没有想过，也许结局不是注定的，是人走出来的？\"</p>\n<p>我没有回答。</p>\n<p>因为我不知道。</p>\n<p>---</p>\n<p>第十年，\"墨门\"成了天下最大的势力。</p>\n<p>他不再叫\"墨侠\"，人们开始叫他\"墨主\"。他有了一座城，成千上万的弟子，无数的财富和权力。</p>\n<p>但他不快乐。</p>\n<p>我最后一次见他，是在他的书房里。他坐在一张很大的桌子后面，桌上堆满了文书。他瘦了很多，眼窝更深了，但眼神还是那样，亮得刺眼。</p>\n<p>\"先生，\"他说，\"我输了。\"</p>\n<p>\"输？\"</p>\n<p>\"我掀了棋盘，\"他说，\"但我下不出新的棋局。\"</p>\n<p>我不明白。</p>\n<p>他说：\"我以为，只要把旧的规矩砸了，新的规矩就会自然长出来。但我错了。旧的砸了，新的不来，只剩下乱。\"</p>\n<p>他说：\"这十年，我杀了很多人，做了很多错事。我以为我在改天换地，其实只是在制造混乱。\"</p>\n<p>我说，你知道错了？</p>\n<p>他说：\"我一直知道。\"</p>\n<p>\"那你为什么还要做？\"</p>\n<p>他看着我，眼神里有一种疲惫，像是一个走了很远路的人。\"因为停不下来了，先生。\"</p>\n<p>\"停不下来？\"</p>\n<p>\"嗯，\"他说，\"我身后有太多人，太多事，太多血。我停下来了，他们怎么办？那些跟着我出生入死的人，那些把命赌在我身上的人，我停下来了，怎么跟他们交代？\"</p>\n<p>我说，你可以找个接班人。</p>\n<p>他笑了一下，那笑容很苦。\"先生，接班人是接我的位置，不是接我的罪。这罪，只能我自己背。\"</p>\n<p>---</p>\n<p>那天晚上，他放了一把火。</p>\n<p>把自己和那座城，一起烧了。</p>\n<p>我赶到的时候，只剩下废墟。我在废墟里找了很久，找到了半块烧焦的玉佩。</p>\n<p>那是我送给他的，我们第一次见面时。</p>\n<p>我说，这玉佩能保平安。他说，他会随身带着。</p>\n<p>他随身带了十五年。到死都没扔。</p>\n<p>---</p>\n<p>我把玉佩握在手里，很烫，像是从火里刚拿出来。</p>\n<p>墨白，你这一生，到底图什么。</p>\n<p>你想改规矩，规矩没改成。你想掀棋盘，棋盘掀了，下不出新的。你想让天下公平，天下更乱了。</p>\n<p>你图什么。</p>\n<p>我坐在废墟里，坐了一夜。</p>\n<p>天亮的时候，我想明白了。</p>\n<p>他图的，不是结果。是过程。</p>\n<p>他知道结局会是这样，但他还是要做。因为不做，他一辈子都不会甘心。</p>\n<p>他宁可烧了自己，也不要在旧规矩里窝囊地活着。</p>\n<p>这是他的选择。</p>\n<p>而我，看着这一切发生，什么都做不了。</p>\n<p>这是我的命。</p>\n<p>---</p>\n<p>后来，我把他葬在一座山上。</p>\n<p>不是他烧掉的那座城附近，是很远的地方，一个没有人认识他的地方。</p>\n<p>他的坟前，我什么都没放。</p>\n<p>花？他不配。剑？他不屑。酒？他不喝。</p>\n<p>我只是拔了一根草，在手里揉碎。</p>\n<p>草汁染绿了手指，我甩了甩，没甩掉。</p>\n<p>墨白，你这辈子，太累了。</p>\n<p>下辈子，别掀棋盘了。找个地方，种花，喝茶，看日出，多好。</p>\n<p>我起身，拍拍身上的土，向山下走去。</p>\n<p>身后，风吹过废墟，发出呜呜的声音，像是有人在哭。</p>\n<p>我没有回头。</p>\n<p>---</p>\n<p>很多年以后，我路过一个地方，听到有人说书。</p>\n<p>说的是\"墨主\"的故事。说他是大魔头，杀人无数，罪该万死。说他最后被天火烧死，是报应。</p>\n<p>我坐在台下，听了一会儿，然后走了。</p>\n<p>他们没有说错。他确实杀了人，确实造成了混乱，确实罪有应得。</p>\n<p>但他们也没有说对。</p>\n<p>因为他们不知道，他在棋盘上的样子。不知道他说\"置之死地而后生\"时的眼神。不知道他随身带着那块玉佩，十五年。</p>\n<p>没有人知道。</p>\n<p>除了我。</p>\n<p>而我，会替他记住。</p>\n<p>记住他的才华，记住他的偏执，记住他的累，记住他的罪，记住他最后的那把火。</p>\n<p>然后，替这个天下，继续看下去。</p>\n<p>看他没改成的规矩，最终会不会有人改成。</p>"}},{"type":"chapter","title":"第八章 客栈","data":{"id":8,"title":"第八章 客栈","html":"<p>那家客栈，我又路过了。</p>\n<p>距离上次被当成骗子赶出来，已经过去了二十年。我想看看，那家店还在不在。</p>\n<p>还在。但变了很多。红灯笼没了，\"百年老店\"的牌子也摘了，门脸很朴素，就挂着一块木匾，写着\"周记客栈\"三个字。</p>\n<p>我走进去，掌柜的是个老太太，六十多岁，头发花白，但精神很好。她抬头看了我一眼，出神了一瞬。</p>\n<p>\"您……\"</p>\n<p>\"住店。\"我说。</p>\n<p>她看着我，看了很久。然后她说：\"您是不是，二十年前来过？\"</p>\n<p>我愣了一下。</p>\n<p>\"您说我娘做的粥，上面有层米油。\"她说，\"您还说了我太姥姥的事。\"</p>\n<p>我想起来了。她是第二代，周老太太的女儿，那个\"脸上总是带着笑\"的老板娘。</p>\n<p>\"是我。\"我说。</p>\n<p>她笑了，那笑容和她娘一样，带着一种温和的光。\"我就知道。您一点都没变，还是老样子。\"</p>\n<p>\"你倒是变了，\"我说，\"老了。\"</p>\n<p>\"可不是嘛，\"她说，\"六十多了，能不老吗？\"</p>\n<p>她给我倒了杯茶，让我坐下。茶是普通的绿茶，但泡得很好，清香扑鼻。</p>\n<p>\"我那儿子，不成器，\"她说，\"二十年前把您赶走了，我知道后骂了他一顿。但他不听，非要把店改成酒楼，说要赚钱。\"</p>\n<p>\"后来呢？\"</p>\n<p>\"后来？\"她笑了一下，有些无奈，\"后来赔光了。他不懂经营，只会折腾。最后把店抵给别人，自己跑了。\"</p>\n<p>\"那这店……\"</p>\n<p>\"我要回来了，\"她说，\"我攒了二十年的钱，把这店赎回来了。现在我掌勺，还是我娘的老规矩。\"</p>\n<p>她起身，去厨房，端出一碗粥。白米粥，熬得稠稠的，上面浮着一层米油。</p>\n<p>\"您尝尝，\"她说，\"是不是那个味道。\"</p>\n<p>我接过碗，喝了一口。很稠，很香，米油滑滑的，入口即化。</p>\n<p>\"是。\"我说。</p>\n<p>她笑了，笑得很开心。\"我就知道。我娘走的时候，把配方传给我，说一定要熬够时辰，不能偷懒。我一直记着。\"</p>\n<p>---</p>\n<p>那天晚上，我住在客栈里。</p>\n<p>房间很小，但干净，和被曾外孙赶出去时住的房间一样。窗户对着院子，能看见一棵老槐树，树影婆娑。</p>\n<p>我坐在窗边，喝着茶，看着月亮。她走过来，坐在我对面。</p>\n<p>\"您这次，打算住多久？\"</p>\n<p>\"明天就走。\"</p>\n<p>\"这么快？\"</p>\n<p>\"嗯，\"我说，\"我就是路过，看看。\"</p>\n<p>她点点头，没再追问。只是给我续了杯茶。</p>\n<p>\"您知道吗，\"她说，\"我娘临走前，还提起过您。\"</p>\n<p>\"提起我？\"</p>\n<p>\"嗯，\"她说，\"她说，有个客人，每次来都喝她的粥，一喝就是半个月。那个人很奇怪，从来不提自己的事，但眼神里有很多故事。\"</p>\n<p>我愣了一下。</p>\n<p>\"我娘说，\"她继续说，\"那个人是个好人，只是活得很累。她每次给他多舀一勺粥，希望他能暖和一点。\"</p>\n<p>我没有说话。</p>\n<p>\"我娘还说，\"她看着我，\"如果那个人再来，让我招待好他。说他在找一个答案，也许这辈子都找不到，但至少，让他喝碗热粥。\"</p>\n<p>我看着她，看着这个六十多岁的老太太，忽然想起了她娘。</p>\n<p>那个头发花白但精神很好的周老太太，每次给我多舀一勺粥，说：\"年轻人，多吃点，长身体。\"</p>\n<p>那时候，我三百多岁。在她眼里，却还是个年轻人。</p>\n<p>---</p>\n<p>第二天早上，我下楼吃早饭。</p>\n<p>她已经准备好了，白米粥，咸菜，馒头，还有一碟新炒的花生米。很简单，但很好吃。</p>\n<p>\"您慢用，\"她说，\"不够再添。\"</p>\n<p>我吃着粥，她坐在旁边，织毛衣。动作很慢，但很稳。</p>\n<p>\"您还在找人吗？\"她忽然问。</p>\n<p>\"找人？\"</p>\n<p>\"我娘说，您每次来，都像在找人。眼神四处看，好像在找什么人。\"</p>\n<p>我想了想，说：\"不是在找人。是在……找自己。\"</p>\n<p>\"找自己？\"</p>\n<p>\"嗯，\"我说，\"找自己在这个世上的位置。\"</p>\n<p>她点点头，没再问。只是继续织毛衣，针线在手指间穿梭，发出轻微的声响。</p>\n<p>\"我年轻时，也在找，\"她说，\"找一个好男人，找一个好归宿，找一个安稳的日子。后来找到了，男人却死了。我又找，找孩子，找寄托，找活着的意义。\"</p>\n<p>\"找到了吗？\"</p>\n<p>\"找到了，\"她说，\"就是这碗粥。\"</p>\n<p>我微微一怔。</p>\n<p>\"这碗粥，\"她说，\"是我娘传给我的，我现在传给我孙女。等她长大了，我再告诉她，这碗粥里，有我们三代人的日子。\"</p>\n<p>她笑了一下，\"这大概就是我的位置。熬一碗粥，给路过的人喝，让他们暖和一点，然后继续赶路。\"</p>\n<p>我看着她，看了很久。</p>\n<p>然后我说：\"你娘说得对，你是个好人。\"</p>\n<p>\"我娘还说了别的，\"她说，\"她说，您也是个好人，只是您的好，藏得很深，连您自己都找不到。\"</p>\n<p>---</p>\n<p>吃过早饭，我准备走了。</p>\n<p>她送我到门口，像当年她娘一样。</p>\n<p>\"下次路过，还来住啊。\"她说。</p>\n<p>我说，好。</p>\n<p>但我知道，这可能是最后一次了。她六十多岁了，还能熬几年粥？等她走了，这店又会变成什么样？</p>\n<p>我不敢想。</p>\n<p>我走出几步，回头看了她一眼。她站在门口，身影瘦小，但站得很稳。阳光照在她身上，像一层金纱。</p>\n<p>我忽然想起了很多年前，她娘站在同一个位置，说同样的话。</p>\n<p>\"下次路过，还来住啊。\"</p>\n<p>\"好。\"</p>\n<p>一代又一代，同样的话，同样的位置，同样的一碗粥。</p>\n<p>而我，还在路上，还在找，还在喝那一碗碗热粥。</p>\n<p>---</p>\n<p>走了很远，我忽然想起什么，摸了摸怀里。</p>\n<p>还有一个铜板。我转身，走回客栈。</p>\n<p>她还在门口，看着我，有些惊讶。</p>\n<p>\"怎么了？\"</p>\n<p>我掏出那个铜板，放在她手里。</p>\n<p>\"这是什么？\"</p>\n<p>\"三十年前，\"我说，\"你娘给我多舀的那一勺粥，我没付钱。现在补上。\"</p>\n<p>她愣了一下，然后笑了。笑得很开心，像个小姑娘。</p>\n<p>\"您还记得？\"</p>\n<p>\"记得，\"我说，\"那勺粥，很暖和。\"</p>\n<p>她握着那个铜板，看了很久。然后她说：\"我娘要是知道，一定很高兴。\"</p>\n<p>\"她会知道的，\"我说，\"她在天上看着呢。\"</p>\n<p>她点点头，眼眶有些红。</p>\n<p>\"您保重，\"她说，\"下次路过，一定还来。\"</p>\n<p>我说，一定。</p>\n<p>然后我走了，没有再回头。</p>\n<p>但我知道，她还在那里，站在门口，看着我的背影，直到看不见。</p>\n<p>就像很多年前，她娘看着我走一样。</p>\n<p>---</p>\n<p>山路上，我喝着酒葫芦里的酒。</p>\n<p>酒很凉，但心里是暖的。</p>\n<p>那碗粥，那勺米油，那个多舀一勺的老人，那个还记得我的女儿，那个站在门口的身影。</p>\n<p>这些都是我在这个世上的位置。</p>\n<p>不是我改变了什么，不是我留下了什么，只是我曾经路过，喝过一碗粥，让一个人记得我。</p>\n<p>这就够了。</p>\n<p>我大步向前走去，酒葫芦在腰间轻轻晃动。山风很大，但我不冷。</p>\n<p>因为有一碗热粥，在我心里，一直冒着热气。</p>"}},{"type":"chapter","title":"第九章 乱世孤雏","data":{"id":9,"title":"第九章 乱世孤雏","html":"<p>那年的冬天，特别冷。</p>\n<p>战火从北方烧过来，一路烧到江南。所过之处，村庄成了废墟，城镇成了焦土。我走在一条官道上，路边全是逃难的人，拖家带口，面黄肌瘦。</p>\n<p>我已经走了三个月，从北到南，看着这一切发生。</p>\n<p>我知道会这样。我知道这场仗要打三年，知道会死几十万人，知道这片土地上会出现很多孤儿。我都知道。</p>\n<p>但我什么都没做。</p>\n<p>因为我试过。很多年前，我试过救人，试过改变，试过阻止。但每次，都会遭到反噬。胸口剧痛，像被人捅了一刀，然后看着历史按照原来的轨迹，一步步走下去。</p>\n<p>我改变不了什么。我只能看着。</p>\n<p>这是长生的代价。这是穿越者的宿命。</p>\n<p>---</p>\n<p>那是个傍晚，天快黑了。</p>\n<p>我路过一个村子，村子已经被烧成了废墟，到处都是断壁残垣。我本想绕过去，但听见了一声哭喊。</p>\n<p>很小的一声，像猫叫，从一堆瓦砾下面传出来。</p>\n<p>我停下了脚步。</p>\n<p>按照我这些年的规矩，我应该走。不要管，不要听，不要看。管了会痛，听了会心软，看了会睡不着。</p>\n<p>但我没有走。</p>\n<p>我走到那堆瓦砾前，开始搬。砖块，木头，瓦片，一样样搬开。我的手被划破了，血渗出来，但我没停。</p>\n<p>搬了大概半个时辰，我终于看见了。</p>\n<p>是个孩子。</p>\n<p>七八岁的样子，瘦得皮包骨，肋骨一根根分明。他蜷缩在一个小空间里，上面有根横梁挡着，刚好形成了一个三角形的空隙，救了他一命。</p>\n<p>他的眼睛睁着，看着我，眼神很警惕，像头小兽。</p>\n<p>\"出来吧，\"我说，\"没事了。\"</p>\n<p>他没有动。</p>\n<p>\"你爹娘呢？\"</p>\n<p>他不说话。</p>\n<p>我看了看周围，废墟里躺着几具尸体，已经僵硬了。应该是他的家人。</p>\n<p>\"你叫什么名字？\"</p>\n<p>他还是不说话。</p>\n<p>我叹了口气，从怀里掏出一块干粮，递给他。他看了一眼，没接。</p>\n<p>\"吃吧，\"我说，\"我不害你。\"</p>\n<p>他看了我很久，然后慢慢伸出手，接过干粮，塞在嘴里，狼吞虎咽地吃起来。</p>\n<p>我看着他吃，心头微颤不是滋味。</p>\n<p>这样的孩子，这场战乱里还有很多。我救不了所有，我甚至连这一个都救不了多久。因为按照历史，他可能会饿死，可能会病死，可能会被人贩子抓走。</p>\n<p>我可以预知，但我改变不了。</p>\n<p>那我为什么要搬开那些瓦砾？</p>\n<p>---</p>\n<p>他吃完了干粮，看着我，还是不说话。</p>\n<p>\"你跟我走吗？\"我问。</p>\n<p>他怔了一下，然后摇头。</p>\n<p>\"为什么？\"</p>\n<p>\"我等我爹娘。\"他说。</p>\n<p>他的声音很沙哑，像是哭坏了嗓子。</p>\n<p>\"你爹娘……\"我看了看那几具尸体，\"他们不会回来了。\"</p>\n<p>\"会的。\"他说，\"他们说，让我在这里等，他们去找吃的，找到就回来。\"</p>\n<p>我看着他，不知道该说什么。</p>\n<p>他还太小，不懂什么是死亡。或者说，他懂，但他不愿意相信。</p>\n<p>\"他们已经死了，\"我说，\"你看那边。\"</p>\n<p>我指着那几具尸体。</p>\n<p>他顺着我的手指看过去，看了一眼，然后转过头，不再看。</p>\n<p>\"那不是他们。\"他说。</p>\n<p>\"那是。\"</p>\n<p>\"不是！\"他突然大喊起来，声音嘶哑，\"他们不是！我爹娘会回来的！他们说会回来的！\"</p>\n<p>他站起来，想要冲过去，但腿软了，摔在地上。他爬不起来，就趴在那里，拳头捶着地，眼泪流出来，但没有哭声。</p>\n<p>我看着他，心里像是被人揪了一下。</p>\n<p>我见过太多死亡，太多离别，太多孤儿。我以为我已经麻木了。但这个孩子，这个不肯承认爹娘已死的孩子，让我心里某个地方，疼了一下。</p>\n<p>---</p>\n<p>天完全黑了。</p>\n<p>我在废墟里生了一堆火，坐在火边，看着那个孩子。他蜷缩在角落里，抱着膝盖，眼睛睁着，看着那几具尸体的方向。</p>\n<p>他还在等。</p>\n<p>\"你叫什么名字？\"我问。</p>\n<p>\"……石头。\"</p>\n<p>\"石头？\"</p>\n<p>\"嗯。\"他说，\"我爹说，石头命硬，摔不坏。\"</p>\n<p>我笑了笑，\"你爹说得对。\"</p>\n<p>他看着我，\"你叫什么名字？\"</p>\n<p>\"顾沉舟。\"</p>\n<p>\"顾沉舟……\"他念了一遍，\"你是好人吗？\"</p>\n<p>我想了想，说：\"不是。\"</p>\n<p>\"那你为什么要救我？\"</p>\n<p>\"我没救你，\"我说，\"我只是搬开了几块砖。\"</p>\n<p>他看着我，看了很久。然后他说：\"你骗人。你搬了半个时辰，手都出血了。\"</p>\n<p>我看了看自己的手，确实，血已经干了，但伤口还在。</p>\n<p>\"我只是……\"我顿了顿，\"我只是不想听见你哭。\"</p>\n<p>他说：\"我没哭。\"</p>\n<p>\"我知道。\"我说，\"但你在心里哭，我听见了。\"</p>\n<p>他没有说话，只是低下头，把脸埋在膝盖里。</p>\n<p>---</p>\n<p>半夜，他睡着了。</p>\n<p>我把他抱起来，抱到火堆旁边，给他盖上我的外套。他睡得很不安稳，一直在发抖，嘴里念叨着什么。</p>\n<p>我凑近了听，听见他在叫：\"爹，娘，你们快回来，我害怕……\"</p>\n<p>我坐在旁边，看着火堆，看了一夜。</p>\n<p>天亮的时候，他醒了。睁开眼睛，看见我在旁边，微微一怔，然后迅速往后缩。</p>\n<p>\"别怕，\"我说，\"我不会害你。\"</p>\n<p>他看着我，\"你真的不是好人？\"</p>\n<p>\"真的。\"</p>\n<p>\"那你为什么给我盖衣服？\"</p>\n<p>我微微一怔，然后笑了。\"因为我也冷。\"</p>\n<p>他看着我，看了很久。然后他说：\"你笑的时候，像我爹。\"</p>\n<p>我没有说话。</p>\n<p>他低下头，\"我爹也喜欢这样笑，明明不是真的开心，还要笑。\"</p>\n<p>我看着他，心里某个地方，又疼了一下。</p>\n<p>---</p>\n<p>早上，我准备走了。</p>\n<p>我把剩下的干粮留给他，还有几个铜板。</p>\n<p>\"你在这里等，\"我说，\"也许会有好心人路过，带你走。\"</p>\n<p>\"你呢？\"他问。</p>\n<p>\"我走了。\"</p>\n<p>\"你去哪儿？\"</p>\n<p>\"不知道，\"我说，\"走到哪儿算哪儿。\"</p>\n<p>我转身要走，忽然感觉衣角被拉住了。</p>\n<p>我回头，看见他拉着我的衣角，手指很瘦，关节发白。</p>\n<p>\"带我走。\"他说。</p>\n<p>我恍惚片刻，\"什么？\"</p>\n<p>\"带我走，\"他说，\"我不想在这里等了。我知道，他们不会回来了。\"</p>\n<p>他的声音很平静，像是在说一件和自己无关的事。但他的手在发抖。</p>\n<p>\"你确定？\"我问。</p>\n<p>他点点头，\"我确定。\"</p>\n<p>\"跟着我，可能会很辛苦。我没有家，没有地，到处流浪。有时候连饭都吃不上。\"</p>\n<p>\"我不怕。\"</p>\n<p>\"我可能会把你送人，\"我说，\"送给好人家，有饭吃，有衣穿。\"</p>\n<p>他摇头，\"我不要。我要跟着你。\"</p>\n<p>\"为什么？\"</p>\n<p>他看着我，眼神很倔强，\"因为你搬了半个时辰的砖，手都出血了。\"</p>\n<p>我愣住了。</p>\n<p>他说：\"我爹说，愿意为别人流血的人，是好人。\"</p>\n<p>我张了张嘴，想说我不是好人。但看着他倔强的眼神，我什么也说不出来。</p>\n<p>---</p>\n<p>我带他走了。</p>\n<p>走出那个废墟，走出那个村子，走上官道。他走得很慢，因为太久没吃东西，腿软。我背着他，走了很久。</p>\n<p>他在我背上，一开始很僵硬，后来慢慢放松了，最后睡着了。</p>\n<p>我背着他，走在官道上，路边全是逃难的人。他们看着我们，眼神麻木，没有好奇，没有同情，只是看着。</p>\n<p>我已经习惯了这样的眼神。</p>\n<p>但我背上的这个孩子，他还不习惯。他还在做梦，梦里也许还有爹娘，还有家，还有没烧完的村子。</p>\n<p>我不知道我能给他什么。</p>\n<p>我什么都给不了。我甚至连自己都给不了。</p>\n<p>我只能背着他，走一步，算一步。</p>\n<p>---</p>\n<p>三天后，我们到了一座城镇。</p>\n<p>城镇里有一家米铺，老板姓王，是个厚道人。我打听过了，他没有孩子，想要收养一个。</p>\n<p>我牵着石头的手，走进米铺。</p>\n<p>王老板看见石头，眼睛一亮。他问了石头的来历，我说，是战乱中的孤儿，爹娘都死了。</p>\n<p>王老板叹了口气，说：\"可怜的孩子。\"</p>\n<p>他给了石头一块桂花糕。桂花糕很甜，香气扑鼻。石头拿着，没有吃，只是看着。</p>\n<p>\"吃吧，\"王老板说，\"以后这就是你家了。\"</p>\n<p>石头看着我。</p>\n<p>我说：\"吃吧。\"</p>\n<p>他咬了一口，嚼了嚼，然后抬头看着王老板，\"我可以带我师父一起住吗？\"</p>\n<p>王老板愣了一下，\"你师父？\"</p>\n<p>他指着我，\"他。\"</p>\n<p>王老板看着我，有些为难。\"这位先生，您……\"</p>\n<p>\"我不是他师父，\"我说，\"我只是路过。\"</p>\n<p>\"你是！\"石头突然大喊，\"你背了我三天，你给我吃的，你给我盖衣服，你是我师父！\"</p>\n<p>他的眼泪流出来了，但声音很倔强。</p>\n<p>我看着他的眼泪，心里某个地方，彻底软了。</p>\n<p>\"石头，\"我说，\"跟着王老板，你有饭吃，有衣穿，有地方住。跟着我，什么都没有。\"</p>\n<p>\"我不管，\"他说，\"我就要跟着你。\"</p>\n<p>\"为什么？\"</p>\n<p>\"因为你搬了半个时辰的砖！\"他哭着说，\"你手都出血了！你是好人！\"</p>\n<p>我看着他，看了很久。</p>\n<p>然后我说：\"好吧。\"</p>\n<p>他愣住了，眼泪还挂在脸上。</p>\n<p>\"你说什么？\"</p>\n<p>\"我说，好吧，\"我说，\"你跟着我吧。\"</p>\n<p>他看着我，像是没听明白。然后他把桂花糕扔了，跑过来，抱住我的腿。</p>\n<p>\"我不要桂花糕，我要跟你走。\"</p>\n<p>我摸了摸他的头，那头发很脏，很乱，但很软。</p>\n<p>\"傻孩子，\"我说，\"你会后悔的。\"</p>\n<p>他说：\"我不后悔。\"</p>\n<p>---</p>\n<p>我向王老板道了歉，带着石头走出了米铺。</p>\n<p>王老板追出来，把那块桂花糕塞给我，说：\"给孩子留着吧。\"</p>\n<p>我接过桂花糕，道了谢，走了。</p>\n<p>石头牵着我的手，走在我旁边。他走得很慢，但走得很稳。</p>\n<p>\"师父，\"他说，\"我们去哪儿？\"</p>\n<p>\"不知道，\"我说，\"走到哪儿算哪儿。\"</p>\n<p>\"那我们有家吗？\"</p>\n<p>我想了想，说：\"以后会有。\"</p>\n<p>\"真的？\"</p>\n<p>\"真的。\"</p>\n<p>他笑了，那笑容很脏，缺了颗门牙，但很开心。</p>\n<p>我也笑了。</p>\n<p>这是我三百年来，第一次决定不再冷漠。</p>\n<p>不是为了改变历史，不是为了拯救世界，只是为了这个孩子，这个说\"你搬了半个时辰砖\"的孩子。</p>\n<p>我不知道这个决定对不对。</p>\n<p>但我做了。</p>\n<p>我牵着他，走在官道上，走向未知的远方。</p>\n<p>身后，战火还在烧，废墟还在冒烟，死亡还在发生。</p>\n<p>但我不在乎了。</p>\n<p>我只在乎我身边的这个孩子。</p>\n<p>我要给他一个家，哪怕这个家，只是暂时的。</p>\n<p>哪怕我知道，他最终会离开我。</p>\n<p>但在那之前，我要让他知道，这世上还有温暖，还有好人，还有值得相信的东西。</p>\n<p>这是我能给他的，唯一的东西。</p>"}},{"type":"chapter","title":"第十章 医馆","data":{"id":10,"title":"第十章 医馆","html":"<p>那年春天，我在江南的一座小镇上住了下来。</p>\n<p>小镇叫清河镇，不大。一条青石板路从东头通到西头，路边是白墙黑瓦的老房子，门口种着柳树。春天的时候，柳絮飘得满城都是，落在头发上，落在肩膀上，落在水沟里，像下了一场不会化的雪。</p>\n<p>我租了一间小屋，在镇子的边缘，靠近一条小河。屋里有一张床，一张桌子，两把椅子，还有一个灶台。租金不贵，一个月三十文。</p>\n<p>石头很开心。他终于有了一个家。</p>\n<p>\"师父，\"他问我，\"我们要在这里住多久？\"</p>\n<p>我想了想，说：\"不知道，也许是几年。\"</p>\n<p>\"几年？\"他眼睛一亮，\"那我们是不是不用走了？\"</p>\n<p>\"暂时不用。\"</p>\n<p>他笑了，那笑容很灿烂。</p>\n<p>我看着他，心中有些复杂。</p>\n<p>我知道这个地方不会太平太久。再过五年，战火就会烧到这里。但我没有告诉他。五年的时间，对一个孩子来说，已经够长了。让他好好过这五年吧。</p>\n<p>---</p>\n<p>我在镇子里找了一份活计。</p>\n<p>是给一家医馆打杂。医馆不大，只有一个大夫，姓苏，是个五十多岁的老头。他女儿叫晚晴，二十出头，跟着他学医。</p>\n<p>我去医馆那天，是个雨天。</p>\n<p>我推开门，门铃叮当作响。屋里弥漫着药香，苦涩中带着一丝清香。苏大夫坐在柜台后面，正在研磨药材。</p>\n<p>\"听说您这里需要人手，\"我说，\"我想试试。\"</p>\n<p>他抬起头，打量了我一眼。\"你会什么？\"</p>\n<p>\"我会认字，会算账，会熬药，也会一些医术。\"</p>\n<p>\"哦？\"他放下手里的活，\"那你给我说说，风寒怎么治？\"</p>\n<p>\"麻黄汤，\"我说，\"麻黄三两，桂枝二两，杏仁七十个，甘草一两。水煎服。\"</p>\n<p>他点点头，\"咳嗽呢？\"</p>\n<p>\"要看是什么咳。风寒咳嗽用止嗽散，风热咳嗽用桑菊饮，痰湿咳嗽用二陈汤。\"</p>\n<p>他看着我，眼神有些惊讶。\"你确实看过医书。那你为什么来我这里打杂？以你的医术，自己开个小医馆不成问题。\"</p>\n<p>我笑了笑，\"我喜欢打杂。\"</p>\n<p>他愣了一下，然后笑了。\"有趣。好吧，你留下。月薪一两银子，管一顿午饭。\"</p>\n<p>---</p>\n<p>那天中午，我第一次见到了苏晚晴。</p>\n<p>她端着一盘饭菜从后院走出来，看见我，愣了一下。</p>\n<p>\"爹，这是？\"</p>\n<p>\"新来的伙计，叫顾沉舟。\"</p>\n<p>苏晚晴看了我一眼，点点头，把饭菜放在桌上，转身走了。</p>\n<p>她穿着一身素色衣裙，头发挽在脑后，插着根木簪。没施脂粉，眉眼清淡，像水墨画里走出来的人。</p>\n<p>\"我女儿，\"苏大夫突然说，\"从小跟着我学医，医术不错，就是性子太淡。对什么都不冷不热的，跟她娘一样。\"</p>\n<p>我没有说话，继续吃饭。</p>\n<p>饭菜很简单，一碟青菜，一碟豆腐，一碗米饭。但做得很好吃，清淡中带着一丝甜味。</p>\n<p>\"这菜是你女儿做的？\"我问。</p>\n<p>\"嗯，我老伴走得早，家里就我们父女俩，饭都是她做。\"</p>\n<p>---</p>\n<p>我在医馆干了三个月，渐渐熟悉了这里的一切。</p>\n<p>每天早上，我开门，打扫，整理药材。苏大夫坐诊，苏晚晴写方子，我负责抓药。</p>\n<p>下午病人少的时候，苏晚晴会在后院晒药。我也会去帮忙。</p>\n<p>我们很少说话。两个人沉默地干活，只有药材的沙沙声和偶尔的风声。</p>\n<p>有一天，我正在切药材，她忽然说：\"你切的太厚了。\"</p>\n<p>\"厚？\"</p>\n<p>\"切太厚了，药效出不来。要这样切。\"</p>\n<p>她拿起刀，示范给我看。刀在她手里很灵活，切出来的药材薄如纸片。</p>\n<p>我接过刀，按照她的方法切。</p>\n<p>她点点头，\"还可以，多练练就熟了。\"</p>\n<p>然后她转身走了。</p>\n<p>我看着她的背影，心里有些奇怪的感觉。</p>\n<p>三百年，我见过很多女人。美的，聪明的，热情的，冷酷的。但像她这样淡的，头一回见。</p>\n<p>她不讨好谁，也不故意疏远。她就是她，安安静静的，像墙角的草，不抢阳光，也能活得好好的。</p>\n<p>---</p>\n<p>石头经常去医馆找我。</p>\n<p>有一次，他摔破了膝盖，哭着跑到医馆来找我。</p>\n<p>\"怎么了？\"我赶紧放下手里的活。</p>\n<p>\"摔了，\"他哭着说，\"好疼。\"</p>\n<p>我把他抱起来，查看伤口。膝盖擦破了一大块，血肉模糊，但骨头没事。</p>\n<p>我带他到后院，打水清洗伤口。他疼得直抽气，眼泪直流。</p>\n<p>这时，苏晚晴走了过来。她看见石头的伤口，皱了皱眉。</p>\n<p>\"怎么弄成这样？\"</p>\n<p>\"摔的，\"我说，\"我在清洗，马上就好。\"</p>\n<p>她没说话，转身进屋，过了一会儿，拿着一个瓷瓶走出来。</p>\n<p>\"用这个，止血快。\"</p>\n<p>她蹲下来，看着石头，\"疼吗？\"</p>\n<p>石头点点头，眼泪还挂在脸上。</p>\n<p>\"哭吧，\"她说，\"哭出来就不疼了。\"</p>\n<p>石头出神了一瞬，然后真的哭了起来，哭得很大声。</p>\n<p>苏晚晴从怀里掏出一块手帕，给他擦眼泪。那手帕是白色的，上面绣着一朵梅花。</p>\n<p>\"好了，哭够了就不疼了。\"</p>\n<p>石头渐渐止住了哭声，抽抽搭搭地看着她。</p>\n<p>\"姐姐，你真好看。\"</p>\n<p>苏晚晴恍惚片刻，然后笑了。那是第一次，我看见她笑。</p>\n<p>那笑容很淡，像水面的波纹，晃一下就没了。但好看。</p>\n<p>\"嘴真甜，\"她说，\"下次小心点。\"</p>\n<p>她站起身，看了我一眼，转身走了。</p>\n<p>我看着她的背影，心里某个地方，轻轻动了一下。</p>\n<p>---</p>\n<p>那天晚上，我回到小屋里，坐在床边，看着窗外的月亮。</p>\n<p>月亮很圆，很亮，挂在树梢上。</p>\n<p>我想起苏晚晴白天的那个笑容。</p>\n<p>三百年，我见过很多笑。妩媚的，爽朗的，羞涩的，豪放的。但像她这样淡的，头一回见。</p>\n<p>她不问我从哪来，不问我多大年纪，不问我过去经历过什么。她就那么活着，笑着，看这世界。</p>\n<p>我突然很想了解她。</p>\n<p>但我知道，我不能。我是一个长生者，一个历史的旁观者。我不能和任何人走得太近，因为最终，他们都会老去，会死去，会离开。而我，还要一个人继续走下去。</p>\n<p>与其到时候痛苦，不如从一开始就不靠近。</p>\n<p>这是我一直以来的原则。但那个原则，在石头身上已经破了一次。现在，在苏晚晴身上，似乎又要破了。</p>\n<p>---</p>\n<p>日子一天天过去。</p>\n<p>我在医馆干了半年，和苏晚晴渐渐熟络起来。</p>\n<p>我们会一起晒药，一起切药材，一起整理医书。有时候，她会在午饭时多做一点，留给我和石头吃。</p>\n<p>有一次我问她：\"你为什么学医？\"</p>\n<p>她说：\"救人。\"</p>\n<p>\"就这么简单？\"</p>\n<p>\"就这么简单，看着病人从痛苦中解脱，很有意义。\"</p>\n<p>\"你不觉得累吗？每天面对那么多病人，听他们诉苦，看他们的痛苦。\"</p>\n<p>她想了想，说：\"累是累，但值得。每个人都是独一无二的。能帮他们减轻一点痛苦，我觉得很有价值。\"</p>\n<p>我看着她，心头微动。</p>\n<p>\"你呢？\"她忽然问，\"你为什么学医？\"</p>\n<p>我恍惚片刻，\"我……我无聊，找点事做。\"</p>\n<p>她看了我一眼，没有追问。</p>\n<p>\"你话很少，\"她说，\"跟你女儿一样。\"</p>\n<p>\"石头不是我女儿，\"我说，\"是我捡来的。战乱中的孤儿，爹娘都死了。\"</p>\n<p>她沉默了一会儿，然后说：\"你是个好人。\"</p>\n<p>我笑了，\"我不是好人。\"</p>\n<p>\"那为什么要救他？\"</p>\n<p>\"因为……\"我想了想，\"因为他让我想起了我自己。很久以前，我也曾经像他一样，失去一切，无家可归。\"</p>\n<p>她看着我，眼神有些复杂。</p>\n<p>\"后来呢？\"她问。</p>\n<p>\"后来？\"我笑了笑，\"后来我就变成了现在这个样子。\"</p>\n<p>她没有再问，转身继续晒她的药。但我知道，她听懂了我的意思。</p>\n<p>---</p>\n<p>那年冬天，苏大夫病倒了。</p>\n<p>是伤寒，来势汹汹。他年纪大了，身子弱，一下子就被击倒了。</p>\n<p>医馆关门了几天，苏晚晴日夜守在他床边，亲自熬药，亲自照料。</p>\n<p>我每天都会去看，带去一些米面蔬菜。</p>\n<p>有一天，我去的时候，她正坐在院子里，发呆。</p>\n<p>\"苏大夫怎么样了？\"我问。</p>\n<p>\"好些了，烧退了，但身子还很虚。\"</p>\n<p>\"那就好。\"</p>\n<p>她看着我，突然说：\"我很怕。\"</p>\n<p>\"怕什么？\"</p>\n<p>\"怕他走，\"她说，\"我就这么一个亲人。\"</p>\n<p>我不知道该说什么。</p>\n<p>三百年了，我见过太多离别。我知道那种痛，知道那种无助。</p>\n<p>\"他不会走的，\"我说，\"他会好起来的。\"</p>\n<p>\"你怎么知道？\"</p>\n<p>\"因为我懂医术，他的病虽然重，但不是绝症。只要好好调养，会好起来的。\"</p>\n<p>她看着我，眼神有些动摇。</p>\n<p>\"真的？\"</p>\n<p>\"真的。\"</p>\n<p>她低下头，沉默了很长时间。</p>\n<p>\"谢谢你，这段时间，多亏有你帮忙。\"</p>\n<p>\"不客气。\"</p>\n<p>\"还有……\"她顿了顿，\"对不起，之前对你那么冷淡。\"</p>\n<p>\"你没有冷淡，你只是话少。\"</p>\n<p>她笑了笑，那笑容很淡，带着一丝疲惫。</p>\n<p>\"我娘走得早，我从小跟着我爹长大，不太会跟人相处。\"</p>\n<p>\"你相处得很好，\"我说，\"石头很喜欢你。\"</p>\n<p>提到石头，她的笑容深了一些。</p>\n<p>\"那孩子很可爱，\"她说，\"你们两个，不像是父子，更像是朋友。\"</p>\n<p>\"我们是朋友，也是家人。\"</p>\n<p>她看着我，眼神有些柔和。</p>\n<p>\"你和他，都很特别，\"她说，\"说不上来为什么，但就是觉得特别。\"</p>\n<p>我没有说话，只是看着她。</p>\n<p>月光照在她身上，头发泛着银光。她坐在那里，一动不动，像幅画。安静，好看，又有点说不出的难过。</p>\n<p>我突然很想抱抱她。但我知道，我不能。</p>\n<p>---</p>\n<p>苏大夫的病好了。</p>\n<p>过了春节，他的身体渐渐恢复，又能坐诊了。医馆重新开门，病人陆续上门。</p>\n<p>一切好像都回到了从前。</p>\n<p>但我知道，有些东西已经改变了。</p>\n<p>我和苏晚晴之间，多了一种说不清道不明的联系。我们不会刻意找对方说话，但眼神交汇时，会有一种默契。</p>\n<p>有一天，石头问我：\"师父，你喜欢晚晴姐姐吗？\"</p>\n<p>我愣了一下，\"为什么这么问？\"</p>\n<p>\"因为你总是看着她，我看你盯着她看了好几次。\"</p>\n<p>\"我……\"</p>\n<p>\"你喜欢她，\"他肯定地说，\"我也喜欢她。她做的菜好吃，还给我糖吃。\"</p>\n<p>我笑了笑，摸摸他的头。</p>\n<p>\"傻孩子，喜欢不是那样的。\"</p>\n<p>\"那是怎样的？\"</p>\n<p>我想了想，说：\"喜欢就是……想和她在一起，想看她笑，想让她开心。\"</p>\n<p>\"那你就是想让她开心啊，\"石头说，\"你每天帮她干活，不就是想让她开心吗？\"</p>\n<p>我愣住了。</p>\n<p>是吗？我每天帮她晒药，帮她切药材，帮她整理医书，是因为想让她开心？</p>\n<p>我从来没有想过这个问题。</p>\n<p>\"也许吧，\"我说，\"但有些事情，不是想就能做到的。\"</p>\n<p>\"为什么不能？\"</p>\n<p>\"因为……\"我叹了口气，\"因为我不能给她未来。\"</p>\n<p>\"未来是什么？\"</p>\n<p>\"未来就是……以后的日子。以后，她会老，会生病，会离开。而我，还是现在这个样子。\"</p>\n<p>石头眨眨眼睛，不太明白我的意思。</p>\n<p>我没有再解释。他还太小，不懂什么是长生，不懂什么是离别。让他晚一点懂吧。</p>\n<p>---</p>\n<p>那年春天，我又在清河镇住了一年。</p>\n<p>这一年的春天，柳絮依然飘得满城都是。我和苏晚晴依然每天在医馆里忙碌，石头依然每天和朋友们玩耍。</p>\n<p>日子平淡，但却充实。</p>\n<p>有时候，我会在傍晚带石头去河边钓鱼。苏晚晴偶尔也来，坐在柳树下，看着水面发呆。</p>\n<p>我们很少说话，但那种安静，并不尴尬。</p>\n<p>有一种陪伴，不需要言语。只是静静地坐在一起，看着同一片风景，就足够了。</p>\n<p>有一天，苏晚晴忽然说：\"顾沉舟，你有没有想过，以后的日子怎么过？\"</p>\n<p>我想了想，说：\"没想过。\"</p>\n<p>\"为什么？\"</p>\n<p>\"因为我觉得，想太多没用。日子是一天一天过的，不是想出来的。\"</p>\n<p>她点点头，\"你说得对。\"</p>\n<p>\"你呢？\"我问，\"你想过吗？\"</p>\n<p>她沉默了一会儿，说：\"我想过。想过找一个安静的地方，开一个小小的医馆，治治病，种种花，平平淡淡地过一辈子。\"</p>\n<p>\"很好啊，这是很多人的梦想。\"</p>\n<p>\"但我也知道，梦想只是梦想。这世上，哪有真正的平淡？\"</p>\n<p>我看着她，心头微动。</p>\n<p>\"也许，平淡不是因为没有波澜，而是因为有波澜，还能保持内心的平静。\"</p>\n<p>她看着我，眼神有些惊讶。</p>\n<p>\"你说话，有时候很像一个老人家，明明看着这么年轻，却懂得这么多。\"</p>\n<p>我笑了笑，没有说话。因为我是老人家啊。一个三百岁的老人家。</p>\n<p>---</p>\n<p>那年夏天，清河镇来了一场瘟疫。</p>\n<p>是痢疾，从上游传下来的。镇子里陆续有人生病，上吐下泻，严重的几天就死了。</p>\n<p>苏大夫和苏晚晴日夜忙碌，救治病人。我也帮忙，熬药，送药，照顾病人。</p>\n<p>那几天，整个镇子都笼罩在恐慌中。但医馆的灯，永远亮着。</p>\n<p>有一天晚上，我和苏晚晴坐在医馆的后院，休息片刻。</p>\n<p>她很累，脸色苍白，眼睛里布满血丝。</p>\n<p>\"喝点水吧，\"我把水递给她。</p>\n<p>她接过水，喝了一口，然后靠在椅背上，闭上眼睛。</p>\n<p>\"累吗？\"我问。</p>\n<p>\"累，但值得。\"</p>\n<p>\"今天救了几个人？\"</p>\n<p>\"八个，但还有很多人，我们救不了。\"</p>\n<p>她的声音很疲惫，带着一丝无力。</p>\n<p>\"我们只能尽力，救一个，是一个。\"</p>\n<p>她睁开眼睛，看着我。</p>\n<p>\"顾沉舟，你有没有觉得，人很渺小？面对疾病，面对死亡，我们什么都做不了。\"</p>\n<p>我看着她，心中一紧疼。</p>\n<p>\"我们能做很多。我们可以减轻他们的痛苦，可以给他们希望，可以让他们知道，在这个世界上，还有人关心他们。\"</p>\n<p>\"但这些，能改变什么？\"</p>\n<p>\"能改变他们最后的日子，让他们走得更安心，更温暖。\"</p>\n<p>她看着我，眼神有些复杂。</p>\n<p>\"你说话，总是很让人安心，像有一种魔力。\"</p>\n<p>\"我没有魔力，我只是……经历得多一些。\"</p>\n<p>\"经历得多？\"她看着我，\"你看起来不过二十多岁，能经历多少？\"</p>\n<p>我没有回答。</p>\n<p>月光洒在我们身上，周围很安静，只有远处传来的虫鸣。</p>\n<p>\"晚晴，\"我突然叫了她的名字。</p>\n<p>她出神了一瞬，\"你叫我什么？\"</p>\n<p>\"晚晴，我可以这样叫你吗？\"</p>\n<p>她沉默了一会儿，然后轻轻点头。</p>\n<p>\"可以。\"</p>\n<p>我看着她，心里有很多话想说，但都说不出口。</p>\n<p>我想说，我很喜欢你。我想说，我想和你在一起。我想说，我愿意用我所有的岁月，换你这一世的平安。</p>\n<p>但我不能说。因为我知道，这些话，对她来说，太沉重了。</p>\n<p>\"晚晴，\"我说，\"如果有一天，我离开了，你会难过吗？\"</p>\n<p>她看着我，眼神有些疑惑。</p>\n<p>\"你要离开？\"</p>\n<p>\"也许，我有自己的事情要做，不可能永远留在这里。\"</p>\n<p>她沉默了很久。</p>\n<p>\"会，\"她终于说，\"我会难过。\"</p>\n<p>我的心里，像是被什么撞了一下。</p>\n<p>\"那……那我会尽量晚一点离开。\"</p>\n<p>她看着我，笑了。</p>\n<p>那笑容很淡，像风吹过水面，像月光落在窗台上。</p>\n<p>\"好，那说定了。\"</p>\n<p>\"说定了。\"</p>\n<p>---</p>\n<p>瘟疫过去了。</p>\n<p>镇子里死了一些人，但大部分人都活了下来。医馆的忙碌终于结束，苏大夫和苏晚晴都松了一口气。</p>\n<p>那天晚上，苏大夫做了一桌菜，请我和石头吃饭。</p>\n<p>\"这次多亏了你，\"苏大夫对我说，\"要不是你帮忙，我们父女俩忙不过来。\"</p>\n<p>\"不客气，这是我应该做的。\"</p>\n<p>石头坐在旁边，大口吃着菜。</p>\n<p>\"慢点吃，\"苏晚晴给他夹菜，\"没人跟你抢。\"</p>\n<p>\"好吃，姐姐做的菜最好吃了。\"</p>\n<p>苏晚晴笑了，摸摸他的头。</p>\n<p>我看着这一幕，心里涌起一股温暖。</p>\n<p>这就是平淡的幸福吧。没有轰轰烈烈，没有生离死别。就是几个人坐在一起，吃顿饭，说说话，笑一笑。</p>\n<p>简单，但难得。</p>\n<p>---</p>\n<p>那顿饭之后，我在清河镇又住了两年。</p>\n<p>三年时间，说长不长，说短不短。</p>\n<p>三年里，我学会了和苏晚晴相处，学会了享受平淡的日子，学会了不再那么焦虑地想着未来。</p>\n<p>日子一天天过去，像流水一样平静。</p>\n<p>但我知道，这样的日子不会永远持续。历史的车轮在转动，战乱的阴云在逼近。总有一天，我会离开这里，离开她。</p>\n<p>但我不去想那一天。我只想过好当下的每一天。</p>\n<p>---</p>\n<p>第三年冬天，第一场雪落下来的时候，我做了一个决定。</p>\n<p>我决定，等到春天，就带石头离开。</p>\n<p>不是因为我厌倦了这里，而是因为，我知道，如果我继续留下来，我会越陷越深。我会离不开她，会舍不得她，会在她老去死去的时候，痛苦得无法承受。</p>\n<p>与其等到那时候，不如趁现在，还来得及，离开。</p>\n<p>我把这个决定告诉了石头。</p>\n<p>他很舍不得。\"我们要走了吗？那晚晴姐姐呢？\"</p>\n<p>\"晚晴姐姐会留在这里，她有她的生活。\"</p>\n<p>\"那我们以后还能见到她吗？\"</p>\n<p>我看着窗外的雪，沉默了很久。</p>\n<p>\"也许能，也许不能。\"</p>\n<p>石头低下头，眼泪流了出来。</p>\n<p>\"我不想走，我喜欢这里，我喜欢晚晴姐姐，我喜欢这个镇子。\"</p>\n<p>我摸摸他的头，心里也很难过。</p>\n<p>\"我知道，但有些事情，不是我们想怎样就能怎样的。\"</p>\n<p>\"为什么不能？\"</p>\n<p>\"因为……\"我叹了口气，\"因为我们有自己的路要走。\"</p>\n<p>他抬起头，看着我，眼神里满是不解和委屈。</p>\n<p>\"师父，你是不是不喜欢晚晴姐姐了？\"</p>\n<p>我愣住了。</p>\n<p>\"我没有不喜欢她，我只是……\"</p>\n<p>只是我太喜欢她了，喜欢到害怕失去她。只是我知道，我不能给她一个未来，不能陪她到老，不能和她一起白头。只是我不想，在她死去的时候，一个人孤独地活在这个世界上。</p>\n<p>但这些话，我不能对石头说。</p>\n<p>\"只是，有些事情，不是喜欢就能解决的。\"</p>\n<p>石头看着我，眼神里满是困惑。但他没有再问。他低下头，眼泪一颗一颗地落在地上。</p>\n<p>\"我知道了，我们走吧。\"</p>\n<p>我看着他的眼泪，心里像是被人揪了一下。</p>\n<p>我知道，这一走，就再也回不来了。但我必须走。因为，这就是长生的代价。</p>\n<p>---</p>\n<p>离开的那天，是个晴天。</p>\n<p>我和石头收拾好了行李，站在医馆门口，和苏大夫、苏晚晴告别。</p>\n<p>\"真的要走了？\"苏大夫问。</p>\n<p>\"嗯，叨扰三年了，该走了。\"</p>\n<p>\"晚晴，去送送他们。\"</p>\n<p>苏晚晴点点头，送我们出了镇子。</p>\n<p>一路上，我们都没有说话。</p>\n<p>走到镇口的柳树下，她停了下来。</p>\n<p>\"就送到这里吧。\"</p>\n<p>我转过身，看着她。</p>\n<p>三年的时光，像流水一样从她身上流过。她还是那么淡然，那么安静，只是眉眼间，多了一丝我看不懂的东西。</p>\n<p>\"晚晴，这三年，谢谢你。\"</p>\n<p>\"谢我什么？\"</p>\n<p>\"谢谢你让我知道，平淡的日子，也可以很幸福。\"</p>\n<p>她看着我，眼神有些湿润。</p>\n<p>\"顾沉舟，你真的要走吗？\"</p>\n<p>\"真的。\"</p>\n<p>\"还会回来吗？\"</p>\n<p>我看着她，心里有很多话想说，但都说不出口。</p>\n<p>我想说，我很想回来，但我不能。我想说，我会永远记得你。我想说，你是我这三百年来，最美好的遇见。</p>\n<p>但我只是说：\"也许吧。\"</p>\n<p>她低下头，沉默了很久。</p>\n<p>\"那你保重，石头也是。\"</p>\n<p>\"你也保重。\"</p>\n<p>我们相视而立，柳枝在风中轻轻摇曳。</p>\n<p>然后，我转身，带着石头，走上了官道。</p>\n<p>我不敢回头。因为我知道，如果我回头，看见她的眼泪，我就再也走不了了。</p>\n<p>---</p>\n<p>走出很远，石头忽然说：\"师父，晚晴姐姐在哭。\"</p>\n<p>我停下脚步，转过身。</p>\n<p>远远望去，那个淡然的身影，站在柳树下，肩膀微微颤抖。</p>\n<p>她在哭。</p>\n<p>那个永远淡然，永远安静，永远不争不抢的女子，在为我哭泣。</p>\n<p>我的心里，像是被人用刀割了一下。</p>\n<p>但我不能回去。我只能站在那里，远远地看着她，直到她的身影越来越小，最终消失在视线中。</p>\n<p>\"走吧，\"我对石头说。</p>\n<p>\"师父……\"石头拉着我的手，眼泪直流。</p>\n<p>\"走吧，我们还有很多路要走。\"</p>\n<p>我牵着他，继续向前走。</p>\n<p>身后，是清河镇，是医馆，是那三年平淡的日子。</p>\n<p>身前，是未知的远方，是漫长的岁月，是一个人走的路。</p>\n<p>但我知道，那三年会留在我心里。</p>\n<p>那个淡淡的女子，会是我记忆里最温暖的人。</p>\n<p>她让我明白，长生不是为了看尽历史，不是为了懂得更多。长生是为了在某个时候，遇见某个人，过上一段日子。</p>\n<p>哪怕那段日子很短，哪怕最后还是得分开。</p>\n<p>但那一瞬间的暖，够我记一辈子了。</p>\n<p>这就是她教我的。关于平淡，关于幸福，关于活着的意义。</p>\n<p>我会记得。</p>\n<p>一直记得。</p>"}},{"type":"chapter","title":"第十一章 小石头的少年","data":{"id":11,"title":"第十一章 小石头的少年","html":"<p>小石头十二岁那年，开始叫我师父。</p>\n<p>之前他一直叫我的名字，或者干脆不叫，直接说话。但在医馆住到第三年的时候，有一天早上，他突然说：\"师父，我饿了。\"</p>\n<p>我正在煎药，手一抖，药洒了一半。</p>\n<p>\"你叫我什么？\"</p>\n<p>\"师父啊，\"他说，\"你不是我师父吗？你教我认字，教我医术，教我做人。不叫师父叫什么？\"</p>\n<p>我看着他，心里有些复杂。</p>\n<p>三百年，从来没人叫过我师父。我教过一些人东西，但都是萍水相逢，教完就走，从不深交。</p>\n<p>但小石头不一样。</p>\n<p>他不是徒弟，他是我的……我不知道该怎么叫他。养子？朋友？还是我在这个世上唯一的牵挂？</p>\n<p>\"随你吧，\"我说，\"想叫什么就叫什么。\"</p>\n<p>他笑了，\"那我还是叫师父吧。听起来比较厉害。\"</p>\n<p>我也笑了。</p>\n<p>这个称呼，一叫就是十八年。</p>\n<p>---</p>\n<p>小石头聪明，学东西快。</p>\n<p>教他认字，不到一年，就能读简单的医书。教他医术，记性也好，方子看一遍就能背。</p>\n<p>但他有个毛病。</p>\n<p>比如，他太急了。学医是个慢功夫，但他总想快点学会，快点帮人看病，快点证明自己。</p>\n<p>有一次，一个病人来找我看诊。那是个老汉，咳嗽了很久，痰中带血。我看了，是肺痨，晚期了，治不好了。</p>\n<p>我把实情告诉了老汉，让他回去好好养着，想吃啥吃啥，别留遗憾。</p>\n<p>老汉走了之后，小石头问我：\"师父，你为什么告诉他治不好了？\"</p>\n<p>\"因为确实治不好了。\"</p>\n<p>\"但你这样告诉他，他不是很绝望吗？\"</p>\n<p>\"绝望？\"我看着他，\"那你想让我怎么做？骗他说能治好吗？\"</p>\n<p>\"至少……\"他低下头，\"至少可以让他有点希望。\"</p>\n<p>我坐着，看着窗外的柳树，半天没说话。</p>\n<p>\"小石头，你觉得，希望是什么？\"</p>\n<p>他想了想，说：\"希望就是……让人觉得还有盼头的东西。\"</p>\n<p>\"那如果这盼头是假的呢？\"</p>\n<p>\"假的也是希望啊，\"他说，\"总比没有强。\"</p>\n<p>我转过头，看着他。</p>\n<p>他还太小，不懂什么是真假。他只知道，让人开心就好，让人有希望就好。但他不知道，假希望有时候比绝望更残忍。</p>\n<p>\"小石头，\"我说，\"我给你讲个故事。\"</p>\n<p>\"什么故事？\"</p>\n<p>\"很久以前，有个大夫，遇到一个病人。那病人得了绝症，大夫知道治不好，但他不忍心告诉病人，就骗他说能治。病人听了很高兴，花光了所有的钱买药，每天都盼着好起来。结果呢？三个月后，病人死了，死的时候还在感谢那个大夫，说他是好人。\"</p>\n<p>小石头皱起眉头，\"这……这不对吗？至少病人死的时候是开心的。\"</p>\n<p>\"是开心的，\"我说，\"但他花光了所有的钱，留给家里的妻儿什么都没了。他死得开心，但他的家人怎么办？\"</p>\n<p>小石头沉默了。</p>\n<p>\"还有，\"我继续说，\"如果他知道真相，也许他会选择做一些别的事情。比如去看看远方的亲人，比如做一些一直想做的事，比如好好跟家人告个别。但他被骗了，他把最后三个月都用来吃药、盼好，结果什么都没做，就这么走了。\"</p>\n<p>我看着小石头，\"你觉得，这是对他好，还是害了他？\"</p>\n<p>他低下头，不说话了。</p>\n<p>\"小石头，\"我说，\"学医是为了救人，但有时候，救不了人。这时候，我们能做的，就是告诉他们真相，让他们有机会好好安排剩下的事情。这比假希望更残忍，但更诚实。\"</p>\n<p>他抬起头，看着我，眼神有些迷茫。</p>\n<p>\"可是，\"他说，\"看着别人绝望，很难受。\"</p>\n<p>\"我知道，\"我说，\"但这就是大夫的命。我们每天都要面对生老病死，每天都要看着别人痛苦。如果我们连这点都承受不了，还怎么当大夫？\"</p>\n<p>他低下头，沉默了很久。</p>\n<p>然后他说：\"师父，你承受得了吗？\"</p>\n<p>我出神了一瞬。</p>\n<p>\"你看着那么多人死去，看着那么多人绝望，你心里难受吗？\"</p>\n<p>我看着他的眼睛，那双眼睛很清澈，像一面镜子，照出了我心底的东西。</p>\n<p>难受吗？</p>\n<p>当然难受。</p>\n<p>三百年了，我见过太多死亡，太多离别，太多绝望。我曾经也是一个会为了陌生人的死而难过的人，但现在，我学会了麻木。</p>\n<p>不是不难受，是不敢难受。因为如果我每次都难受，我早就疯了。</p>\n<p>\"难受，\"我说，\"但我学会了接受。\"</p>\n<p>\"接受？\"</p>\n<p>\"接受生命的无常，接受死亡的必然，接受有些事情我们改变不了。\"</p>\n<p>他看着我，眼神有些复杂。</p>\n<p>\"师父，\"他说，\"你活得真累。\"</p>\n<p>我笑了，\"是啊，很累。但这就是活着。\"</p>\n<p>---</p>\n<p>小石头十五岁那年，第一次跟我吵架。</p>\n<p>是因为一个病人。</p>\n<p>那是个年轻的女子，得了怪病，全身浮肿，肚子疼得厉害。我诊断了之后，说是肝腹水，治不好，只能缓解。</p>\n<p>那女子的丈夫跪在我面前，求我救她，说花多少钱都行。</p>\n<p>我告诉他们真相，让他们回去准备后事。</p>\n<p>但小石头不同意。他偷偷给那女子开了一个方子，是他从医书里看来的，说是能治水肿。</p>\n<p>我发现了之后，很生气。</p>\n<p>\"你知不知道你在做什么？\"我问他。</p>\n<p>\"我在救人，\"他说，\"你救不了，不代表我救不了。\"</p>\n<p>\"那方子是治普通水肿的，她这是肝腹水，不一样的！\"</p>\n<p>\"不试试怎么知道？\"他倔强地看着我，\"师父，你总是这样，还没试就说治不好。你试过吗？你真的尽力了吗？\"</p>\n<p>我看着他，心里涌起一股怒火。</p>\n<p>\"我尽力了！\"我说，\"三百年来，我每天都在尽力！我见过太多人死在我手里，我知道什么能治，什么不能治！你以为我不想救她吗？我想，但我救不了！\"</p>\n<p>话说出口，我才意识到我说了不该说的话。</p>\n<p>小石头愣住了，\"三百年？\"</p>\n<p>我心里一沉。</p>\n<p>\"师父，你说什么三百年？\"</p>\n<p>\"我……\"我想解释，但不知道该怎么解释。</p>\n<p>他看着我，眼神从疑惑变成了震惊，然后变成了恐惧。</p>\n<p>\"师父，你……你到底多大年纪？\"</p>\n<p>我沉默了。</p>\n<p>\"你不是二十多岁吗？\"他的声音有些发抖，\"你刚才说三百年是什么意思？\"</p>\n<p>我看着他的眼睛，那双我曾经在废墟里见过的眼睛，那双在夜晚曾经紧紧盯着我的眼睛。</p>\n<p>我该告诉他真相吗？</p>\n<p>告诉他我是一个穿越者，一个长生者，一个活了三百年的人？</p>\n<p>告诉他我看着他长大，看着他从个孩子变成少年，而我还是这个样子，永远不会变？</p>\n<p>告诉他终有一天，他会老去，会死去，而我还会站在这里，看着他的坟，就像我现在看着其他人的坟一样？</p>\n<p>我不敢。</p>\n<p>\"我说错了，\"我说，\"我是说，我当大夫很多年了，见过很多病例。\"</p>\n<p>他看着我，眼神里满是不信。</p>\n<p>但他没有再问。</p>\n<p>那天之后，我们之间有了隔阂。</p>\n<p>他不再像以前那样亲近我，不再主动找我聊天，不再叫我师父，而是叫\"您\"或者\"顾先生\"。</p>\n<p>我知道他在害怕。他不知道我是什么，不知道我为什么不会老，不知道我还能活多久。</p>\n<p>他在害怕，我会比他活得更久，久到看着他死去。</p>\n<p>---</p>\n<p>那件事之后，我开始教他更多东西。</p>\n<p>不只是医术，还有武功，还有为人处世，还有……怎么面对死亡。</p>\n<p>我带他去坟地，让他看那些墓碑。</p>\n<p>\"你看，\"我说，\"这里埋着的人，有老人，有年轻人，有孩子。有的活了八十岁，有的只活了八岁。生命就是这样，有长有短，有喜有悲。\"</p>\n<p>他站在那些墓碑前，沉默不语。</p>\n<p>\"小石头，\"我说，\"你怕死吗？\"</p>\n<p>他想了想，说：\"怕。\"</p>\n<p>\"为什么？\"</p>\n<p>\"因为死了就什么都没有了，\"他说，\"不能再吃好吃的，不能再看好风景，不能再和喜欢的人在一起。\"</p>\n<p>我点点头，\"那你觉得，活着是为了什么？\"</p>\n<p>他想了很久，然后说：\"为了开心？\"</p>\n<p>\"开心？\"</p>\n<p>\"嗯，\"他说，\"我觉得活着就是为了开心。做自己喜欢的事，和自己喜欢的人在一起，每天都开开心心的。\"</p>\n<p>我笑了笑，\"那如果开不了心呢？\"</p>\n<p>\"那就想办法开心啊，\"他说，\"或者，先忍着，等开心的时候再来。\"</p>\n<p>我看着他的侧脸，那张年轻的面容上写满了倔强和天真。</p>\n<p>他和我不同。</p>\n<p>我想得太多，担心得太多，怕得太多。而他，只是想活得开心一点。</p>\n<p>也许，他才是对的。</p>\n<p>\"小石头，\"我说，\"你说得对。活着就是为了开心。师父以前想得太复杂了。\"</p>\n<p>他转过头，看着我，眼神有些惊讶。</p>\n<p>\"师父，你不生气了？\"</p>\n<p>\"我什么时候生过你的气？\"</p>\n<p>\"那天……那天我说你救不了人，你很生气。\"</p>\n<p>我叹了口气，\"那天是师父不对。师父不该对你发火。你说得对，我确实有时候太轻易放弃了。\"</p>\n<p>他看着我，眼神渐渐柔和了。</p>\n<p>\"师父，\"他说，\"我不怕你。\"</p>\n<p>\"什么？\"</p>\n<p>\"我知道你有些秘密，\"他说，\"你可能活了很久，你可能不会老，你可能看着很多人死去。但我不怕你。因为你是好人，你对我好，这就够了。\"</p>\n<p>我看着他的眼睛，那双眼睛里没有害怕，只有信任。</p>\n<p>我眼眶有点湿。</p>\n<p>三百年，没人对我说过这种话。</p>\n<p>\"小石头，\"我说，\"谢谢你。\"</p>\n<p>\"谢我什么？\"</p>\n<p>\"谢谢你信任我。\"</p>\n<p>他笑了，\"不客气，师父。\"</p>\n<p>那个称呼，又回来了。</p>\n<p>---</p>\n<p>小石头十八岁那年，成了一个出色的大夫。</p>\n<p>他的医术已经超过了很多老大夫，不仅因为我教得好，更因为他有一颗真正想救人的心。</p>\n<p>他不像我那样冷静，那样疏离。他会为病人的痛苦而痛苦，会为病人的康复而开心。他的情绪都写在脸上，让人一眼就能看透。</p>\n<p>有时候我觉得，他比我更适合当大夫。</p>\n<p>因为我只是一个旁观者，而他，是一个真正活在其中的人。</p>\n<p>有一天，一个老病人来找他。那是个老婆婆，腿脚不好，走不动路。小石头不仅给她看了病，还背着她走了二里路，送她回家。</p>\n<p>他回来之后，满头大汗，但脸上带着笑。</p>\n<p>\"师父，\"他说，\"老婆婆请我吃了碗面，可好吃了。\"</p>\n<p>我看着他，心里涌起一股暖流。</p>\n<p>\"小石头，\"我说，\"你知道师父最骄傲的是什么吗？\"</p>\n<p>\"什么？\"</p>\n<p>\"是你。\"</p>\n<p>他愣了一下，然后脸红了。</p>\n<p>\"师父，你说什么呢……\"</p>\n<p>\"我说真的，\"我说，\"师父活了这么多年，做过很多事，但最骄傲的，就是养大了你。\"</p>\n<p>他低下头，不好意思地笑了笑。</p>\n<p>\"师父，你别这么说，我都不好意思了。\"</p>\n<p>\"有什么不好意思的？\"我说，\"你是我徒弟，我夸你是应该的。\"</p>\n<p>他抬起头，看着我，眼神里有些复杂。</p>\n<p>\"师父，\"他说，\"我有个问题想问你。\"</p>\n<p>\"问吧。\"</p>\n<p>\"你……你会一直陪着我吗？\"</p>\n<p>我愣住了。</p>\n<p>\"我知道你不会老，\"他说，\"我知道你活得比普通人久。但你会一直陪着我吗？还是有一天，你也会离开？\"</p>\n<p>我看着他的眼睛，那双眼睛里有一丝不安，一丝恐惧。</p>\n<p>他知道我会活得比他久。他在害怕，害怕有一天，他会离开我，或者我会离开他。</p>\n<p>\"小石头，\"我说，\"师父会一直陪着你，直到你不需要我的那一天。\"</p>\n<p>\"我不会不需要你的，\"他说，\"我永远需要你。\"</p>\n<p>我笑了笑，摸摸他的头。</p>\n<p>\"傻孩子，\"我说，\"你总有一天会长大的，总有一天会有自己的生活，自己的家庭，自己的世界。到那时候，师父就不是那么重要了。\"</p>\n<p>\"不会的，\"他固执地说，\"你永远是我最重要的人。\"</p>\n<p>我没有说话，只是看着他。</p>\n<p>他还年轻，不懂什么是时间的残酷。他以为\"永远\"就是一辈子，但对他来说，一辈子只有几十年。而对我来说，一辈子是……不知道多久。</p>\n<p>但我知道，他说的\"永远\"，是真心话。</p>\n<p>这就够了。</p>\n<p>\"好，\"我说，\"那师父就陪着你，直到你不需要我的那一天。\"</p>\n<p>他笑了，那笑容很灿烂，像春天的阳光。</p>\n<p>我知道，这个笑容，会是我这辈子最珍贵的记忆。</p>\n<p>---</p>\n<p>小石头二十岁那年，我送了他一把剑。</p>\n<p>那是一把很普通的剑，不是什么神兵利器，但剑身上刻了两个字：\"无愧\"。</p>\n<p>\"师父，这是……\"</p>\n<p>\"师父给你的礼物，\"我说，\"你长大了，该有自己的路了。\"</p>\n<p>他接过剑，看着那两个字，\"无愧？\"</p>\n<p>\"嗯，\"我说，\"师父希望你这辈子，无论做什么事，都能无愧于心。\"</p>\n<p>他看着我，眼神有些湿润。</p>\n<p>\"师父，你是不是要走了？\"</p>\n<p>\"走？\"我笑了笑，\"走去哪？\"</p>\n<p>\"我不知道，\"他说，\"但你突然送我礼物，我觉得……觉得你要离开了。\"</p>\n<p>我看着他，心中五味杂陈疼。</p>\n<p>他长大了，变得敏感了，能察觉到我的一些心思了。</p>\n<p>\"师父不走，\"我说，\"师父只是想说，你已经长大了，可以独当一面了。以后，你可以自己走了，不用总是跟着师父。\"</p>\n<p>\"我不想自己走，\"他说，\"我想跟着你。\"</p>\n<p>\"跟着师父有什么好的？\"我说，\"师父到处流浪，没有家，没有产业，什么都没有。你应该有自己的生活。\"</p>\n<p>\"我的生活就是跟着你，\"他说，\"你去哪，我去哪。\"</p>\n<p>我看着他，心里涌起一股复杂的情绪。</p>\n<p>这个孩子，这个我曾经从废墟里救出来的孩子，现在已经长成了一个出色的大夫，一个善良、正直、有责任感的人。</p>\n<p>他本可以有更好的人生，却选择跟着我，这个长生者，这个漂泊者。</p>\n<p>\"小石头，\"我说，\"师父不值得你这样做。\"</p>\n<p>\"值得，\"他说，\"你救了我的命，你养了我十二年，你教我做人的道理。没有你，我早就死了。所以，我要跟着你，一直跟着你。\"</p>\n<p>我看着他的眼睛，那双眼睛里满是坚定。</p>\n<p>我知道，我说服不了他。</p>\n<p>就像当年他说\"我不要桂花糕，我要跟你走\"一样，他决定了的事情，谁也改变不了。</p>\n<p>\"好吧，\"我说，\"那你就跟着师父吧。但师父有个条件。\"</p>\n<p>\"什么条件？\"</p>\n<p>\"无论将来发生什么，你都要记住，做一个无愧于心的人。\"</p>\n<p>他举起那把剑，郑重地点头。</p>\n<p>\"我记住了，师父。无愧于心。\"</p>\n<p>我看着他的背影，那个曾经瘦小的男孩，现在长成了挺拔的青年。</p>\n<p>我心里说：小石头，师父答应你，会陪着你，直到最后。</p>\n<p>哪怕我知道，那一天总会来。</p>\n<p>哪怕我知道，到时候会是我难受。</p>\n<p>但我答应你，一直陪着你。</p>\n<p>这是师父能给你的，唯一的承诺。</p>"}},{"type":"chapter","title":"第十二章 分别","data":{"id":12,"title":"第十二章 分别","html":"<p>我认识李长风，是在一个酒馆的斗殴现场。</p>\n<p>那年小石头十七岁，我们路过一个边陲小镇。镇子不大，一条街道，两边是破旧的房屋和几家店铺。</p>\n<p>那天傍晚，我们走进一家酒馆，想吃点东西，歇歇脚。</p>\n<p>酒馆里人不多，几张桌子，坐着些像是江湖人的汉子。我们找个角落坐下，要了两碗面。</p>\n<p>面还没上，门口进来一个人。</p>\n<p>那是个年轻人，二十出头，身材高大，穿着一身灰布衣服，腰间挂着一把剑。他走进来，扫了一眼酒馆，然后走到吧台前面，要了一壶酒。</p>\n<p>\"你就是李长风？\"吧台后面有人问。</p>\n<p>\"是我，\"那年轻人说，\"有事？\"</p>\n<p>\"有人找你。\"</p>\n<p>话音刚落，角落里站起三个人，朝着那年轻人走过去。</p>\n<p>\"李长风，\"为首的一个汉子说，\"我们老大请你过去一趟。\"</p>\n<p>\"你们老大是谁？\"</p>\n<p>\"去了就知道了。\"</p>\n<p>李长风笑了，\"如果我不去呢？\"</p>\n<p>\"那就别怪我们不客气。\"</p>\n<p>三个汉子同时拔刀。</p>\n<p>酒馆里其他人站起来，迅速退到一边，生怕被波及。</p>\n<p>我拉着小石头，也想退开。李长风突然转过头，看了我一眼。</p>\n<p>\"这位兄台，\"他说，\"会武功吗？\"</p>\n<p>我呆了一瞬，\"不会。\"</p>\n<p>\"那就算了，\"他说，\"你带孩子躲远点，别伤着。\"</p>\n<p>说完，他转过头，面对那三个汉子。</p>\n<p>\"来吧，\"他说，\"让我看看你们有多不客气。\"</p>\n<p>---</p>\n<p>那是一场很短的打斗。</p>\n<p>李长风出剑很快，快得几乎看不清。三个汉子还没反应过来，手里的刀就落地了。</p>\n<p>\"滚，\"李长风说，\"告诉你们老大，想见我，自己来。\"</p>\n<p>三个汉子捡起刀，灰溜溜地跑了。</p>\n<p>酒馆里安静下来。李长风收起剑，走到我们桌子前。</p>\n<p>\"没吓着吧？\"他问小石头。</p>\n<p>小石头摇摇头，眼睛亮晶晶地看着他。</p>\n<p>\"你好厉害，\"他说，\"能不能教我？\"</p>\n<p>李长风笑了，\"想学？\"</p>\n<p>\"想！\"</p>\n<p>\"那你得问你爹同不同意。\"</p>\n<p>\"他不是我爹，\"小石头说，\"他是我师父。\"</p>\n<p>李长风看了我一眼，\"师父？\"</p>\n<p>\"嗯，\"我说，\"教他医术。\"</p>\n<p>\"医术？\"李长风挑了挑眉，\"你是大夫？\"</p>\n<p>\"算是吧。\"</p>\n<p>他坐下来，\"正好，我最近胃不太舒服，你给我看看？\"</p>\n<p>我看着他，心底涌起犹豫。</p>\n<p>我知道他是谁。李长风，边关赫赫有名的剑客，后来成了将军，再后来战死在沙场上。</p>\n<p>按照历史，他现在应该已经在军营里了，再过几年就会成名，再过十几年就会死。</p>\n<p>我不想和他有太多交集。因为最终，他会死，而我会看着他死去。</p>\n<p>但小石头一脸期待地看着我，我又不忍心拒绝。</p>\n<p>\"好吧，\"我说，\"我给你看看。\"</p>\n<p>---</p>\n<p>李长风的胃确实有问题。</p>\n<p>是长期饮酒和饮食不规律造成的，不算严重，但需要调养。</p>\n<p>我给他开了个方子，又叮嘱他少喝酒，按时吃饭。</p>\n<p>\"大夫，\"他说，\"你这人真有意思。别的大夫都是巴不得我多买药，你让我少喝酒？\"</p>\n<p>\"你的病是喝出来的，\"我说，\"再喝下去，神仙也救不了你。\"</p>\n<p>他哈哈大笑，\"有意思，真有意思。我叫李长风，你呢？\"</p>\n<p>\"顾沉舟。\"</p>\n<p>\"顾沉舟，\"他念了一遍，\"好名字。沉舟……历经沧桑而不沉，倒是有些气魄。\"</p>\n<p>他又笑了，\"顾兄，我觉得咱们挺投缘的。今晚一起喝一杯？\"</p>\n<p>\"你不是胃不好吗？\"</p>\n<p>\"就一杯，\"他说，\"死不了。\"</p>\n<p>我看着他，心中有些无奈。</p>\n<p>这个人，明知道会死，还要喝。明知道前方是死路，还要往前走。</p>\n<p>这就是李长风，那个在历史上留下名字的，活得精彩又短暂的人。</p>\n<p>\"好吧，\"我说，\"就一杯。\"</p>\n<p>---</p>\n<p>那天晚上，我们喝了不止一杯。</p>\n<p>李长风是个很好的酒友，也是个很好的聊天对象。他说话直爽，不拐弯抹角，想什么说什么。</p>\n<p>他告诉我，他是个孤儿，从小在军营里长大。后来学了剑，就成了军人。</p>\n<p>\"我喜欢打仗，\"他说，\"不是喜欢杀人，是喜欢那种……活着的感觉。\"</p>\n<p>\"活着的感觉？\"</p>\n<p>\"对，\"他说，\"在战场上，每一秒都可能是最后一秒。你知道那种感觉吗？当刀砍过来的时候，你躲开，那一瞬间，你会觉得，自己还活着，真好。\"</p>\n<p>我看着他，心里有些复杂。</p>\n<p>三百年了，我从来没有过这种感觉。对我来说，活着是理所当然的，死亡是别人的事。我从来没有担心过自己会死，所以我也从来没有体会过，那种\"活着真好\"的感觉。</p>\n<p>\"你不懂吧？\"他看着我，笑了笑，\"你看起来像个读书人，斯斯文文的，肯定没打过仗。\"</p>\n<p>\"是没打过，\"我说，\"但我也见过死亡。\"</p>\n<p>\"见过和经历过不一样，\"他说，\"见过死亡，你会害怕。经历过死亡，你会珍惜。\"</p>\n<p>我沉默了一会儿，然后说：\"你说得对。\"</p>\n<p>\"所以啊，\"他举起酒杯，\"活着就要痛快，就要精彩。哪怕是明天就死，今天也要活得像个样子。\"</p>\n<p>\"哪怕明天就死？\"我看着他，\"你真的不怕死吗？\"</p>\n<p>\"怕啊，\"他说，\"当然怕。但怕有什么用？人总有一死，早死晚死都是死。与其怕死，不如把活着的每一天都过好。\"</p>\n<p>他说这话的时候，眼睛里闪着光。</p>\n<p>那种光，我在很多人身上都见过。那些活得精彩的人，那些不在乎长短只在乎质量的人，他们眼睛里都有这种光。</p>\n<p>而我，没有。</p>\n<p>\"李兄，\"我说，\"我觉得你活得真明白。\"</p>\n<p>\"明白？\"他笑了笑，\"我只是不想留下遗憾罢了。\"</p>\n<p>---</p>\n<p>我们在那个小镇上住了三天。</p>\n<p>三天里，李长风每天都来找我们。有时候喝酒，有时候聊天，有时候教小石头几招剑法。</p>\n<p>小石头很喜欢他，整天\"李大哥李大哥\"地叫着。</p>\n<p>我也挺喜欢他的。他是个很简单的人，没有心机，没有算计，想说什么说什么，想做什么做什么。</p>\n<p>和他在一起，我觉得很轻松。不用提防，不用猜测，不用担心。</p>\n<p>但我也知道，这种轻松是暂时的。</p>\n<p>因为按照历史，再过几年，他就会成为将军，再过十几年，他就会死。</p>\n<p>而我，会看着他死去。</p>\n<p>第三天晚上，李长风来找我们，说他要走了。</p>\n<p>\"去哪？\"我问。</p>\n<p>\"北边，\"他说，\"边境不太平，我要回去打仗了。\"</p>\n<p>\"打仗……\"我沉默了一会儿，\"李兄，我有个问题想问你。\"</p>\n<p>\"问吧。\"</p>\n<p>\"如果……我是说如果，你知道一场仗必输无疑，你还会去打吗？\"</p>\n<p>他想了想，说：\"会。\"</p>\n<p>\"为什么？\"</p>\n<p>\"因为那是我的职责，\"他说，\"我是军人，保家卫国是我的责任。哪怕是必输，也要去输。\"</p>\n<p>\"哪怕会死？\"</p>\n<p>\"哪怕会死。\"</p>\n<p>我看着他的眼睛，那双眼睛里没有任何犹豫，只有坚定。</p>\n<p>\"李兄，\"我说，\"你会成为一个了不起的人。\"</p>\n<p>\"了不起？\"他笑了，\"我不求这些，我只求无愧于心。\"</p>\n<p>无愧于心。</p>\n<p>这个词，我好像在哪里听过。</p>\n<p>对了，是小石头。我送他的那把剑上，刻的就是\"无愧\"两个字。</p>\n<p>\"李兄，\"我说，\"咱们有缘再会。\"</p>\n<p>\"有缘再会，\"他举起酒杯，\"保重。\"</p>\n<p>\"保重。\"</p>\n<p>我们碰了一下杯，一饮而尽。</p>\n<p>---</p>\n<p>第二天早上，李长风走了。</p>\n<p>我站在酒馆门口，看着他的背影消失在街道尽头。</p>\n<p>小石头站在我旁边，有些不舍。</p>\n<p>\"师父，\"他说，\"我们还会见到李大哥吗？\"</p>\n<p>我想了想，说：\"会。\"</p>\n<p>\"真的？\"</p>\n<p>\"真的，\"我说，\"总有一天，我们会再见到他。\"</p>\n<p>我说这话的时候，心里有些沉重。</p>\n<p>因为我知道，当我们再见到他的时候，就是他生命的最后几年了。</p>\n<p>到时候，我会看着他走上那条必死的道路，看着他选择那场必输的仗，看着他身中十七箭，站立不倒。</p>\n<p>而我，什么都做不了。</p>\n<p>\"师父，\"小石头说，\"你怎么了？\"</p>\n<p>\"没什么，\"我说，\"走吧，咱们也该上路了。\"</p>\n<p>我转身，带着小石头，走向了与李长风相反的方向。</p>\n<p>身后，是边关的风，带着沙尘和硝烟的味道。</p>\n<p>身前，是未知的道路，是漫长的岁月，是无数个将要面对离别的人。</p>\n<p>我突然有些羡慕李长风。</p>\n<p>羡慕他活得那么明白，那么痛快，那么无愧于心。</p>\n<p>而我，还要一个人，继续走下去。</p>\n<p>走过无数的离别，走过无数的死亡，走过无数个像他一样的人。</p>\n<p>直到有一天，我也能像他现在这样，说出那四个字：无愧于心。</p>\n<p>---</p>\n<p>那是我第一次和李长风分别。</p>\n<p>很多年后，我们又见过几次面。有时候是在战场上，有时候是在酒馆里，有时候是在某个不知名的城镇。</p>\n<p>每一次见面，他都会笑着说：\"顾兄，好久不见。\"</p>\n<p>每一次分别，他都会说：\"有缘再会。\"</p>\n<p>我知道，他说的\"有缘\"，是指这辈子。而我说的\"有缘\"，是指下辈子，下下辈子，无穷无尽的轮回。</p>\n<p>因为他只有这一辈子，而我有无数辈子。</p>\n<p>所以每一次分别，对我来说，都是一次预演。预演着最终的告别，预演着看着他死去的那一天。</p>\n<p>但即便如此，我还是感谢命运，让我遇见了他。</p>\n<p>让我知道，原来人还可以这样活。</p>\n<p>原来，活得精彩，比活得久，更重要。</p>\n<p>这就是李长风教给我的，关于生命，关于选择，关于勇气的意义。</p>\n<p>我会记得。</p>\n<p>记得那个在酒馆里拔剑的年轻人，那个说\"无愧于心\"的军人，那个教会我什么是真正活着的朋友。</p>\n<p>李长风，有缘再会。</p>\n<p>在那之前，我会替你，继续看着这世界。</p>"}},{"type":"chapter","title":"第十三章 戏台","data":{"id":13,"title":"第十三章 戏台","html":"<p>我认识那个戏班，是在三十年前。</p>\n<p>那时候小石头还小，大概七八岁的样子。我们路过一个县城，县城里正赶庙会，热闹非凡。</p>\n<p>小石头没见过戏，拉着我的手，非要去看。</p>\n<p>戏台搭在城隍庙前面，是个临时搭的草台班子。台上正在唱《白蛇传》，白娘子正在水漫金山。</p>\n<p>小石头看得入了迷，眼睛一眨不眨。</p>\n<p>\"师父，\"他问我，\"那白娘子真的是蛇变的吗？\"</p>\n<p>\"不是，\"我说，\"那是人扮的。\"</p>\n<p>\"人扮的？\"他瞪大了眼睛，\"可是她长得好像真的蛇精啊。\"</p>\n<p>我笑了笑，没说话。</p>\n<p>台上的白娘子确实唱得好，身段优美，唱腔婉转。尤其是那双眼睛，顾盼生辉，真有几分妖气。</p>\n<p>戏散了之后，小石头还舍不得走。</p>\n<p>\"师父，我们明天还能来看吗？\"</p>\n<p>我想了想，说：\"看情况吧。\"</p>\n<p>---</p>\n<p>第二天，我们又去了。</p>\n<p>那天的戏是《霸王别姬》，演虞姬的是昨天演白娘子的那个女子，演霸王的是个中年汉子，身材魁梧，声若洪钟。</p>\n<p>虞姬自刎那一段，唱得凄婉动人。台下不少人都哭了，小石头也红了眼眶。</p>\n<p>\"师父，\"他抽抽搭搭地说，\"虞姬为什么要死啊？\"</p>\n<p>\"因为她不想拖累霸王，\"我说。</p>\n<p>\"可是死了就什么都没有了。\"</p>\n<p>\"有时候，\"我看着台上，\"有些东西比活着更重要。\"</p>\n<p>他似懂非懂地点点头。</p>\n<p>戏散之后，我带着小石头去后台，想见见那个演虞姬的女子。</p>\n<p>后台很乱，到处都是戏服和道具。那女子正在卸妆，从镜子里看见我们，转过头来。</p>\n<p>\"有事？\"她问。</p>\n<p>\"唱得好，\"我说，\"带孩子来见识见识。\"</p>\n<p>她笑了笑，那笑容有些疲惫，\"谢谢。\"</p>\n<p>\"怎么称呼？\"</p>\n<p>\"柳如烟，\"她说，\"戏班的人都叫我如烟。\"</p>\n<p>\"如烟姑娘，\"我说，\"这戏班是你的？\"</p>\n<p>\"是我爹的，\"她说，\"我爹年纪大了，现在我来管。\"</p>\n<p>我点点头，\"唱得真好。尤其是那双眼睛，有灵气。\"</p>\n<p>她愣了一下，然后笑了，\"你是第一个这么说的。大多数人只会说'唱得好''长得美'。\"</p>\n<p>\"我说的是真的，\"我说，\"你的眼睛里，有故事。\"</p>\n<p>她看着我，眼神有些复杂。</p>\n<p>\"先生，\"她说，\"你说话，不像是一般人。\"</p>\n<p>\"我就是一般人，\"我说，\"只是看得多了些。\"</p>\n<p>---</p>\n<p>我们在县城里住了半个月，看了五场戏。</p>\n<p>柳如烟的戏，我看了三场。她不光唱得好，而且每个角色都演得不一样。白娘子的妖媚，虞姬的刚烈，杜丽娘的娇羞，每个人物都活灵活现。</p>\n<p>我问她：\"你是怎么做到的？\"</p>\n<p>她说：\"把自己当成那个人。\"</p>\n<p>\"什么意思？\"</p>\n<p>\"就是，\"她想了想，\"演白娘子的时候，我就觉得自己是条蛇，修炼了一千年，好不容易变成人，要找一个好人嫁了。演虞姬的时候，我就觉得自己是个女人，看着自己的男人兵败如山倒，宁愿死也不拖累他。\"</p>\n<p>\"那你自己呢？\"我问，\"你自己是谁？\"</p>\n<p>她恍惚片刻，然后笑了，\"我自己？我自己就是个唱戏的。\"</p>\n<p>\"唱戏的也是人，\"我说，\"你总有自己的喜怒哀乐吧？\"</p>\n<p>她沉默了一会儿，说：\"唱戏的，没有自己的喜怒哀乐。我们的喜怒哀乐，都在戏里。戏演完了，情绪就散了。\"</p>\n<p>我看着她，心中有些感慨。</p>\n<p>三百年，我见过很多人。活得清醒的，活得糊涂的，活得累的，活得轻松的。但像她这样，把自己活成戏里人的，头一回见。</p>\n<p>\"如烟姑娘，\"我说，\"你觉得，戏里的人生，和戏外的人生，哪个更真？\"</p>\n<p>她想了一会儿，说：\"戏里的更真。\"</p>\n<p>\"为什么？\"</p>\n<p>\"因为戏里的人生，是经过编排的，有起有落，有喜有悲，最后总有个结局。戏外的人生，乱糟糟的，没有章法，不知道什么时候是头。\"</p>\n<p>我笑了笑，\"也许你说得对。\"</p>\n<p>---</p>\n<p>半个月后，我们离开了那个县城。</p>\n<p>走的时候，小石头很舍不得。他跑去跟柳如烟告别，还送了她一块糖。</p>\n<p>如烟接过糖，摸了摸他的头，\"小弟弟，以后长大了，还来听姐姐唱戏。\"</p>\n<p>\"一定！\"小石头用力点头。</p>\n<p>我们走了。</p>\n<p>那时候我以为，这只是一次普通的相遇，和人生中无数次的相遇一样，来了又走了，不会留下什么痕迹。</p>\n<p>但我错了。</p>\n<p>---</p>\n<p>十年后，我又回到了那个县城。</p>\n<p>小石头已经十七岁了，长成了个大小伙子。我们路过县城，我想起来这里曾经有个戏班，就带着他去找。</p>\n<p>城隍庙还在，戏台也还在，但戏班换了一批人。</p>\n<p>我打听了一下，说原来的班主柳如烟，五年前就病逝了。现在接班的，是她的徒弟，一个叫小梅的姑娘。</p>\n<p>\"柳如烟……死了？\"我有些不敢相信。</p>\n<p>\"是啊，\"那人说，\"才三十出头，得了肺痨，没治好。\"</p>\n<p>我站在戏台前，愣了很久。</p>\n<p>十年。短短十年。</p>\n<p>那个在后台卸妆的女子，那个说\"戏里的人生更真\"的女子，已经不在了。</p>\n<p>\"师父，\"小石头说，\"你怎么了？\"</p>\n<p>\"没什么，\"我说，\"想起了一些往事。\"</p>\n<p>那天，我们又看了一场戏。</p>\n<p>演白娘子的，是小梅。她唱得也不错，但总觉得少了点什么。眼睛很亮，但没有柳如烟那种历经沧桑的味道。</p>\n<p>看完戏，我去后台找她。</p>\n<p>\"你是如烟的徒弟？\"我问。</p>\n<p>\"是，\"她说，\"您认识我师父？\"</p>\n<p>\"十年前，看过她的戏，\"我说，\"唱得很好。\"</p>\n<p>她笑了，\"师父要是听到您这么说，一定很高兴。\"</p>\n<p>\"她……走的时候，痛苦吗？\"</p>\n<p>\"不算痛苦，\"她说，\"师父是个看得开的人。她说，唱了一辈子戏，什么悲欢离合都演过了，真正的离别，也就那么回事。\"</p>\n<p>我点点头，心底涌起一阵复杂。</p>\n<p>---</p>\n<p>又过了十年。</p>\n<p>我第三次来到那个县城。</p>\n<p>这一次，小石头已经二十七岁了，是个出色的大夫。他陪我一起来，因为他知道我对这个戏班有些特殊的感情。</p>\n<p>城隍庙还在，但戏台已经破旧了。戏班还在，小梅已经老了，专门教徒弟。现在的台柱子是一个叫阿秀的年轻姑娘，是小梅的徒弟，如烟的徒孙。</p>\n<p>我去看了一场她的戏。</p>\n<p>阿秀唱得很好，比当年的小梅还好，甚至有几分如烟的味道。尤其是那双眼睛，顾盼之间，仿佛能看见如烟的影子。</p>\n<p>看完戏，我去后台找她。</p>\n<p>\"你唱得真好，\"我说，\"像你师祖。\"</p>\n<p>她微微一怔，\"您认识我师祖？\"</p>\n<p>\"三十年前，看过她的戏。\"</p>\n<p>\"三十年……\"她瞪大了眼睛。</p>\n<p>\"我老了，\"我笑了笑，\"但还记得她。\"</p>\n<p>\"阿秀姑娘，\"我说，\"你师祖当年跟我说，戏里的人生比戏外更真。你觉得呢？\"</p>\n<p>她想了想，说：\"我觉得，戏里戏外，都是人生。\"</p>\n<p>\"哦？\"</p>\n<p>\"戏里的人生，是编出来的，假的。但演的时候，投入的感情是真的。戏外的人生，是真的，但很多时候，我们反而像是在演戏，戴着面具，说着假话。\"</p>\n<p>我看着她，心头微颤。</p>\n<p>\"阿秀姑娘，\"我说，\"好好唱。你师祖在天上看着你呢。\"</p>\n<p>她笑了，\"我会的。\"</p>\n<p>---</p>\n<p>又过了十年。</p>\n<p>我第四次来到那个县城
